erence, Explain \u2192 Manage conversion, habit formation, and customer lifetime value.\nThis person will work closely with Care Continuum, Clinical, Growth, AI, and Platform teams to turn a one-time health check into a long-term health relationship.\nIdeal candidates will have 6\u201312 years of product management experience in consumer internet, health-tech, fintech, or marketplaces, with a strong track record in retention, engagement, subscriptions, loyalty, or habit-forming products.\nWe are looking for someone who understands cohorts, funnels, experimentation, behavioral design, and LTV, a product leader who can build systems that drive long-term user engagement and outcomes", "id": "apollo_hospitals_senior_product_manager-_retention_2026-06-22"}, {"metadata": {"title": "Senior Product Manager, Expansion", "company": "Apollo.io", "match_score": 95, "score_breakdown": [{"category": "Role Match", "matched": 3, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "senior product manager", "product management"]}, {"category": "Domain Match", "matched": 8, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["saas", "b2b", "ai", "platform", "startup"]}, {"category": "Hard Skills", "matched": 2, "total": 24, "weight": 2, "pct": 40, "keywords_hit": ["roadmap", "go-to-market"]}, {"category": "AI & Tech Skills", "matched": 4, "total": 19, "weight": 2.5, "pct": 100, "keywords_hit": ["ai", "claude", "rag", "automation"]}, {"category": "Soft Skills", "matched": 2, "total": 12, "weight": 1, "pct": 67, "keywords_hit": ["remote", "collaboration"]}, {"category": "Location Preference", "matched": 3, "total": 12, "weight": 1.5, "pct": 100, "keywords_hit": ["remote", "global", "worldwide"]}, {"category": "Business Impact", "matched": 8, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["revenue", "growth", "conversion", "arr", "monetization"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/senior-product-manager-expansion-at-apollo-io-4413591677", "date_added": "2026-06-28", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: United States\n- Visit the link for full job details.\n\n### Full Job Description\nApollo.io is the leading go-to-market solution for revenue teams, trusted by over 500,000 companies and millions of users globally, from rapidly growing startups to some of the world's largest enterprises. Founded in 2015, the company is one of the fastest growing companies in SaaS, raising approximately $250 million to date and valued at $1.6 billion. Apollo.io provides sales and marketing teams with easy access to verified contact data for over 210 million B2B contacts and 35 million companies worldwide, along with tools to engage and convert these contacts in one unified platform. By helping revenue professionals find the most accurate contact information and automating the outreach process, Apollo.io turns prospects into customers. Apollo raised a series D in 2023 and is backed by top-tier investors, including Sequoia Capital, Bain Capital Ventures, and more, and counts the former President and COO of Hubspot, JD Sherman, among its board members.\nThe Role\nWe're hiring a Senior Product Manager to own customer expansion at Apollo. One of our biggest growth levers is the customers we already have. When paid teams add seats, buy more credits, attach add-ons, or step up to a higher-value plan, that drives compounding revenue. You'll own the in-product surfaces that turn habitual usage into expansion, and you'll make those moments feel obvious, easy, and trusted.\nOur Product, Design, Engineering teams are structured as Squads. You'll be assigned to a Squad alongside a Product Designer, Data Science partner, an Engineering Manager, and multiple Engineers, and you'll partner closely with the Activation, Free-to-Paid, and Pricing & Packaging teams to keep the monetization experience cohesive end to end.\nWhat you will own\nTeam invite and joiner experience that turns every new seat into an active, paying user.\nAdmin upgrade request flow that captures the moment a teammate asks an admin for more.\nCredit and plan upsells that surface at the right time, driven by deeper and more habitual usage.\nHand-offs that confidently guide qualified teams to Apollo's sales team.\nReporting that shows where expansion is healthy and where it is leaking.\nWhat you will do\nGo deep with paying customers, admins, and end users to deeply understand their needs, workflows, and friction points. Translate that understanding into the product changes that actually move the needle, and use it to set strategy and own your roadmap.\nPrototype fast. Use Claude Code and other AI tools to validate ideas before committing engineering resources. Ship to learn, then ship to scale.\nUse AI as a daily multiplier. Refine your thinking, automate the busywork, keep the team aligned, and free yourself to focus on the highest-leverage work.\nWrite clear specs and make hard tradeoffs. Define the quality bar. Partner with design on experience and with engineering on delivery.\nMeasure whether it worked. Instrument funnels, track conversion and expansion metrics, and feed what you learn back into the next cycle.\nDrive alignment across Free-to-Paid, Pricing & Packaging, Sales, Support, and other partners so what ships actually lands.\nWhat we are looking for\n4+ years of proven experience in SaaS product management. You've owned products end to end in a SaaS environment and can speak to the outcomes you drove.\nHigh agency and strong ownership. You create clarity in ambiguous environments and push work forward without waiting for direction.\nTrack record of unlocking revenue. You've worked with a team to solve impactful problems that opened up new revenue, and you can point to the result.\nProduct judgment. You focus on the highest-leverage problems, make hard tradeoffs, and say no to good ideas to protect great ones.\nCreative problem solver. You see the second and third option when most people stop at the first.\nCustomer empathy. You optimize for your users' speed and confidence, not your own elegance.\nInfluence without authority. You move fast and bring others with you. You communicate clearly, build trust quickly, and make the people around you better.\nExecution excellence. You define, ship, measure, and iterate without thrash. Shipping is the beginning of the work, not the end.\nTechnical fluency. You engage with engineering on performance, reliability, and integrations as a credible partner.\nAI-native builder. You prototype with tools like Claude Code and Cursor and can show something you shipped, not just a spec you wrote.\nDomain experience in PLG, monetization, billing, or expansion surfaces is a plus, not a requirement.\nThe listed Pay Range reflects the total cash compensation inclusive of annual base salary and annual bonus as applicable. For sales roles, the range provided is the role\u2019s On Target Earnings (\"OTE\") range, meaning that the range includes both the sales commissions/sales bonus target and annual base salary for the role. This salary range may be inclusive of several career levels at Apollo and will be narrowed during the interview process based on a number of factors, including the candidate\u2019s experience, qualifications, and location. Applicants interested in this role who are not located in the US may request the annual salary range for their location during the interview process.\nAdditional benefits for this role may include: equity; company bonus or sales commissions/bonuses; 401(k) plan; at least 10 paid holidays per year, flex PTO, and parental leave; employee assistance program and wellbeing benefits; global travel coverage; life/AD&D/STD/LTD insurance; FSA/HSA and medical, dental, and vision benefits.\nTier 1 Pay Range (San Francisco, New York City, Seattle)\n$161,900\u2014$202,400 USD\nTier 2 Pay Range (All other US Locations)\n$140,800\u2014$176,000 USD\nWe are AI Native\nApollo.io is an AI-native company built on a culture of continuous improvement. We\u2019re on the front lines of driving productivity for our customers\u2014and we expect the same mindset from our team. If you're energized by finding smarter, faster ways to get things done using AI and automation, you'll thrive here.\nWhy You\u2019ll Love Working at Apollo\nAt Apollo, we\u2019re driven by a shared mission: to help our customers unlock their full revenue potential. That\u2019s why we \ntake extreme ownership\n of our work, \nmove with focus and urgency\n, and \nlearn voraciously\n to stay ahead.\nWe invest deeply in your growth, ensuring you have the resources, support, and autonomy to \nown your role and make a real impact\n. Collaboration is at our core\u2014we\u2019re \nall for one\n, meaning you\u2019ll have a team across departments ready to help you succeed. We encourage \nbold ideas and courageous action\n, giving you the freedom to experiment, take smart risks, and drive big wins.\nIf you\u2019re looking for a place where your work matters, where you can push boundaries, and where your career can thrive\u2014Apollo is the place for you.\nLearn more here!", "id": "apolloio_senior_product_manager_expansion_2026-06-28"}, {"metadata": {"title": "Senior Product Manager", "company": "Applause", "match_score": 82, "score_breakdown": [{"category": "Role Match", "matched": 4, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "product owner", "senior product manager", "product management"]}, {"category": "Domain Match", "matched": 3, "total": 17, "weight": 2, "pct": 75, "keywords_hit": ["ai", "startup", "insurance"]}, {"category": "Hard Skills", "matched": 8, "total": 24, "weight": 2, "pct": 100, "keywords_hit": ["roadmap", "product strategy", "data-driven", "user research", "sprint"]}, {"category": "Tools", "matched": 2, "total": 14, "weight": 1.5, "pct": 67, "keywords_hit": ["jira", "analytics"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 5, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "stakeholder", "leadership", "communication"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Business Impact", "matched": 1, "total": 16, "weight": 1.5, "pct": 25, "keywords_hit": ["retention"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/senior-product-manager-at-applause-4410863074", "date_added": "2026-06-26", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: United States\n- Visit the link for full job details.\n\n### Full Job Description\nThe Senior Product Manager will empower our engineering and design teams to do their best work. They will manage sprints, feature stories, design mocks, customer research, market research, and product roadmaps while helping us develop our product strategy.\nResponsibilities: \nManage Jira epics & stories to empower engineers and designers to do their best work\nHelp the team complete 90% of roadmap features on time\nLead the planning and execution of user research\nHelp determine what new feature(s) to build in H2 2026 and beyond\nAchieve a 40% survey result from customers (i.e. this is our internal benchmark that makes it clear we have excellent product-market-fit)\nUtilize data across our apps to understand the strengths and weaknesses of the product\nGather and analyze product feedback directly from customers. Use the feedback to prioritize the roadmap and help us achieve our sales and retention goals\nRequirements\n5+ years of Product Management experience, with a proven track record of delivering successful products that drive measurable impact\nEnd-to-end product ownership experience, from ideation and specification through development, release, analysis, and iteration\nPassion for customer research, deeply committed to understanding user needs through qualitative and quantitative insights, including conducting user interviews, analyzing behavioral data, and uncovering feature opportunities to validate ideas\nStrong alignment with Jobs to Be Done (JTBD), ensuring product decisions align with Applause's Product Vision Statement and drive meaningful outcomes\nData-driven decision-making expertise, utilizing user tracking and product analytics tools such as Pendo to inform strategy and measure success\nExceptional communication skills, with the ability to effectively engage stakeholders at all levels, from frontline employees to executives, both within and outside the organization\nCollaborative and leadership-oriented, thriving in team environments, working cross-functionally with multiple stakeholders, and stepping into leadership roles as needed to drive alignment and execution\nBenefits\nBenefits: \n100% remote w/ no office mandate | Unlimited PTO | 20 official company holidays | Health care | Life insurance | Stock options | Amazing colleagues | Energetic culture that is positive and celebrates together | Inspiring mission & software product | Ability to grow your career by being early in a fast-growing tech startup", "id": "applause_senior_product_manager_2026-06-26"}, {"metadata": {"title": "Senior Product Manager", "company": "AppsForBharat", "match_score": 97, "score_breakdown": [{"category": "Role Match", "matched": 4, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "senior product manager", "product lead", "product management"]}, {"category": "Domain Match", "matched": 5, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["ai", "platform", "digital products", "startup", "e-commerce"]}, {"category": "Hard Skills", "matched": 9, "total": 24, "weight": 2, "pct": 100, "keywords_h h innovative technology, offering seamless access to sacred pilgrims & rituals, divine teachings, and a vibrant community. The overwhelming user love motivates us as we aim to serve 100s of millions more in the coming years.\nThe devotion market is a $44B opportunity in India (growing at 10% CAGR), which is primarily offline and unorganised. Of the $44B, the temples drive GMV of ~$27B in temple offerings, services, and commerce. There are 2M+ temples in India - about 10k of these temples have a strong historical and cultural significance. Tourism to these religious places is a $10B opportunity. The Sri Mandir app is the world\u2019s largest app for Hindu devotees and growing 20-25% month-on-month. Learn more about AppsForBharat: Business World Article, Indian Silicon Valley Podcast, YourStory Article Try the Sri Mandir app: Android / iOS\nRole Overview For Senior Product Manager (Acquisition & Monetisation)\nAs Senior Product Manager, you\u2019ll own the product lifecycle end-to-end\u2014from vision to execution. You\u2019ll\nwork with leadership to define the roadmap, drive data-backed decisions, and deliver impactful\nexperiences for millions of users. This is a high-ownership role, requiring strategic thinking, strong\nexecution, and deep empathy for users.\nKey Responsibilities\nProduct Vision & Strategy: Define and own product roadmap for your charter aligned with\ncompany goals.\nData-Driven Decision Making: Leverage analytics, user research, and market insights to identify\nproblems, opportunities and improve product KPIs.\nEnd-to-End Ownership: Lead the product lifecycle - from concept, requirements gathering, and\nprioritisation to launch and post-launch optimisation.\nUser-Centric Design: Partner with UX/UI teams to deliver intuitive and delightful user experience.\nCross-Functional Leadership: Collaborate with engineering, design, marketing, and operations to\nexecute product initiatives with confidence.\nPerformance Optimisation: Monitor KPIs, and iterat mpany": "ButterflyMX", "match_score": 78, "score_breakdown": [{"category": "Role Match", "matched": 3, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "product management", "principal product manager"]}, {"category": "Domain Match", "matched": 3, "total": 17, "weight": 2, "pct": 75, "keywords_hit": ["b2b", "ai", "platform"]}, {"category": "Hard Skills", "matched": 2, "total": 24, "weight": 2, "pct": 40, "keywords_hit": ["roadmap", "requirements"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "automation"]}, {"category": "Soft Skills", "matched": 2, "total": 12, "weight": 1, "pct": 67, "keywords_hit": ["remote", "communication"]}, {"category": "Location Preference", "matched": 3, "total": 12, "weight": 1.5, "pct": 100, "keywords_hit": ["remote", "distributed", "worldwide"]}, {"category": "Business Impact", "matched": 2, "total": 16, "weight": 1.5, "pct": 50, "keywords_hit": ["acquisition", "conversion"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://remoteok.com/remote-jobs/remote-principal-product-manager-acquisition-products-butterflymx-1134023", "date_added": "2026-06-24", "source": "RemoteOK", "location": "See posting", "work_type": "Remote"}, "body": "### Job Description\nOur Mission: ButterflyMX is on a mission to empower people to automate property access, operations, and security from a single platform. Our products are installed in more than 20,000+ multifamily, commercial, gated communities, and student-housing properties worldwide, including properties developed, owned, and managed by the most trusted names in real estate. Our features are designed for developers, owners, property managers, and tenants and our products lower operating costs and improve tenant satisfaction. Our Solution: Developers and owners no longer need to run building wiring or install in-unit hardware. Property managers can grant building access, revoke permissions, and review entry logs from an online dashboard. Residents can open doors from their smartphones, issue visitor access, and see who is trying to enter the building. Our Culture & Values: Fantastic people are the key to our success. As a distributed, primarily remote workforce, we\u00e2\u0080\u0099re looking for more intelligent, passionate, collaborative, ai-forward, and down-to-earth individuals to join our growing team. We\u00e2\u0080\u0099re driven by a shared commitment to excellence and innovation, grounded in our core values: We delight our customers, We take ownership, We are a community of collaborators, We speak up, We think big and do small, and We are tenacious. ButterflyMX is hiring a Principal PM who thinks at the intersection of funnels and customer experience. This role is about understanding how people move through a decision process, where they drop off, and what it takes to earn the next step. You'll own a product area that spans two connected user groups, one experiencing that journey firsthand, the other managing and optimizing it on the other side. We have an early roadmap to build from, but we need someone to pressure-test it, sharpen it, and own it. The right person for this role brings consumer product instincts, deep familiarity with AI-driven workflow automation, and a genuine obsession with conversion. Responsibilities: Take ownership of the product roadmap for this new area: evaluate what we\u00e2\u0080\u0099ve scoped, stress-test the assumptions, and evolve the plan based on what you learn Define and drive the end-to-end experience across two connected user groups: one consumer-facing, one operator-facing Identify where AI-driven automation can reduce friction and improve outcomes on both sides of the experience, and build those capabilities in a way that earns trust Navigate a complex integration landscape, working with third-party platforms and data sources that are central to how this market operates Conduct rigorous discovery by getting close to end users and operators, sharpening the problem definition while iterating with Design and Engineering on the solution Establish the metrics that matter and hold yourself accountable to them Requirements: 7+ years in product management with a track record of owning products from concept to market, including experience inheriting early-stage work and making it better Funnel and conversion fluency: you think in terms of acquisition, activation, and drop-off. You know how to identify where a journey breaks down and what it takes to fix it Consumer UX instincts for high-stakes decisions: you understand that some experiences require more than ease of use. They require trust, clarity, and confidence at every step Deep familiarity with AI-driven communication and workflow automation: you understand where these systems create value, where they create risk, and how to deploy them responsibly in products where real people are making real decisions B2B2C fluency: you have experience building products where the end user and the buyer are different people, and you know how to serve both without compromising either Integration-savviness: you have navigated complex third-party ecosystems and understand the product tradeoffs that come with depending on external platforms and data AI-native thinking: you approach product problems by asking how", "id": "butterflymx_principal_product_manager_acquisition_products_2026-06-24"}, {"metadata": {"title": "Associate Product Manager", "company": "Cakap", "match_score": 72, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "associate product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct" nique data problems, that we are solving for our customers. You can read more about the kind of work we do on our blog:\n- https:&#x2F;&#x2F;tech.channable.com&#x2F;\n- Our Stack includes: Haskell, Python, JavaScript, TypeScript, Ember.js, PostgreSQL, Redis, Ansible, Terraform, Nix\n- We currently process billions of products per day and offer technically interesting and challenging work. We are looking for highly motivated and skilled engineers to join our team in our office in the center of Utrecht.\n- Open positions:\n- - Product Owner:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;product-owner\n- - Python Software Engineer:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;python-software-engineer-utrech...\n- - Senior Frontend Developer:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;senior-frontend-developer\n- - DevOps Engineer:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;devops-engineer\n- - Haskell Software Engineer:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;haskell-software-engineer-utrec...\n- We also welcome open applications:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;open-application", "id": "channable_-_product_manager_2026-06-22"}, {"metadata": {"title": "Product Manager", "company": "Chronosphere", "match_score": 65, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "head of product"]}, {"category": "Domain Match", "matched": 4, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["ai", "infrastructure", "platform", "startup"]}, {"category": "Tools", "matched": 1, "total": 14, "weight": 1.5, "pct": 33, "keywords_hit": ["sql"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "rag"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "distributed"]}, {"category": "Business Impact", "matched": 1, "total": 16, "weight": 1.5, "pct": 25, "keywords_hit": ["scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://news.ycombinator.com/item?id=22668255", "date_added": "2026-06-22", "source": "Hacker News", "location": "Full-time Onsite (Remote for now)", "work_type": "Remote"}, "body": "### HN Who is Hiring\n- Chronosphere is a Series A startup delivering the most highly scalable and reliable open source metric data platform to the world. That platform is M3, which was created by the founders of Chronosphere while at Uber. It is the only open source metric data platform proven at petabyte scale in production, stores over tens of billions of metric time series and ingests and serves billions of data points per second. Chronosphere is a modern and highly scalable monitoring monitoring and observability tool built on M3 for companies faced with scaling challenges. We deliver products and APIs that run in the cloud as a single hosted platform.\n- Senior Frontend Engineer:\n- Are you driven by how users digest, explore and build proficiency using a product? As a front-end product engineer you will build interfaces that engineers, data scientists, business analysts and operations staff will use every day to build, analyze and operate products at scale for the companies they work at. Your natural design instincts will be paired with great Javascript fundamentals and how to best design and consume APIs, either using GraphQL or other APIs. For our customers, our tools are leveraged by thousands of engineers on a daily basis to measure and monitor their products and systems. Your work will continue to drive fundamental change to how software is created, delivered and operates all over the world. You will work alongside the engineering team, the head of product and product team, the CEO and the CTO.\n- Technologies: Javascript (ES6), React, GraphQL on the front end. Go, GRPC, Kubernetes, MySQL and M3DB (distributed time series database) on the back end.\n- Senior UX Designer:\n- We&#x27;re looking for a UX designer to help build Chronosphere. You will drive and complete the design process for our cloud web application from beginning to end. You will work with multiple teams to design a clean, usable console focusing on metrics, data visualization, altering, dashboards, infrastructure, and more. We are open to this role being in either New York or our Bellevue, Washington office. You will work alongside the head of product, the engineering team, the CEO and the CTO.\n- What we offer: Excellent benefits, competitive pay and equity at Series A, flexible working environment, challenging problems at scale and pragmatically harnessing millions of instrumentation being collected per second.\n- Senior Frontend Engineer:\n- https:&#x2F;&#x2F;boards.greenhouse.io&#x2F;chronosphere&#x2F;jobs&#x2F;4012681003\n- Senior UX Designer:\n- https:&#x2F;&#x2F;boards.greenhouse.io&#x2F;chronosphere&#x2F;jobs&#x2F;4012682003\n- Email me with questions at rob at chronosphere.io\n- Regarding remote for now: If you are applying to work in the NYC or Seattle office you are not expected to interview in person (it will be remote), or work in person until the CV-19 crisis is resolved (work will be remote). The roles are not remote, but no one is in the office currently.", "id": "chronosphere_product_manager_2026-06-22"}, {"metadata": {"title": "Senior Product Manager, Exchange", "company": "Cint", "match_score": 68, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "senior product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 1, "total" t fees or the need for personal bankruptcy. Our main office is in Baltimore, Maryland, and our 500+ employee workforce operates fully remotely. Working in the direct-to-consumer financial services industry, we are dedicated to treating all people with respect and empathy.\nAbout the Role\nWe\u2019re seeking a Senior Product Manager to own the end-to-end digital experience from first click through early client lifecycle driving measurable outcomes by reducing friction, improving conversion and engagement, and ensuring experiences are observable, compliant, and scalable\nThis is a 0-to-1 role. You\u2019ll lead the vision, strategy, and execution for a modern self-enrollment funnel, a re-imagined client portal, and a mobile experience we\u2019re defining together. Some of these experiences are net new; others will be re-imagined from existing foundations. Either way, you\u2019ll set the bar for what an empathetic, conversion-driven digital experience looks like in our industry and help raise the craft of the broader product team along the way.\nWhat You\u2019ll Need:\nSet the 0-to-1 Vision\n: Lead the vision, strategy, and roadmap for our portfolio of digital experiences self-enrollment, client portal, and mobile turning ambiguity into a clear, sequenced plan that ties to business outcomes\nLead Digital Self-Enrollment First\n: Take point on our highest-priority initiative \u2014 modernizing the consumer-facing self-enrollment experience so prospective clients can confidently move from interest to enrolled, on their own terms\nChampion Funnel & Conversion Optimization\n: Use experimentation, A/B testing, and rapid prototyping to lift conversion at every step of the funnel \u2014 from first touch through enrollment and ongoing engagement\nObsess Over the Client Experience\n: Ground every decision in real client research and behavioral data, ensuring our digital touchpoints feel intuitive, transparent, and aligned with our mission to help clients become debt-free\nMentor the Product Bench\n: Operate as a player-coach \u2014 own your product portfolio while elevating the craft of junior PMs and APMs through coaching, frameworks, and reviews\nPartner Across the Business\n: Align engineering, design, marketing, operations, legal/compliance, and executive stakeholders around shared outcomes; bring everyone along on the why, the what, and the trade-offs\nMeasure What Matters\n: Establish clear success metrics for each initiative, instrument the experiences, and ensure every release ties back to client outcomes and business impact\nBuild for Observability and Scale\n: Partner with engineering to ensure every digital experience is properly instrumented, monitored, and architected to scale as our client base grows\nBuild for Compliance by Design\n: Partner closely with legal, compliance, and operations to ensure every experience meets regulatory requirements without sacrificing client experience\nOwn Agile Delivery\n: Lead core product ceremonies \u2014 backlog grooming, prioritization, planning, and retrospectives \u2014 to keep the pod moving with rhythm and quality\nWhat We\u2019re Looking For:\nProven 0-to-1 Track Recor\nd: You\u2019ve taken digital products or experiences from concept to launch \u2014 and have the measurable client and business outcomes to show for it. We\u2019re less interested in years on a r\u00e9sum\u00e9 than in what you\u2019ve actually shipped and learned.\nFunnel & Conversion Master\ny: You think in funnels. You\u2019re fluent in A/B testing, conversion analytics, and the discipline of moving the needle on top-of-funnel through activation.\nMobile-Native Product Craf\nt: Strong instincts for mobile UX \u2014 app store dynamics, push notifications, biometrics, offline states, and the differences between iOS and Android conventions \u2014 and an opinion on when native is worth the cost.\nPlayer-Coach Leadershi\np: Comfortable mentoring junior PMs and APMs while still owning your own product portfolio. You raise the craft of those around you without needing a formal management line.\nCustomer-Centric Discover\ny: Deep user empathy backed by rigorous discovery practices \u2014 interviews, jobs-to-be-done, usability testing, and behavioral analytics \u2014 with the judgment to translate insight into product decisions\nStrategic and Analytical Thinkin\ng: You can identify the right problems to solve, use data to inform decisions, and balance short-term wins with long-term vision\nCollaboration and Influenc\ne: You excel at working across teams \u2014 engineering, design, operations, compliance \u2014 and can align diverse stakeholders around a shared goal, especially in a regulated direct-to-consumer environment\nComfort with Modern Practice\ns: Familiarity with experimentation frameworks, agile methodologies, and emerging technologies like AI/ML in product development. Industry experience in debt settlement, fintech, or other regulated D2C spaces is a plus, not a requirement\nData Fluenc\ny: Comfortable working with data to uncover insights, inform decisions, and measure success\nWhy Join Us?:\nMission-Driven Work: Help people achieve financial freedom and peace of mind\nInnovative Culture\n: \nWe\u2019re not a feature factory \u2014 we\u2019re a team that values learning, experimentation, and continuous improvement\nCompetitive compensation and yearly performance bonus\nGenerous PTO and paid holidays\nFull suite of benefits: 401(k), health, dental, vision, life, disability, and HSA", "id": "clearone_advantage_senior_product_manager_2026-06-28"}, {"metadata": {"title": "Senior Product Manager", "company": "CloudEagle.ai", "match_score": 68, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "senior product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, s \u2014 translating clinical and business needs into elegant, compliant, and scalable product solutions. Oversee the Content development and UX/UI functions. This is a high-impact, hands-on leadership role ideal for someone passionate about behavioral health, data-driven product development, and building in a fast-moving environment\nResponsibilities:\nOwn and drive the product roadmap across one or more platform domains, balancing near-term delivery with long-term strategic vision.\nPartner closely with engineering, design, clinical, and data teams to define, prioritize, and ship high-quality product experiences.\nLead discovery efforts including user research, stakeholder interviews, and competitive analysis to deeply understand member, provider, and client needs.\nAuthor clear, detailed Product Requirements Documents (PRDs), user stories, and acceptance criteria that empower engineering teams to execute with confidence.\nTranslate complex healthcare workflows and compliance requirements (HIPAA, SOC 2, HITRUST) into pragmatic product decisions and feature definitions.\nDefine and track product success metrics \u2014 establishing KPIs, instrumentation requirements, and feedback loops to drive continuous improvement.\nAlign cross-functional stakeholders on priorities, tradeoffs, and launch readiness.\nChampion AI-powered product capabilities including care navigation agents, member-facing assistants, and intelligent content delivery.\nManage and prioritize the product backlog in Jira; participate actively in agile ceremonies and sprint planning.\nLead content development and UX/UI teams. Build, mentor, and develop high-performing teams.\nEducation/Experience: \nHigh School Diploma/GED required\nBachelor degree preferred or relevant experience in lieu of degree\n5+ years of product management experience in B2B SaaS, digital health, or healthcare technology.\nDemonstrated ability to lead full product lifecycle from discovery through delivery and iteration.\nStrong command of writing PRDs, defining user stories, and working within agile development frameworks.\nExperience working in regulated environments with knowledge of HIPAA, healthcare data privacy, or health plan operations.\nComfort with technical concepts including APIs, microservices, data pipelines, and AI/ML product capabilities \u2014 enough to partner credibly with engineers.\nProven ability to influence without authority across engineering, clinical, and business stakeholders.\nExperience with Jira, Figma, and collaborative tools in a remote-first environment.\nFamiliarity with AI tools and a desire to leverage them to accelerate product development, discovery, and documentation workflows.\nBackground in behavioral health, mental health, or whole-person care platforms is a strong plus.\nThis Company is an Equal Opportunity/Affirmative Action employer. All qualified applicants will receive consideration for employment without regard to race, color, religion, sex, national origin, sexual orientation, gender identity, protected veteran status or status as an individual with a disability and any other protected class as required by federal, state or local law. Company will consider reasonable accommodation requests as part of the recruiting and hiring process.", "id": "confidential_company_sr_manager_of_product_2026-06-28"}, {"metadata": {"title": "Digital Product Manager", "company": "Confidential", "match_score": 60, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["indonesia", "jakarta"]}], "description_quality": "thin", "status": "Ready to Apply", "url": "https://  ecosystem \u2014 making it easier for everyone, from startups to large banks, to report consumer-permissioned data (CPD) and launch innovative, accessible financial products.\nOur flagship product, \nBloom+\n, enables financial institutions to report recurring consumer payments (like rent, utilities, and telecom bills) to major credit bureaus, helping consumers build credit profiles outside of traditional means. By expanding the scope of creditworthiness, we're helping organizations improve lives through responsible access to credit.\nOur goal is simple: to help everyone from seed-stage startups to large, established banks (and everyone in between) access and furnish accurate credit data easily and without error; we believe this will lead to increased innovation and the creation of accessible, unique financial products for everyone\nOur mission is backed by human-centric thinking paired with a modern approach to credit reporting and furnishment; we\u2019re doing our part to rewrite the script of financial services by offering easy ways for financial services providers to create human-centric products that help people achieve their dreams\nSenior Product Manager\nAre you passionate about helping Financial Institutions empower consumers while growing their business? This is a full-time remote role for a Sr. Product Manager, who will focus on our Data Access product which enables financial institutions to leverage credit data, from credit scores and attributes to inform credit decisions to showing the credit score to the consumer.\nThis role will report to Christa Degnan | LinkedIn and join a small Product Management Team (CPO, 2 Senior Product Managers, and this role).\nThe Sr. Product Manager will oversee the product lifecycle, from ideation to launch, and ongoing product iteration based on user feedback and market trends. Responsibilities include defining product vision and strategy, prioritizing features, creating product roadmaps, and collaborating with cross-functional teams. Additionally, the Sr. Product Manager will analyze product performance metrics and ensure alignment with company objectives.\nData Access is at an inflection point where the bureau coverage is expanding, the product is moving upmarket into insights and AI, and there's a new consumer surface launching. It's a well-scoped product with high visibility and real near-term shipping opportunities, inside a company small enough that a Sr. PM will genuinely own outcomes.\nQualifications\n5 years of experience in Product Management, defining product vision and strategy, and creating product roadmap\nExperienced in building credit data solutions\nAPI-first architecture; ideally experience with credit data/decisioning or experience building or owning a data product that went from raw data delivery to layered insights\nProficiency in collaborating with cross-functional teams including engineering, design, and marketing\nSkills in market research and analyzing product performance metrics\nExcellent communication and leadership skills\nAbility to work independently and remotely\nExperience with API products and the fintech industry is a plus\nBachelor's degree in business, Computer Science, Engineering, or related field\nBloom Credit is an Equal Opportunity/Affirmative Action Employer. All qualified applicants will receive consideration for employment without regard to race, color, religion, sex, pregnancy, sexual orientation, gender identity, national origin, age, protected veteran status, or disability status.", "id": "connecticut_innovations_senior_product_manager_2026-06-28"}, {"metadata": {"title": "Senior Director of Product: Fax", "company": "Consensus Cloud Solutions", "match_score": 33, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["director of product"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills siness Impact", "matched": 6, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["retention", "acquisition", "arr", "scale", "b2b saas"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://es.linkedin.com/jobs/view/senior-product-manager-at-contentsquare-4417647926", "date_added": "2026-06-28", "source": "LinkedIn", "location": "Spain", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: Spain\n- Visit the link for full job details.\n\n### Full Job Description\nContentsquare is the all-in-one experience intelligence platform designed to be easily used by anyone who cares about digital journeys. With our flexible and scalable platform, organizations quickly get a deep understanding of their customers\u2019 whole online journey.\nWe are a global leader in the experience analytics space, with a growing presence across 15 offices worldwide. We\u2019re here to stay\u2014and we\u2019re looking for team members who are excited to drive impact and help us scale even further.\nOur aim is to create an inclusive workplace where everyone learns and succeeds. Contentsquare has built a community of individuals who are daring, understanding, and deliberate. We invite you to join us in making the complex simpler\u2014for our customers, their customers, and each other.\n Important note: Be careful of scammers pretending to be from Contentsquare. We will never ask for money or contact you through random texts. Any communication from our in house Talent Acquisition team will only ever come from our contentsquare.com or @contentsquare-ext.com domain. For more information, visit our careers blog. \n The Role \nWe're looking for a \n Senior Product Manager \n to own the strategy and execution of our \n Voice of Customer (VoC) \n product. VoC is a critical part of Contentsquare's qualitative analysis suite, enabling teams to launch AI-powered surveys, combining qualitative insights with quantitative analytics to fully understand user behavior. Your work will help connect the \"what\" of behavioral data with the \"why\" of direct user feedback.\nThis is a high-impact role at the intersection of customer research, AI innovation, and platform unification. You'll partner closely with an Engineering Manager and a team of five frontend and backend engineers, forming the core of a Product Trio that drives discovery and delivery for VoC. You'll also collaborate with teams across Conversation Intelligence, Experience Analytics, and our Sense AI platform to ensure VoC evolves as an integral part of the unified Contentsquare experience.\nThree strategic priorities define this role right now:\n Unified platform integration. Deepen VoC's connection to the broader Contentsquare platform, ensuring surveys, session replay, experience monitoring, and conversation intelligence work together seamlessly to give customers a single source of truth. \n AI-first product evolution. Push VoC toward an AI-first approach, leveraging Sense to automate survey creation, sentiment analysis, and insight delivery, making qualitative feedback faster and more accessible for every team. \n Qualitative analysis convergence. Strengthen the link between VoC and adjacent qualitative capabilities, including Conversation Intelligence to create a cohesive feedback and insights layer that spans on-site, conversational, and social channels. \nWhat You'll Do\n Strategic Product Leadership \n Define and own the product vision, strategy, and roadmap for VoC Surveys, balancing short-term execution with a 6 to 18-month strategic horizon \n Identify opportunities to deepen VoC's integration into the unified Contentsquare platform, ensuring the product delivers value as part of the full journey intelligence story \n Ruthlessly prioritize among competing goals, ensuring whole increments of product are delivered rather than half-finished initiatives \n Craft and communicate a compelling narrative for VoC's evolution to stakeholders, executives, and cross-functional partners \n Customer & Market Intelligence \n Conduct deep customer and market research to understand user needs, competitive dynamics, and emerging trends in qualitative analytics and VoC. \n Translate customer insights, field feedback, and usage data into a data-driven roadmap that maximizes value. \n Partner with design and engineering to drive discovery, validating hypotheses through research, prototyping, and experimentation. \n AI-First Product Development \n Champion an AI-first approach to VoC, working with Sense AI and Applied AI teams to embed intelligent automation across survey creation, analysis, and insight generation. \n Identify opportunities to apply AI and machine learning to surface patterns, predict sentiment, and reduce time-to-insight for customers. \n Cross-Functional Collaboration \n Partner daily with your Engineering Manager and team of five engineers as part of the Product Trio, ensuring alignment across discovery and delivery. \n Collaborate with other product teams across the company to drive platform-level synergy. \n Build strong relationships with Customer Success, Sales, and Marketing to ensure the product meets the needs of the market and supports go-to-market priorities. \n Product Performance & Execution \n Define product KPIs and success metrics; own performance tracking and use data to continuously inform roadmap decisions. \n Monitor product health, support ticket trends, and quality KPIs, prioritizing improvements that drive customer satisfaction and retention.\nWhat You'll Need To Succeed\n5+ years of product management experience in a B2B SaaS environment, with a track record of owning and scaling a product area end-to-end. \nStrong customer and market research skills, with demonstrated ability to synthesize qualitative and quantitative inputs into a compelling product strategy. \nExperience building AI-powered or data-intensive products, with genuine curiosity about how AI and machine learning can transform user experiences. \nProven roadmap ownership, including priority-setting across competing stakeholder needs, and the ability to balance tactical delivery with long-term vision. \nDeep comfort with data-driven decision making, including defining metrics, tracking performance, and using analytics to guide product direction. \nUnderstanding of both UX and data dimensions of product work, with the ability to partner effectively with designers and engineers. \nStrong cross-functional collaboration skills, with experience working closely with engineering, design, sales, and customer success in a distributed team. \nExcellent communication skills in English (written and verbal); ability to articulate complex ideas to both technical and non-technical audiences. \nExperience working with remote and international teams\n across time zones.\nWhat Makes You Stand Out\nExperience in VoC, customer feedback, survey platforms, or qualitative research tools \nBackground in conversational intelligence, NLP, or text analytics products \nFamiliarity with the digital experience analytics or experience intelligence space \nExperience driving product integration across a multi-product platform \nPrior work at the intersection of product management and applied AI \n Why you should join Contentsquare \nWe invest in our people through career development, mentorship, social events, philanthropic activities, and competitive benefits. We are always assessing the perks we offer to ensure we\u2019re aligned with the employees' needs.\nHere are a few we want to highlight:\n Virtual onboarding, Hackathon, and various opportunities to interact with your team and global colleagues both on and offsite each year\n Work flexibility: hybrid and remote work policies\n Generous paid time-off policy (every location is different)\n Lifestyle allowance\n A Culture Crew in every country we\u2019re based in to coordinate regular activities for employees to get to know each other and bond outside of work\n Every full-time employee receives stock options, allowing them to share in the company\u2019s success\n We have multiple Employee Resource Groups, that offer a safe space for individuals who share common identities, life experiences, or allyship to connect, support one another, and passionately advocate for the issues close to their hearts\n And more benefits tailored to each country\nContentsquare is an equal opportunity employer. Qualified applicants will receive consideration for employment without regard to sex, gender identity or expression, sexual orientation, race, color, religion, national origin, disability, protected veteran status, age, or any other characteristic protected by law.\nYour personal data is used by Contentsquare for recruitment purposes only. Read our \n \nJob Candidate Privacy Notice\n \n to find out more about data protection at Contentsquare and your rights. You can exercise your rights by using our dedicated Data Subject Rights Portal \n \nhere\n \n. \nYour personal data will be securely stored in our hosting provider\u2019s data center in Oregon (US west). We have implemented appropriate transfer mechanisms under applicable data protection laws.\nContentsquare may use AI-assisted tools to help review and screen applications. All decisions involving hiring are made by human reviewers, and your personal data will be processed in accordance with our \n \nCandidate Privacy Policy\n \n.\nWe may use artificial intelligence (AI) tools to support parts of the hiring process, such as reviewing applications, analyzing resumes, or assessing responses and identifying potential inconsistencies or verification signals in application materials based on available information. These tools assist our recruitment team but do not replace human judgment. Final hiring decisions are ultimately made by humans. If you would like more information about how your data is processed, please contact us.", "id": "contentsquare_senior_product_manager_2026-06-28"}, {"metadata": {"t ing internal teams to serve customers effectively and efficiently\n, while elevating the overall banking experience. You will own product outcomes for internal platforms, tools, and capabilities that enable customer service, operations, risk, and other internal teams to deliver seamless, high-quality customer experiences at scale.\nKey Responsibilities\nProduct Strategy & Vision\nDrive product strategy by identifying opportunities, defining clear goals, and aligning initiatives with clan and company objectives.\nTranslate business and customer needs into a clear product vision and roadmap, balancing short-term delivery with long-term impact.\nChampion customer-centric design to ensure internal products enhance team effectiveness and the overall customer experience.\nStakeholder Management & Leadership\nBuild trusted relationships across business, technology, operations, and leadership teams.\nNavigate complex organizational dynamics, proactively manage expectations, and balance competing priorities while maintaining product vision.\nFacilitate open communication, encourage diverse perspectives, and constructively resolve conflicts to drive alignment and progress.\nDelivery & Execution\nLead cross-functional teams to execute and deliver high-quality internal products efficiently.\nAlign tasks with strategy, manage resources effectively, and adapt plans as priorities evolve.\nData-Driven Decision Making\nPromote data-driven decision making by analyzing relevant data, identifying gaps, and validating assumptions.\nBalance deep analysis with rapid experiments to iterate quickly and inform prioritization.\nCustomer-Centric Design\nEnsure internal products are designed with the end customer in mind, improving both team efficiency and customer outcomes.\nWhat We're Looking For\nProven product leadership experience, ideally within digital banking, fintech, or regulated environments.\nTrack record of delivering internal platforms, tools, or enablement products that improve efficiency and customer outcomes.\nStrong analytical skills and experience using data to guide product decisions.\nExcellent communication skills with the ability to simplify complexity and align diverse teams.\nAbility to navigate organizational dynamics, build trust, and influence decisions at multiple levels.\nA customer-first mindset, understanding that great internal products lead to great customer experiences.\nWhy Join Us\nShape products that directly enable teams to serve customers better at scale.\nInfluence strategy, execution, and outcomes in a high-impact product leadership role.\nWork in a mission-driven digital bank focused on innovation, trust, and customer experience.", "id": "dkatalis_senior_product_manager_-_servicing_2026-06-28"}, {"metadata": {"title": "Product Owner (PayChat Utility Billing Service)", "company": "DOKU, PT NUSA SATU INTI ARTHA", "match_score": 59, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product owner", "product management"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Hard Skills", "matched": 1, "total": 24, "weight": 2, "pct": 20, "keywords_hit": ["requirements"]}, {"category": "Tools", "matched": 4, "total": 14, "weight": 1.5, "pct": 100, "keywords_hit": ["jira", "confluence", "figma", "notion"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 4, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["stakeholder", "collaboration", "communication", "problem-solving"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["jakarta"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/product-owner-paychat-utility-billing-service-at-doku-pt-nusa-satu-inti-artha-4423107005", "da ls", "matched": 3, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "collaboration"]}, {"category": "Location Preference", "matched": 4, "total": 12, "weight": 1.5, "pct": 100, "keywords_hit": ["remote", "distributed", "global", "worldwide"]}, {"category": "Business Impact", "matched": 2, "total": 16, "weight": 1.5, "pct": 50, "keywords_hit": ["growth", "scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://remoteok.com/remote-jobs/remote-staff-product-manager-product-information-management-highlevel-1133598", "date_added": "2026-06-18", "source": "RemoteOK", "location": "Remote", "work_type": "Remote"}, "body": "### Job Description\nAbout Us HighLevel is an AI-powered business operating system that gives agencies, entrepreneurs and SMBs the infrastructure to build, automate and scale. Today, HighLevel supports SMBs across 150+ countries, fueling community-driven growth rooted in real customer outcomes. To date, businesses operating on HighLevel have generated over $7 billion in ecosystem value, demonstrating the impact of shared infrastructure at scale. By centralizing conversations, automation and intelligence into one system, we help businesses move faster, reduce complexity and execute efficiently. Behind the platform, HighLevel powers more than 4 billion API hits and 2.5 billion message events daily. With 250 terabytes of distributed data, 250+ microservices and over 1 million domain names supported, our architecture is built for performance, resilience and long-term scalability. Our People With over 2,000 team members across 10+ countries, HighLevel operates as a global, remote-first organization built for speed and ownership. We value initiative, clarity and execution, creating space for ambitious people to build systems that support millions of businesses worldwide. Here, innovation thrives, ideas are celebrated and people come first, no matter where they call home. Our impact Every month, HighLevel enables more than 1.5 billion messages, 200 million leads and 20 million conversations for the more than 1 million businesses we support. Behind those numbers are real people building independence, expanding opportunity and creating measurable impact. We\u00e2\u0080\u0099re proud to be a part of that. Role Summary As the Staff Product Manager for Product Information Management, you will own the end-to-end vision, strategy, and execution of HighLevel\u00e2\u0080\u0099s PIM \u00e2\u0080\u0094 the foundational catalog layer that powers all commerce activity across the platform. Your mission is to lead a structural overhaul of our existing catalog infrastructure and build a world-class PIM that handles physical products, digital goods, and services at scale. This is not just the backbone of our Commerce charter; it is shared infrastructure consumed by multiple adjacent product teams, and the decisions you make here will have platform- wide impact. What You'll Do \u00e2\u0097\u008f Own the PIM Vision: Define and drive the end-to-end roadmap for HighLevel\u00e2\u0080\u0099s Product Information Management system \u00e2\u0080\u0094 from Items, Variants, and Catalog Items to Price Lists, Units of Measure, and multi-channel price resolution logic \u00e2\u0097\u008f Lead the Catalog Overhaul: Architect the migration from our existing catalog foundation to a robust, extensible PIM that supports the full breadth of HighLevel\u00e2\u0080\u0099s commerce use cases across product types and selling channels \u00e2\u0097\u008f Design for Multi-Team Consumption: Define clear API contracts and data models that serve not just the Commerce team, but adjacent teams building service-based and subscription-based product experiences \u00e2\u0080\u0094 ensuring every consumer can reliably depend on PIM as a platform \u00e2\u0097\u008f Drive Cross-Functional Alignment: Lead structured collaboration with engineering, design, and partner product teams to ensure PIM capabilities meet requirements across all consuming surfaces, resolving conflicting priorities with clarity and conviction \u00e2\u0097\u008f Shape Pricing Infrastructure: Own the strategy for multi-currency, rule-based, and channel- aware pricing \u00e2\u0080\u0094 ensuring the right price resolves correctly at every point of sale across all storefronts and channels \u00e2\u0097\u008f Champion the Merchant Experience: Translate complex catalog management requirements into intuitive workflows that allow merchants across industries \u00e2\u0080\u0094 from physical goods retailers to service providers \u00e2\u0080\u0094 to create, organize, and manage their offerings with ease \u00e2\u0097\u008f Set the Platform Standard: Establish foundational patterns and best practices that make the PIM a reliable, scalable service other teams can confidently build on, including documentation, versioning, and deprecation protocols \u00e2\u0097\u008f Influence the Broader Commerce Roadmap: Partner with", "id": "highlevel_staff_product_manager_product_information_management_2026-06-18"}, {"metadata": {"title": "Product Manager", "company": "Hitachi Energy", "match_score": 65, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product management"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Hard Skills", "matched": 3, "total": 24, "weight": 2, "pct": 60, "keywords_hit": ["roadmap", "requirements", "specifications"]}, {"category": "Tools", "matched": 1, "total": 14, "weight": 1.5, "pct": 33, "keywords_hit": ["analytics"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "rag"]}, {"category": "Soft Skills", "matched": 7, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "stakeholder", "collaboration", "communication"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "global"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://th.linkedin.com/jobs/view/product-manager-at-hitachi-energy-4430926518", "date_added": "2026-06-28", "source": "LinkedIn", "location": "Samut Prakan, Samut Prakan, Thailand", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: Samut Prakan, Samut Prakan, Thailand\n- Visit the link for full job details.\n\n### Full Job Description\nJob Title: Product Manager \nOpportunity\nAs a Product Manager, you will work under Regional Product Manager (RPM), Product Line (PL), Power Transformer (PT), HUB APMEA. Your role will focus on improving competitiveness, conducting benchmarking, monitoring technology trends, and supporting the development and execution of regional product strategies.\nThis position drives innovation by analyzing market trends, customer requirements, benchmarking internal and external offerings, and monitoring technology developments across portfolios to generate new ideas that strengthen competitiveness and improve the opportunities and solutions that keep the company ahead of market trends and competitors.\nWithin the Power Transformer Product Line, your primary responsibility will be to enhance competitiveness and support the RPM in tracking regional roadmaps across different portfolios. This will leverage your expertise in power transformer design, comprehensive understanding of project specifications, scheduling, cost estimation, and effective cross-functional collaboration with departments such as Engineering, Supply Chain Management (SCM), Marketing & Sales (M&S), Production, and Finance across 5 PT factories under APMEA. You will also be required to collaborate with the Global Product Managers (GPM) and Global TopGun (TG) Designers as necessary, depending on the specific circumstances. Additionally, you will be tasked with monitoring progress and performance as well as implementing necessary actions to successfully complete projects. The role allows you to develop solutions, collaborate with HUB APMEA PT teams and support the organization's long-term success in a competitive market.\nHow You\u2019ll Make An Impact\nDefine and implement regional product roadmap initiatives aligned with market demand across HUB APMEA.\nSupport the RPM in providing regional MRS including applicable business case to GPMs and business case for R&D initiatives.\nEnhancing competitiveness by delivering solutions that fulfill customer requirements and align with industry standards, including the optimization of transformer designs and all associated costs. Leading the implementation, validating savings and business cases for DtV projects.\nYou will be responsible for reviewing designs, facilitating design concept evaluations, and collaborating with different stakeholders as necessary to achieve competitiveness for PT factories within HUB APMEA.\nYou will work closely with the M&S team to assess and reach consensus on strategic opportunities required to enhance competitiveness and systematically track progress initiatives with relevant teams. Maintain a thorough understanding of both market conditions and competitor strengths and weaknesses.\nMaintain alignment with regional competitiveness initiatives, you will coordinate with various cross-functional departments, including Engineering, Supply Chain Management (SCM), Marketing & Sales (M&S) and Production across five PT factories within APMEA. Additionally, collaboration with the Global Product Specialist (GPS) and Global TopGun (TG) Designers may be required depending on specific project circumstances.\nYou will provide support to the Regional Product Manager (RPM) in implementing frameworks and strategies for Power Transformer under HUB APMEA.\nDevelop training programs for stakeholders.\nEnsure all activities adhere to internal and external policies and regulations relevant to regional product management and competitive analysis.\nLiving Hitachi Energy's core values of safety and integrity, which means taking responsibility for your own actions while caring for your colleagues and the business.\nYour Background\nYou have a bachelor's degree in electrical or mechanical engineering, while holding a master's degree would be considered an asset.\nA minimum of five years\u2019 experience in an engineering role, ideally in the power transformer industry, is required. Having knowledge of product analytics and competitive analysis skills are considered advantageous.\nStrong technical understanding of manufacturing process of power transformer and industry technologies to effectively work on competitiveness programs.\nIn-depth understanding of engineering software tools and have an ability to develop and generate new creative ideas to enhance competitiveness for power transformer.\nUnderstanding of analytical and quantitative skills with expertise in data analysis tools (e.g., Excel, Power BI, etc.).\nGood communication and presentation skills; adapt at translating complex data into actionable strategies.\nStrong problem-solving abilities and a proactive, innovative approach. Exceptional attention to detail and commitment to high-quality outcomes.\nDemonstrated ability to work collaboratively in cross-functional and regionally diverse teams.\nPublication date : 2026-06-19", "id": "hitachi_energy_product_manager_2026-06-28"}, {"metadata": {"title": "Head of Insurance Product", "company": "Home Credit Indonesia", "match_score": 28, "score_breakdown": [{"category": "Domain Match", "matched": 2, "total": 17, "weight": 2, "pct": 50, "keywords_hit": ["ai", "insurance"]}, {"category": "Hard Skills", "matched": 2, "total": 24, "weight": 2, "pct": 40, "keywords_hit": ["roadmap", "requirements"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": evaluation frameworks, golden datasets, and quality rubrics to measure and enhance AI system performance and reliability.\nCollaborate closely with applied AI, ML, and engineering teams to prototype, test, and refine model behaviors and prompt architectures.\nDrive end-to-end product delivery from early experimentation through production deployment and in-market adoption.\nPartner cross-functionally across product, data, and engineering teams to align strategy, remove blockers, and ensure cohesive system design.\nContinuously analyze and optimize model performance, system accuracy, and user impact to improve AI-driven decision-making quality.\nAct as a technical leader and thought partner, influencing architecture decisions and guiding teams toward scalable AI solutions.\nChampion best practices in AI product development, ensuring rigor, reliability, and customer-centric outcomes.\nRequirements\n7+ years of product management experience, including significant ownership of AI/ML-powered products in production environments.\nHands-on experience building or scaling AI systems, including LLMs, agentic workflows, or data-intensive intelligence platforms.\nStrong technical fluency with the ability to engage deeply on system architecture, data modeling, and machine learning concepts.\nExperience designing structured data systems, context layers, or intelligence frameworks that support AI decision-making.\nProven track record of building evaluation systems, feedback loops, and metrics to ensure AI quality and reliability at scale.\nDemonstrated ability to ship complex, ambiguous products in fast-paced, experimental environments.\nStrong understanding of frontier model capabilities and limitations, with experience moving from prototype to production.\nFirst-principles thinker with the ability to define new product categories and approaches in emerging AI domains.\nStrong execution mindset with the ability to independently build prototypes, validate ideas, and drive end-to-end delivery.\nExcellent communication skills with the ability to translate complex AI concepts into clear product narratives.\nPrior experience in MarTech, customer engagement platforms, or marketing automation is highly preferred.\nDemonstrated ability to collaborate effectively across technical and non-technical stakeholders without relying on formal authority.\nBenefits\nCompetitive annual salary ranging from $208,000 to $286,000, based on experience, location, and qualifications (excluding bonus, equity, and additional incentives).\nComprehensive health and wellness coverage, including medical, dental, vision, and telehealth access.\nMental health and wellness support, including subscriptions to wellbeing platforms.\nGenerous open PTO policy supporting work-life balance and flexibility.\n401(k) retirement plan with competitive company matching and immediate vesting.\nProfessional development support, including access to learning platforms and career growth programs.\nRemote-friendly work environment with additional stipends for home office or commuter support.\nLong-term career incentives, including sabbatical opportunities after extended tenure.\nCollaborative, innovation-driven culture focused on experimentation and continuous improvement.\nOpportunity to work on cutting-edge AI systems shaping the future of autonomous marketing.\nHow Jobgether Works\nWe use an \nAI-powered matching process\n to ensure your application is reviewed quickly, objectively, and fairly against the role's core requirements. Our system identifies the top-fitting candidates, and this shortlist is then shared directly with the hiring company. The final decision and next steps (interviews, assessments) are managed by their internal team.\nWe appreciate your interest and wish you the best!\n Why Apply Through Jobgether?\nData Privacy Notice:\n By submitting your application, you acknowledge that Jobgether will process your personal data to evaluate your candidacy and share relevant information with the hiring employer. This processing is based on legitimate interest and pre-contractual measures under applicable data protection laws (including GDPR). You may exercise your rights (access, rectification, erasure, objection) at any time.\nWe may use artificial intelligence (AI) tools to support parts of the hiring process, such as reviewing applications, analyzing resumes, or assessing responses and identifying potential inconsistencies or verification signals in application materials based on available information. These tools assist our recruitment team but do not replace human judgment. Final hiring decisions are ultimately made by humans. If you would like more information about how your data is processed, please contact us.", "id": "jobgether_principal_product_manager_2026-06-28"}, {"metadata": {"title": "Senior Product Manager", "company": "Josys", "match_score": 68, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "senior product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}], "description_quality": "thin", "status": "Ready to Apply", "url": "https://in.linkedin.com/jobs/view/senior-product-manager-at-josys-4425371656", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Bengaluru, Karnataka, India", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: Bengaluru, Karnataka, India\n- Visit the link for full job details.", "id": "josys_senior_product_manager_2026-06-22"}, {"metadata": {"title": "Product Manager", "company": "JoVE", "match_sco
