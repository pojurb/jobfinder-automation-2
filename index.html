"matched": 3, "total": 14, "weight": 1.5, "pct": 100, "keywords_hit": ["sql", "amplitude", "mixpanel"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "rag"]}, {"category": "Soft Skills", "matched": 3, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["remote", "leadership", "strategic"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Business Impact", "matched": 5, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["growth", "retention", "conversion", "gmv", "scale"]}], "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/senior-product-manager-growth-at-alt-4378657397", "date_added": "2026-06-26", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: United States\n- Visit the link for full job details.\n\n### Full Job Description\nAlt is unlocking the value of alternative assets, starting with the $5 B trading-card market. We let collectors buy, sell, vault, and finance their cards in one place and we are backed by leaders at Stripe, Coinbase, Seven Seven Six, and pro athletes like Tom Brady and Giannis Antetokounmpo. Our next frontier is real-time pricing at scale—the Alt Value that powers every trade, loan, and product on the platform.\nMission:\n Own the systems that turn Alt into the default platform for buying and selling high-value collectibles — more submissions, more active buyers, faster liquidity.\nNorthstar Metrics:\n Submission Volume + Search-to-Bid Conversion\nOverview\nWe're hiring a Product Lead to own Alt's growth engine. That means the full seller submission funnel, buyer search and discovery, and the experimentation infrastructure that compounds both over time.You will ship product changes, define experiments, partner with Engineering and Data daily, and hold yourself accountable to outcomes — not outputs. You'll report directly to the CEO and work alongside a small, highly capable team that moves fast and expects the same.Alt is at an inflection point. We've built real pricing infrastructure — Alt Value — that no competitor can match. We have strong seller awareness and a compelling value proposition. What we need now is a PM who can turn that foundation into a compounding growth engine: closing funnel gaps, activating and reactivating our highest-value sellers, and building the discovery and search experiences that bring buyers back every week.If you want to own a growth surface at a high-velocity marketplace with a clear business model, a real data moat, and the autonomy to build from scratch — this is the role.\nWhy This Role Exists\nSubmissions are the lifeblood of Alt's business. Every graded card that comes through the platform starts with a seller decision. We've built strong top-of-funnel awareness and an increasingly compelling value proposition — Snap to Sell, upfront cash advances, world-class auction outcomes. But the product systems that activate, retain, and reactivate our highest-value sellers are still early.\nOn the buyer side, Alt processes thousands of search queries every day. The quality of search, discovery, and recommendation directly determines whether buyers find what they want and bid with confidence. We have the pricing data to power a world-class discovery experience. We need a PM to build it.\nToday, too much of this system runs on manual outreach and intuition. We need a dedicated product leader to own growth as a discipline — running experiments, closing funnel gaps, and building systems that scale without linear headcount growth.\nWhat You'll Own\n Submission Funnel — Seller Activation & Retention\nOwn the end-to-end seller journey from first submission to high-frequency, high-value seller\nIdentify and close drop-off points across onboarding, Snap to Sell, quote acceptance, vault intake, and resubmission\nBuild product-led experiences that activate dormant sellers and increase submission frequency among our dealer segment — without requiring manual outreach\nPartner with Data and Lifecycle to deploy behavioral triggers and personalized experiences that drive submissions at scale\n Search, Discovery & Buyer Conversion\nOwn search quality, card discovery, and browse experiences across the platform\nDrive search-to-bid conversion through better ranking, filtering, recommendations, and real-time Alt Value pricing context\nSurface the right cards to the right buyers at the right moment\nDefine and run a disciplined experimentation roadmap across all buyer-facing discovery surfaces\n Experimentation & Growth Infrastructure\nOwn the experimentation framework across the platform — hypothesis definition, test design, metric selection, and decision rules\nRun high-velocity A/B tests across onboarding, activation, search, and submission flows\nBuild a compounding library of experiment learnings the full product team can leverage\nPartner tightly with the data team on infrastructure to ensure fast, reliable experimentation\n Marketplace Liquidity & Supply-Demand Balance\nMonitor and improve marketplace health — submission volume, listing rates, bid depth, and sell-through\nIdentify supply and demand imbalances by card category, price tier, and seller segment and build product solutions to address them\nUse Alt Value pricing data as a growth lever — surfacing market signals to sellers and buyers that drive action\n Roadmap, Prioritization & Business Impact\nBuild and own the quarterly Growth roadmap tied directly to submission volume, buyer conversion, and time-to-liquidity\nPartner with Engineering, Design, Data, Lifecycle, and Ops to ship continuously\nOperate at both the tactical level (funnel details, experiment results, edge cases) and the strategic level (what bets we're making and why)\nCommunicate tradeoffs and progress clearly to the CEO and leadership team\nNorthstar\nMetrics You'll Own:\nSubmission volume (weekly, by seller segment)\nSearch-to-bid conversion rate\nKPIs\nSnap to Sell activation rate (first submission)\nSeller reactivation rate (submissions from dormant sellers)\nDaily active search query volume\nListing rate (vaulted inventory → live on marketplace)\nExperiment velocity (tests launched and decided per quarter)\nDealer segment submission frequency and GMV\nWhat Great Looks Like (6 Months)\nMeasurable increase in weekly submission volume driven by product changes, not headcount\nA live experimentation program running 3-5 concurrent tests across growth surfaces\nSnap to Sell activation rate meaningfully improved through onboarding and product flow changes\nSearch-to-bid conversion up through better discovery and Alt Value pricing context\nA dealer reactivation product that runs without manual outreach\nA growth roadmap that Engineering, Data, and leadership actively use to prioritize\nWhat We're Looking For\n5-8+ years of Product Management experience with clear ownership of a growth surface, marketplace funnel, or PLG motion\nDemonstrated track record of driving measurable business outcomes through product experimentation and iteration\nStrong data fluency — Amplitude, Mixpanel, or similar, plus SQL or Python\nExperience partnering directly with Engineering and Data to build growth infrastructure, not just features\nDeep understanding of two-sided marketplace dynamics\nScrappy, high-ownership operator who communicates with precision and moves without hand-holding\nBonus\nExperience in collectibles, luxury goods, financial assets, or other high-value trust-sensitive marketplaces\nFamiliarity with lifecycle tooling and how product and lifecycle intersect\nExperience with AI-assisted personalization, recommendation systems, or search ranking\nBackground in operationally complex environments where physical and digital systems connect\nWhat You’ll Get From Us\nA seat at the table to help shape the future of Alt and the alternative asset space\nAutonomy and ownership on projects that matter\n$100/month work-from-home stipend\n$200/month wellness stipend\nWeWork office stipend\n401(k) retirement benefits\nFlexible vacation policy\nGenerous paid parental leave\nCompetitive healthcare benefits, including HSA, for you and your dependent(s)\nBase salary range: \n$180,000 - $230,000, plus equity. Offers may vary based on experience, location, and other factors.", "id": "alt_senior_product_manager-growth_2026-06-26"}, {"metadata": {"title": "Growth Product Manager", "company": "AltaML", "match_score": 59, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product management"]}, {"category": "Domain Match", "matched": 4, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["saas", "b2b", "ai", "platform"]}, {"category": "Hard Skills", "matched": 3, "total": 24, "weight": 2, "pct": 60, "keywords_hit": ["roadmap", "onboarding", "retention"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 4, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "leadership", "communication"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Business Impact", "matched": 4, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["growth", "retention", "scale", "b2b saas"]}], "status": "Ready to Apply", "url": "https://remoteok.com/remote-jobs/remote-growth-product-manager-altaml-1133729", "date_added": "2026-06-20", "source": "RemoteOK", "location": "Canada", "work_type": "Remote"}, "body": "### Job Description\nAbout the Role Most product managers learn about customers secondhand, through tickets, surveys, and sales calls. This role is different. At Brilliant Harvest, our customers are heavy equipment dealerships. Their customers are farmers and construction equipment operators. Growth Product Manager owns the product surface that turns a newly signed dealer into an active, self-sufficient one and then into a reference customer. That means building the features, flows, and feedback loops that drive activation and retention, informed by being in the field with the people actually using the product. This is a growth role, but customer success is in its DNA. You'll work closely with our CS team but your job is to take what that world surfaces and turn it into product decisions that scale. \\n Key Responsibilities Own the Growth Loop Define and own product growth metrics: activation rates, feature adoption, time-to-value, and retention across the dealer base. Identify where dealers stall in the product journey and build solutions, whether that's a better onboarding flow, an in-app prompt, or a new feature that removes a blocker. Design and run experiments to improve adoption. Prioritize ruthlessly based on what moves the metrics. Work with Engineering, Design, and Technical Product Managers to ship growth features fast and learn from them. Customer Understanding &amp; Feedback Loop You genuinely understand customer success not as a concept, but as something you've lived. You've been in the field. You've sat with customers through the messy middle, after the deal is signed and before they're actually running on their own. Understand the dealership business model, including key metrics, operational pressures, and day-to-day workflows. Additionally, maintain a deep understanding of the end userâsuch as farmers and operatorsâto ensure the platform effectively addresses their needs. Translate what you hear in the field into structured product insight. Not a running list of complaints, real signal that drives roadmap decisions. Be the connective tissue between what CS experiences with customers and what the engineering team builds. Close that loop. Product-Led Customer Enablement&nbsp; Design onboarding, education, and activation experiences as core product features to accelerate time-to-value, reduce user friction, and minimize support dependency. Collaborate cross-functionally with CS to identify and resolve process bottlenecks, decreasing implementation risk and shortening iteration cycles. Capture customer victories and transform them into actionable product insights, ensuring that users continuously inform the roadmap to prioritize high-value impact. Product Communication Write product updates and dealer-facing communications that actually land,&nbsp; the kind a service writer would read and understand. Make sure customer feedback has a home in the product process, not just a running channel somewhere. Qualifications &amp; Skills 3â5 years in product management, with experience owning growth, activation, or retention metrics â ideally in a B2B SaaS environment. Background in customer success, account management, or field enablement, you've been in front of customers through the hard parts, not just analyzed them from a distance. B2B2C experience: you understand what it means to drive value at two layers of a customer relationship simultaneously. Familiarity with how equipment dealerships operate is a strong plus, service departments, parts counters, the way things actually work on the floor. Proven ability to influence without authority, cross-functionally, and with customers who didn't ask for change. Comfortable with ambiguity. You define the problem, find the signal, and decide what to build â without waiting to be told. Strong communicator, written and verbal. You can present to a shop floor crew or a leadership team and adjust accordingly. Data-literate. You know how to set up a metric, interpret results, and change course b", "id": "altaml_growth_product_manager_2026-06-20"}, {"metadata": {"title": "Product Tunaiku Circle Lead", "company": "Amar Bank", "match_score": 62, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weigh .\nJoining Amartha means working on some of Indonesia's most meaningful and complex challenges at the intersection of fintech, technology, operations and social impact - while helping shape the future of financial access for underserved communities.\nWhy This Role Matters\nAmartha serves millions of underserved customers across Indonesia through a unique combination of digital products and field operations. As we scale, we see a significant opportunity to reimagine customer and operational experiences through AI-native products and automation. We believe AI can transform how we serve our customers, increase field productivity and reduce operational costs.\nWe are looking for a Senior AI Product Manager who will own the product strategy and execution for AI-powered customer support, service automation and operational digitization initiatives across the organization. The goal is not experimentation - it is delivering measurable improvements in customer satisfaction, resolution speed, operational efficiency and scalability.\nKey Responsibilities\nOwn the Customer Support product domain - including AI-powered self-service experiences, agent copilots, service operations platforms and workflow automation tools\nDrive AI-powered customer and operational transformation - Identify, prioritize and deliver AI and automated solutions that improve customer experience, field productivity and operational efficiency\nOwn product strategy and execution - Define product strategy, roadmap, prioritization, success metrics and drive delivery from concept to measurable business impact\nTranslate emerging AI capabilities into scalable business solutions - Assess new technologies and identify high-impact applications across customer and operational workflows\nThis role is likely a strong fit if you:\nHave successfully launched AI-powered products, not just explored AI use cases\nEnjoy solving customer and operational problems through technology and automation\nBalance strategic thinking with hands-on execution\nThrive in ambiguity and rapidly evolving environments\nRequirements\n4-7+ years of Product Management experience\nHands-on experience building and scaling AI-powered products, agents or automation platforms\nStrong understanding of Generative AI, LLMs, AI agents, and workflow automation\nStrong product execution, stakeholder management and prioritization skills\nExperience working cross-functionally with engineering, data, operations and business teams\nStartup, technology or fintech experience preferred\nTypical backgrounds include\nSenior Product Manager leading AI initiatives\nProduct leaders driving automation or customer experience transformation\nBuilders who have launched AI-native products or platforms\nAt Amartha, we are dedicated to creating a workplace that celebrates diversity, ensures equity, and fosters inclusion. We believe that diverse perspectives - shaped by factors such as gender, age, race, ethnicity, education, culture, and life experiences - drive innovation and growth.\nWe actively welcome individuals from all backgrounds to join us in building an environment where everyone feels respected, valued, and empowered. Our commitment is to provide equal opportunities and foster a sense of belonging that enables our employees to thrive and make meaningful contributions.", "id": "amartha_financial_senior_ai_product_manager_-_customer_operations_automation_2026-06-26"}, {"metadata": {"title": "Product Manager / GTM Eufy", "company": "ANKER INDONESIA", "match_score": 37, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product management"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Hard Skills", "matched": 1, "total": 24, "weight": 2, "pct": 20, "keywords_hit": ["requirements"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keyw rong cross‑functional leadership, and the ability to influence decisions at the highest levels of the organization. You will define the product vision for complex, multi‑team capabilities and guide PMs and engineering leaders to deliver scalable, innovative payment solutions.\nThis position is ideal for someone who operates as a thought leader, a strategic problem solver, and a connector across organizational boundaries. T\nKey Responsibilities\nStrategic Product Leadership\nOwn the long-term strategy for a major platform capability, cross-product domain, or enterprise-level initiative.\nBuild and champion a clear vision that aligns to our clients multi-year business goals.\nIdentify market shifts, emerging technologies, and regulatory trends to shape proactive product evolution.\nDevelop high-impact business cases to secure executive alignment and investment.\nCross-Functional Alignment & Influence\nAct as a senior partner to Engineering, Architecture, Compliance, Risk, Operations, and Commercial Leadership.\nDrive alignment across multiple product lines, ensuring cohesive prioritization and technical direction.\nPresent strategy, progress, and recommendations to senior leadership and executive teams.\nComplex Program Leadership\nBreak down large, ambiguous problem spaces into clear, actionable initiatives for multiple teams.\nGuide PMs and POs in defining epics, features, goals, and dependencies.\nAnticipate organizational, technical, regulatory, and operational challenges early and create mitigation strategies.\nEnsure cross-team delivery success for mission-critical initiatives.\nCustomer, Market & Industry Expertise\nDeeply understand customer needs, competitive dynamics, partner ecosystems, and payment industry trends.\nEstablish the problem definition and strategic framing for entire product domains.\nRepresent our client externally with partners, clients, and industry groups as a domain expert.\nTechnical & Architectural Leadership\nPartner with engineering e_added": "2026-06-26", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: United States\n- Visit the link for full job details.\n\n### Full Job Description\nThe Senior Product Manager will empower our engineering and design teams to do their best work. They will manage sprints, feature stories, design mocks, customer research, market research, and product roadmaps while helping us develop our product strategy.\nResponsibilities: \nManage Jira epics & stories to empower engineers and designers to do their best work\nHelp the team complete 90% of roadmap features on time\nLead the planning and execution of user research\nHelp determine what new feature(s) to build in H2 2026 and beyond\nAchieve a 40% survey result from customers (i.e. this is our internal benchmark that makes it clear we have excellent product-market-fit)\nUtilize data across our apps to understand the strengths and weaknesses of the product\nGather and analyze product feedback directly from customers. Use the feedback to prioritize the roadmap and help us achieve our sales and retention goals\nRequirements\n5+ years of Product Management experience, with a proven track record of delivering successful products that drive measurable impact\nEnd-to-end product ownership experience, from ideation and specification through development, release, analysis, and iteration\nPassion for customer research, deeply committed to understanding user needs through qualitative and quantitative insights, including conducting user interviews, analyzing behavioral data, and uncovering feature opportunities to validate ideas\nStrong alignment with Jobs to Be Done (JTBD), ensuring product decisions align with Applause's Product Vision Statement and drive meaningful outcomes\nData-driven decision-making expertise, utilizing user tracking and product analytics tools such as Pendo to inform strategy and measure success\nExceptional communication skills, with the ability to effectively engage stakeholders at all levels, from frontline employees to executives, both within and outside the organization\nCollaborative and leadership-oriented, thriving in team environments, working cross-functionally with multiple stakeholders, and stepping into leadership roles as needed to drive alignment and execution\nBenefits\nBenefits: \n100% remote w/ no office mandate | Unlimited PTO | 20 official company holidays | Health care | Life insurance | Stock options | Amazing colleagues | Energetic culture that is positive and celebrates together | Inspiring mission & software product | Ability to grow your career by being early in a fast-growing tech startup", "id": "applause_senior_product_manager_2026-06-26"}, {"metadata": {"title": "Senior Product Manager", "company": "AppsForBharat", "match_score": 82, "score_breakdown": [{"category": "Role Match", "matched": 4, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "senior product manager", "product lead", "product management"]}, {"category": "Domain Match", "matched": 5, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["ai", "platform", "digital products", "startup", "e-commerce"]}, {"category": "Hard Skills", "matched": 9, "total": 24, "weight": 2, "pct": 100, "keywords_hit": ["roadmap", "data-driven", "user research", "kpi", "requirements"]}, {"category": "Tools", "matched": 1, "total": 14, "weight": 1.5, "pct": 33, "keywords_hit": ["analytics"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "rag"]}, {"category": "Soft Skills", "matched": 7, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "stakeholder", "leadership", "communication"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "worldwide"]}, {"category": "Business Impact", "matched": 9, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["revenue", "growth", "retention", "acquisition", "conversion"]}], "status": "Ready to Apply", "url": "https://in.linkedin.com/jobs/view/senior-product-manager-at-appsforbharat-4417559467", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Bengaluru, Karnataka, India", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: Bengaluru, Karnataka, India\n- Visit the link for full job details.\n\n### Full Job Description\nAbout AppsForBharat (Sri Mandir App)\nAppsForBharat, a series C-funded faith-tech startup, is backed by India’s best venture capital investors including Fundamentum, Susquehanna Asia VC, Peak XV partners (prev. Sequoia Capital), Elevation Capital, & BEENEXT. Our highly ambitious and audacious team comprises alumni from prestigious institutions like IITs & IIMs, with extensive experience in scaling high-growth startups. We're dedicated to developing mobile and web apps catering to the devotional and spiritual needs of 100s of millions of users across the globe.\nOur flagship product, Sri Mandir, launched in November 2020, is the world’s largest app for Hindu devotees. It serves as a digital sanctuary for millions of devotees worldwide. Our mission is to enrich individuals' spiritual lives through innovative technology, offering seamless access to sacred pilgrims & rituals, divine teachings, and a vibrant community. The overwhelming user love motivates us as we aim to serve 100s of millions more in the coming years.\nThe devotion market is a $44B opportunity in India (growing at 10% CAGR), which is primarily offline and unorganised. Of the $44B, the temples drive GMV of ~$27B in temple offerings, services, and commerce. There are 2M+ temples in India - about 10k of these temples have a strong historical and cultural significance. Tourism to these religious places is a $10B opportunity. The Sri Mandir app is the world’s largest app for Hindu devotees and growing 20-25% month-on-month. Learn more about AppsForBharat: Business World Article, Indian Silicon Valley Podcast, YourStory Article Try the Sri Mandir app: Android / iOS\nRole Overview For Senior Product Manager (Acquisition & Monetisation)\nAs Senior Product Manager, you’ll own the product lifecycle end-to-end—from vision to execution. You’ll\nwork with leadership to define the roadmap, drive data-backed decisions, and deliver impactful\nexperiences for millions of users. This is a high-ownership role, requiring strategic thinking, strong\nexecution, and deep empathy for users.\nKey Responsibilities\nProduct Vision & Strategy: Define and own product roadmap for your charter aligned with\ncompany goals.\nData-Driven Decision Making: Leverage analytics, user research, and market insights to identify\nproblems, opportunities and improve product KPIs.\nEnd-to-End Ownership: Lead the product lifecycle - from concept, requirements gathering, and\nprioritisation to launch and post-launch optimisation.\nUser-Centric Design: Partner with UX/UI teams to deliver intuitive and delightful user experience.\nCross-Functional Leadership: Collaborate with engineering, design, marketing, and operations to\nexecute product initiatives with confidence.\nPerformance Optimisation: Monitor KPIs, and iterate to drive conversion, retention, and revenue.\nMarket Awareness: Stay ahead of trends, competitors, and emerging technologies to maintain\nproduct leadership.\nWhat You Bring\nEducation: Engineering or Management degree from a premier institute — IIT, BITS Pilani, IIM,\nISB preferred.\nExperience: Must have minimum 4+ years of core B2C product management experience, with\nmeasurable impact on Revenue, ARPU, Conversion Rate, Repeat Transactions, Retention,\nand Engagement.\nPast KPIs must include Revenue, Conversion, ARPU, and Repeat Transactions.\nProven track record of delivering impactful digital products in high-growth environments.\nStrong analytical skills with expertise in interpreting complex datasets.\nExcellent communication and stakeholder management skills.\nBonus Points\nPast Founding or Entrepreneurship experience\nNice to have: Experience managing products on both App and Web platforms.\nExperience in e-commerce or supply chain product ecosystems.\nWhy You’ll Love It Here\nBuild India’s next-generation devotional products from the ground up\nTrue end-to-end ownership: idea, build, launch, scale\nHighly collaborative, autonomous work culture\nCompetitive package with performance incentives\nWhy AppsForBharat?\nWe’re Not Just Another Startup. We’re a Movement. Here’s Why You’ll Love Being a Part Of It\nCompetitive compensation and performance-based incentives.\nAmbitious work environment with opportunities for professional growth.\nAccess to a vibrant network of professionals passionate about spirituality and\ntechnology.\nHealth & Wellness Benefits to ensure your and your family’s well-being.\nA Serene, Pet-Friendly & Peaceful Office located in the heart of HSR Layout\nDo your most meaningful work alongside us. Be a part of something big!", "id": "appsforbharat_senior_product_manager_2026-06-22"}, {"metadata": {"title": "Product Manager", "company": "Artajasa Pembayaran Elektronis", "match_score": 21, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["indonesia", "hybrid"]}], "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/product-manager-at-artajasa-pembayaran-elektronis-4424350340", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Kota Tangerang Selatan, Banten, Indonesia", "work_type": "Hybrid"}, "body": "### LinkedIn Job\n- **Location**: Kota Tangerang Selatan o automate property access, operations, and security from a single platform. Our products are installed in more than 20,000+ multifamily, commercial, gated communities, and student-housing properties worldwide, including properties developed, owned, and managed by the most trusted names in real estate. Our features are designed for developers, owners, property managers, and tenants and our products lower operating costs and improve tenant satisfaction. Our Solution: Developers and owners no longer need to run building wiring or install in-unit hardware. Property managers can grant building access, revoke permissions, and review entry logs from an online dashboard. Residents can open doors from their smartphones, issue visitor access, and see who is trying to enter the building. Our Culture & Values: Fantastic people are the key to our success. As a distributed, primarily remote workforce, weâre looking for more intelligent, passionate, collaborative, ai-forward, and down-to-earth individuals to join our growing team. Weâre driven by a shared commitment to excellence and innovation, grounded in our core values: We delight our customers, We take ownership, We are a community of collaborators, We speak up, We think big and do small, and We are tenacious. ButterflyMX is hiring a Principal PM who thinks at the intersection of funnels and customer experience. This role is about understanding how people move through a decision process, where they drop off, and what it takes to earn the next step. You'll own a product area that spans two connected user groups, one experiencing that journey firsthand, the other managing and optimizing it on the other side. We have an early roadmap to build from, but we need someone to pressure-test it, sharpen it, and own it. The right person for this role brings consumer product instincts, deep familiarity with AI-driven workflow automation, and a genuine obsession with conversion. Responsibilities: Take ownership of the product roadmap gside the engineering team, the head of product and product team, the CEO and the CTO.\n- Technologies: Javascript (ES6), React, GraphQL on the front end. Go, GRPC, Kubernetes, MySQL and M3DB (distributed time series database) on the back end.\n- Senior UX Designer:\n- We&#x27;re looking for a UX designer to help build Chronosphere. You will drive and complete the design process for our cloud web application from beginning to end. You will work with multiple teams to design a clean, usable console focusing on metrics, data visualization, altering, dashboards, infrastructure, and more. We are open to this role being in either New York or our Bellevue, Washington office. You will work alongside the head of product, the engineering team, the CEO and the CTO.\n- What we offer: Excellent benefits, competitive pay and equity at Series A, flexible working environment, challenging problems at scale and pragmatically harnessing millions of instrumentation being collected per second.\n- Senior Frontend Engineer:\n- https:&#x2F;&#x2F;boards.greenhouse.io&#x2F;chronosphere&#x2F;jobs&#x2F;4012681003\n- Senior UX Designer:\n- https:&#x2F;&#x2F;boards.greenhouse.io&#x2F;chronosphere&#x2F;jobs&#x2F;4012682003\n- Email me with questions at rob at chronosphere.io\n- Regarding remote for now: If you are applying to work in the NYC or Seattle office you are not expected to interview in person (it will be remote), or work in person until the CV-19 crisis is resolved (work will be remote). The roles are not remote, but no one is in the office currently.", "id": "chronosphere_product_manager_2026-06-22"}, {"metadata": {"title": "Senior Product Manager, Exchange", "company": "Cint", "match_score": 26, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "senior product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Sk urs and SMBs the infrastructure to build, automate and scale. Today, HighLevel supports SMBs across 150+ countries, fueling community-driven growth rooted in real customer outcomes. To date, businesses operating on HighLevel have generated over $7 billion in ecosystem value, demonstrating the impact of shared infrastructure at scale. By centralizing conversations, automation and intelligence into one system, we help businesses move faster, reduce complexity and execute efficiently. Behind the platform, HighLevel powers more than 4 billion API hits and 2.5 billion message events daily. With 250 terabytes of distributed data, 250+ microservices and over 1 million domain names supported, our architecture is built for performance, resilience and long-term scalability. Our People With over 2,000 team members across 10+ countries, HighLevel operates as a global, remote-first organization built for speed and ownership. We value initiative, clarity and execution, creating space for ambitious people to build systems that support millions of businesses worldwide. Here, innovation thrives, ideas are celebrated and people come first, no matter where they call home. Our impact Every month, HighLevel enables more than 1.5 billion messages, 200 million leads and 20 million conversations for the more than 1 million businesses we support. Behind those numbers are real people building independence, expanding opportunity and creating measurable impact. Weâre proud to be a part of that. Role Summary As the Staff Product Manager for Product Information Management, you will own the end-to-end vision, strategy, and execution of HighLevelâs PIM â the foundational catalog layer that powers all commerce activity across the platform. Your mission is to lead a structural overhaul of our existing catalog infrastructure and build a world-class PIM that handles physical products, digital goods, and services at scale. This is not just the backbone of our Commerce charter; it is shared infrastructure consumed by multiple adjacent product teams, and the decisions you make here will have platform- wide impact. What You'll Do â Own the PIM Vision: Define and drive the end-to-end roadmap for HighLevelâs Product Information Management system â from Items, Variants, and Catalog Items to Price Lists, Units of Measure, and multi-channel price resolution logic â Lead the Catalog Overhaul: Architect the migration from our existing catalog foundation to a robust, extensible PIM that supports the full breadth of HighLevelâs commerce use cases across product types and selling channels â Design for Multi-Team Consumption: Define clear API contracts and data models that serve not just the Commerce team, but adjacent teams building service-based and subscription-based product experiences â ensuring every consumer can reliably depend on PIM as a platform â Drive Cross-Functional Alignment: Lead structured collaboration with engineering, design, and partner product teams to ensure PIM capabilities meet requirements across all consuming surfaces, resolving conflicting priorities with clarity and conviction â Shape Pricing Infrastructure: Own the strategy for multi-currency, rule-based, and channel- aware pricing â ensuring the right price resolves correctly at every point of sale across all storefronts and channels â Champion the Merchant Experience: Translate complex catalog management requirements into intuitive workflows that allow merchants across industries â from physical goods retailers to service providers â to create, organize, and manage their offerings with ease â Set the Platform Standard: Establish foundational patterns and best practices that make the PIM a reliable, scalable service other teams can confidently build on, including documentation, versioning, and deprecation protocols â Influence the Broader Commerce Roadmap: Partner with", "id": "highlevel_staff_product_manager_product_information_management_2026-06-18"}, {"metad         const TODAY = new Date().toISOString().slice(0, 10);

        // State
        let sortBy = 'date';

        const overlay  = document.getElementById('modal-overlay');

        // ─── Helpers ─────────────────────────────────────
        function scoreColor(s) {
            if (s >= 90) return ['bg-emerald-500/10','text-emerald-400','border-emerald-500/20'];
            if (s >= 70) return ['bg-blue-500/10','text-blue-400','border-blue-500/20'];
            if (s >= 50) return ['bg-amber-500/10','text-amber-400','border-amber-500/20'];
            return ['bg-slate-700/30','text-slate-400','border-slate-600/30'];
        }

        function sourceIcon(src) {
            const icons = {
                'RemoteOK':'🌐','Hacker News':'🟧','LinkedIn':'🔗',
                'Indeed':'🔵','Glassdoor':'🟢','JobStreet':'🟣'
            };
            return icons[src] || '📋';
        }

        function isNew(dateStr) {
            return dateStr === TODAY;
        }

        function isStale(dateStr) {
            if (!dateStr) return false;
            const diff = (new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24);
            return diff > 30;
        }

        function getStatus(jobId, defaultStatus) {
            return localStorage.getItem('job_status_' + jobId) || defaultStatus || 'Ready to Apply';
        }

        function syncToServer() {
            const statuses = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('job_status_')) {
                    statuses[key.replace('job_status_', '')] = localStorage.getItem(key);
                }
            }
            fetch('http://localhost:8989/sync', {
                method: 'POST',
                body: JSON.stringify(statuses)
            }).catch(e => {}); // Ignore if sync server not running
        }

        window._setStatus = function(jobId, status) {
            localStorage.setItem('job_status_' + jobId, status);
            render();
            updateMetrics();
            syncToServer();
        };

        function mdToHtml(text) {
            if (!text) return '<p class="text-slate-500 italic">No notes available.</p>';
            let h = text
                .replace(/^### (.*)$/gm, '<h3 class="text-base font-bold text-white mt-5 mb-2">$1</h3>')
                .replace(/^## (.*)$/gm, '<h2 class="text-lg font-bold text-white mt-6 mb-3">$1</h2>')
                .replace(/^# (.*)$/gm, '<h1 class="text-xl font-bold text-white mt-7 mb-4">$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong class="text-white">$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-blue-400 hover:underline">$1</a>')
                .replace(/^- (.*)$/gm, '<li class="ml-4 list-disc mb-1 marker:text-blue-500/60">$1</li>');
            h = h.replace(/(<li[^>]*>.*?<\/li>\n?)+/g, function(m) {
                return '<ul class="mb-4 space-y-1">' + m + '</ul>';
            });
            h = h.split('\n\n').map(function(p) {
                p = p.trim();
                if (!p || p.startsWith('<h') || p.startsWith('<ul') || p.startsWith('<li')) return p;
                return '<p class="mb-3">' + p.replace(/\n/g, '<br>') + '</p>';
            }).join('');
            return h;
        }

        // ─── Metrics ────────────────────────────────────
        function updateMetrics() {
            document.getElementById('m-total').textContent = DATA.length;
            document.getElementById('m-high').textContent = DATA.filter(j => (j.metadata.match_score || 0) >= 90).length;
            document.getElementById('m-applied').textContent = DATA.filter(j => getStatus(j.id, j.metadata.status) === 'Applied').length;
            document.getElementById('m-new').textContent = DATA.filter(j => isNew(j.metadata.date_added)).length;
        }

        // ─── Render Grid ────────────────────────────────
        function render() {
            visible = DATA.filter(function(j) {
                const m = j.metadata;
                const q = searchQuery.toLowerCase();
                const matchText = !q || (m.title||'').toLowerCase().includes(q) || (m.company||'').toLowerCase().includes(q);
                
                const status = getStatus(j.id, m.status);
                let matchStatus = false;
                if (filterStatus === 'All') {
                    matchStatus = (status !== 'Junk');
                } else {
                    matchStatus = (status === filterStatus);
                }

                const matchSource = filterSource === 'All' || m.source === filterSource;
                
                const scoreValue = m.match_score || 0;
                const matchScore = filterScore === 'All' || 
                                   (filterScore === 'High' && scoreValue >= 90) || 
                                   (filterScore === 'Good' && scoreValue >= 50 && scoreValue < 90) || 
                                   (filterScore === 'Low' && scoreValue < 50);

                const matchWorkType = filterWorkType === 'All' || 
                                      (m.work_type && m.work_type.toLowerCase().includes(filterWorkType.toLowerCase()));

                return matchText && matchStatus && matchSource && matchScore && matchWorkType;
            });

            visible.sort(function(a, b) {
                if (sortBy === 'score') return (b.metadata.match_score||0) - (a.metadata.match_score||0);
                return (b.metadata.date_added||'').localeCompare(a.metadata.date_added||'');
            });

            resultCount.textContent = visible.length + ' job' + (visible.length !== 1 ? 's' : '') + ' found';

            if (!visible.length) {
                grid.innerHTML = '<div class="col-span-full py-20 flex flex-col items-center text-slate-600"><svg class="w-14 h-14 mb-4 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><p class="text-base font-medium">No matching jobs found.</p></div>';
                return;
            }

            grid.innerHTML = visible.map(function(job, i) {
                const m = job.metadata;
                const score = m.match_score || 0;
                const sc = scoreColor(score);
                const isNewJob = isNew(m.date_added);
                const stale = isStale(m.date_added);
                const status = getStatus(job.id, m.status);
                const delay = Math.min(i * 40, 600);
                const loc = m.location && m.location !== 'See posting' && m.location !== 'Unknown' ? m.location : '';
                const wt = m.work_type && m.work_type !== 'See posting' && m.work_type !== 'Unknown' ? m.work_type : '';

                return '<div class="card-shine animate-card bg-[#111827]/80 border border-slate-700/40 rounded-2xl p-5 hover:border-slate-500/60 hover:shadow-xl hover:shadow-black/20 hover:-translate-y-0.5 transition-all duration-300 flex flex-col h-full" style="animation-delay:' + delay + 'ms">'
                    + '<div class="flex justify-between items-start mb-4 cursor-pointer" onclick="window._openModal(' + i + ')">'
                    +   '<div class="flex items-center gap-2">'
                    +     '<span class="text-sm font-bold px-2.5 py-1 rounded-lg border ' + sc.join(' ') + '">' + score + '</span>'
                    +     (isNewJob ? '<span class="new-pulse text-[9px] font-bold uppercase px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">NEW</span>' : '')
                    +     (stale ? '<span class="text-[9px] font-bold uppercase px-2 py-0.5 rounded bg-slate-500/10 text-slate-400 border border-slate-500/20">STALE</span>' : '')
                    +   '</div>'
                    +   '<select onclick="event.stopPropagation()" onchange="window._setStatus('' + job.id + '', this.value)" class="text-[10px] font-semibold text-slate-300 px-2 py-1 bg-slate-800/80 rounded-lg border border-slate-600 outline-none cursor-pointer">'

                    +     '<option value="Archived" ' + (status==='Archived'?'selected':'') + '>Archived</option>'

                    +   '<span>' + sourceIcon(m.source) + ' ' + (m.source || '') + '</span>'
                    + '</div>'
                    + '</div>';
            }).join('');
        }

        // ─── Modal ──────────────────────────────────────
        window._openModal = function(idx) {
            const job = visible[idx];
            if (!job) return;
            const m = job.metadata;
            const score = m.match_score || 0;
            const sc = scoreColor(score);

            document.getElementById('md-title').textContent = m.title || 'Untitled';
            document.getElementById('md-company').querySelector('span').textContent = m.company || 'Unknown';

            const scoreEl = document.getElementById('md-score');
            scoreEl.textContent = score;
            scoreEl.className = 'font-bold text-xl ' + sc[1];

            document.getElementById('md-status').textContent = getStatus(job.id, m.status);
            document.getElementById('md-location').textContent = m.location || 'N/A';
            document.getElementById('md-worktype').textContent = m.work_type || 'N/A';
            document.getElementById('md-date').textContent = m.date_added || 'N/A';
            document.getElementById('md-source').textContent = (m.source ? sourceIcon(m.source) + ' ' + m.source : 'N/A');

        function closeModal() {

        }
