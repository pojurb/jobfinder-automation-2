unication"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Business Impact", "matched": 4, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["revenue", "growth", "retention", "go-to-market"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/group-product-manager-growth-crm-at-mindbody-4372600666", "date_added": "2026-06-28", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: United States\n- Visit the link for full job details.\n\n### Full Job Description\nAt Playlist, life's richest moments happen when people step away from screens to move, connect, explore, and play. We're building the definitive platform for intentional living, connecting people with inspiring experiences in fitness, wellness, and beyond. With popular brands like Mindbody and ClassPass, Playlist empowers businesses and individuals, making it effortless for aspirations to become actions. Join us in reshaping technology's role to foster meaningful, real-world connections.\nMindbody equips wellness entrepreneurs with technology to support thriving businesses and create exceptional experiences. Innovation and curiosity drive our culture, connecting businesses and individuals through cutting-edge solutions. Join us if you're passionate about enhancing wellness through technology.\nThe Team\nThe fitness and wellness industry is built on consistency and transformation, but it\u2019s challenged by high churn due to seasonality and the ebb and flow of human motivation.\nAt \nPlaylist\n, we are building the \n\"Motivation Engine\"\n for this industry. Our goal is to help businesses seamlessly attract new clients, convert them through high-value trials, and turn them into lifelong advocates. We are looking for a \nGroup Product Manager\n to lead the charge in evolving our current point solutions - messaging automation, AI chatbots, and sales pipeline tools - into a single, unified, world-class CRM.\nThe Role and Responsibilities\nThis is a \nplayer-coach\n position designed for a leader who loves the craft of product management as much as the art of people leadership. You will be responsible for both the high-level strategy of our growth ecosystem and the hands-on execution of our next-generation CRM.\nTeam Leadership (Coach):\n Lead, inspire, and mentor a team of 3 Product Managers. You will hold a high bar, help them think bigger, push their creative boundaries, and navigate complex product challenges to improve our existing automation and sales tools. \nProduct Execution (Player):\n Directly lead a dedicated squad to envision, build, and launch a unified CRM. You\u2019ll take three separate solutions and weave them into a seamless experience that drives client retention. \nGTM Collaboration:\n Partner closely with Go-To-Market teams to package, price, and position the CRM solution for maximum market impact. \nCross-Functional Integration:\n Work with other product and platform teams to ensure the CRM is deeply integrated into the broader Playlist ecosystem, creating a frictionless experience for both business owners and their clients. \nWho You Are\nAn Experienced Builder:\n 7+ years of experience as a hands-on PM, with a proven track record of shipping impactful products from 0 to 1 and scaling them. \nA Proven Leader:\n At least 3 years of experience managing Senior PMs. You know how to grow talent, delegate effectively, and maintain a high bar for excellence. \nA Growth Expert:\n Deep understanding of client growth lifecycles and marketing systems. You understand the \"leaky bucket\" problem and have diverse examples of how you have creatively improved the funnel (or built tools/platforms to enable) within successful Consumer or B2B companies. \nA Clear Thinker and Collaborator:\n You can analyze complex situations, generate nuanced strategic plans, and think end-to-end\u2014from customer opportunity to product design and architecture to distribution and revenue. You have excellent written and verbal communication, and operate collaboratively. \nAI-Forward (Plus):\n Hands-on experience integrating Generative AI into products to solve real-world user problems. \nPay Transparency\nIt is Playlist's intent to pay all Team Members competitive wages and salaries that are motivational, fair and equitable. The goal of Playlist's compensation program is to be transparent, attract potential employees, meet the needs of all current employees, and encourage Team Members to stay with our organization.\nActual compensation packages are based on several factors that are unique to each candidate, including but not limited to skill set, depth of experience, certifications, and specific work location.\nThe base salary range for this position in the United States is $175,000 to 210,000. The total compensation package for this position may also include performance bonus, benefits and/or other applicable incentive compensation plans.\nHave we piqued your curiosity?\nSound like the role for you? We\u2019d love to hear from you! Even if you\u2019re not 100% sure about potential fit, we still encourage you to apply. We\u2019re looking for the right person, not the perfect series of checkboxes.\nThe Company is an Equal Opportunity Employer. We highly value diversity at our company and encourage people of all different backgrounds, experiences, abilities and perspectives to apply. We do not discriminate on the basis of race, religion, color, national origin, gender, sexual orientation, age, marital status, veteran status, disability status, or other protected characteristics.\nBy entering your email and phone number and submitting your application, you consent to receive emails, calls and SMS about your application and other roles at The Company, including by auto-dialer. Message and data rates may apply. Opt-out or text STOP to cancel at any time. If you are a California resident or reside outside the United States then by submitting your application you confirm that you have read, understood, agree and - where applicable - grant your prior, free, informed and express consent for the processing of your personal information, including sensitive personal information, as described in our \nCalifornia Applicant Privacy Notice\n or \nInternational Applicant Privacy Notice \n(as applicable).\nNote: This description outlines key responsibilities but isn\u2019t intended to cover every task or duty. Additional responsibilities may be assigned as needed to support the team and business goals.", "id": "mindbody_group_product_manager_growth_crm_2026-06-28"}, {"metadata": {"title": "Lead Product Manager", "company": "Mindbody", "match_score": 58, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}], "description_quality": "thin", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/lead-product-manager-at-mindbody-4406712808", "date_added": "2026-06-26", "source": "LinkedIn", "location": "New York, NY", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: New York, NY\n- Visit the link for full job details.", "id": "mindbody_lead_product_manager_2026-06-26"}, {"metadata": {"title": "Senior Product Manager", "company": "MissionStaff", "match_score": 68, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit" ywords_hit": ["stakeholder", "self-starter"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["indonesia", "jakarta"]}, {"category": "Business Impact", "matched": 2, "total": 16, "weight": 1.5, "pct": 50, "keywords_hit": ["scale", "roi"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/ai-product-manager-at-monee-4408753053", "date_added": "2026-06-28", "source": "LinkedIn", "location": "Jakarta, Indonesia", "work_type": "See posting"}, "body": "### LinkedIn Job\n- **Location**: Jakarta, Indonesia\n- Visit the link for full job details.\n\n### Full Job Description\nAbout The Team\nDrive the future of data-driven decision-making by building AI-powered products that transform our business. You'll own the product roadmap for AI-enabled identifying high-impact opportunities and shipping solutions that measurably improve speed, quality, and cost-efficiency.\nJob Description\nOwn the AI roadmap \u2013 Define and execute the product strategy for AI-driven tools, aligned with business and data strategy\nIdentify and solve BI challenges \u2013 Pinpoint where AI can unlock value in reporting, self-service analytics, and process automation\nBuild products from concept to launch \u2013 Partner with stakeholders, data engineers, and analysts to design solutions, define requirements, and deliver on time\nDrive measurable impact \u2013 Launch pilots, scale adoption, and track metrics (adoption rates, query efficiency, cost savings, time-to-insight) to prove ROI\nChampion AI adoption \u2013 Help teams integrate AI into daily workflows and build an AI-first culture\nRequirements\n2+ years product management experience \u2014 or fresh graduates with strong fundamentals and genuine hunger to learn\nAI/LLM fundamentals - Understanding of prompt engineering, agentic AI concepts, and working knowledge of LLM frameworks\nStrong BI fundamentals \u2013 Understanding of reporting systems, data modeling, and analytics platforms\nStakeholder management skills \u2013 Ability to align and influence across business, engineering, and data teams\nData-driven problem solver \u2013 Analytical mindset with proven ability to drive decisions with data\nSelf-starter mentality \u2013 Comfortable owning initiatives independently from ideation to launch\nNice To Have\nExperience with AI/LLM technologies, AI agents, or analytics automation\nFamiliarity with LLM orchestration frameworks", "id": "monee_ai_product_manager_2026-06-28"}, {"metadata": {"title": "Group Product Manager (Remote)", "company": "MonetizeMore", "match_score": 93, "score_breakdown": [{"category": "Role Match", "matched": 4, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "product owner", "product management", "group product manager"]}, {"category": "Domain Match", "matched": 3, "total": 17, "weight": 2, "pct": 75, "keywords_hit": ["saas", "ai", "platform"]}, {"category": "Hard Skills", "matched": 6, "total": 24, "weight": 2, "pct": 100, "keywords_hit": ["roadmap", "data-driven", "product discovery", "sprint", "requirements"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "rag"]}, {"category": "Soft Skills", "matched": 7, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "stakeholder", "collaboration", "leadership"]}, {"category": "Location Preference", "matched": 5, "total": 12, "weight": 1.5, "pct": 100, "keywords_hit": ["remote", "indonesia", "anywhere", "global", "worldwide"]}, {"category": "Business Impact", "matched": 6, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["revenue", "growth", "mrr", "monetization", "scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/group-product-manager-remote-at-monetizemore-4431798414", "date_added": "2026-06-28", "source": "LinkedIn", "location": "Indonesia", "work_type": "See posting"}, "body": "### LinkedIn Job\n- **Location**: Indonesia\n- Visit the link for full job details.\n\n### Full Job Description\nAbout MonetizeMore\nMonetizeMore is a global leader in ad tech, trusted by thousands of web publishers and app developers across the globe. By blending proprietary AI technology with elite optimization techniques, we safeguard and maximize publisher revenue. We are a culture-centric, 100% remote organization that heavily values Integrity, Enterprising, Kaizen, and Collaboration. We empower our global team with absolute location autonomy and flexible global schedules.and schedule autonomy. We care about the impact you deliver, not the hours you log on.\nAbout The Role\nWe are seeking a Group Product Manager (GPM) who is both a world-class operator and an player- coach. In this role, you will have the dual responsibility:\nChampion Product Excellence: You will mentor and guide other Product Managers across MonetizeMore, transforming our product organization into a best-in-class, outcome-driven Product Operating Model (inspired by modern frameworks like Marty Cagan\u2019s Silicon Valley Product Group)\nOwn the Product Management for Advanced Ads (Interim): You will drive the strategy, growth, and execution of Advanced Ads\u2014our leading ad-management platform powering over 150,000 websites worldwide\nYou don't just build features to check boxes; you build solutions that move the needle on business goals, and you enable the PMs on your team to do the same.\nCore Responsibilities\n Leadership & Product Operating Model Excellence\nMentorship & Coaching: Serve as a player-coach to other Product Managers, guiding them to elevate their product craft, execution, and strategic thinking\nOutcome over Output: Evangelize the shift from feature-factory mindsets to an outcome-driven culture. Train PMs to obsess over business results and customer impact rather than sprint velocity and story points\nFramework Standardizing: Implement modern product operating model principles (e.g., product trios, data-informed decision making, rapid prototyping, and de-risking assumptions)\nEvangelize Kaizen: Introduce continuous feedback loops and structured retrospective frameworks to scale product management maturity across the entire organization\n Product Ownership: Advanced Ads\nStrategy & Vision: Define and execute the long-term product vision for Advanced Ads, integrating its flexible ad injection, targeting, and Google Ad Manager capabilities deeper into the MonetizeMore ecosystem\nContinuous Discovery: Lead continuous product discovery to uncover publishers' deepest pain points, validating ideas for usability, feasibility, viability, and value before writing code\nRevenue & Growth: Take end-to-end ownership from monetization strategy to GTM. Prioritize the roadmap based on clear ROI, keeping a laser focus on customer lifetime value (LTV) and monthly recurring revenue (MRR)\nCross-Functional Alignment: Collaborate with Engineering, Design, and Growth to ensure features aren't just shipped, but successfully adopted and commercialized\nLong-Term Plan: Determine the long term needs of this business line: resource requirements, investment, propose and collaborate on the best organizational design for the success of the product. \nWho You Are\nThe Experienced Leader: You have 8+ years of Product Management experience, with at least 3+ years leading or mentoring other PMs. Ad tech, SaaS, or WordPress ecosystem experience is a massive plus\nThe Operating Model Expert: You have deeply practical experience working within a modern, empowerment-based Product Operating Model. You know what \"good\" looks like and possess the empathy and patience to coach others there\nThe Owner Mindset: You treat your product like your own business. You aren't afraid to dive into raw data to find hidden patterns or jump on a customer call to understand friction points\nData-Driven & Courageous: You monitor product health metrics religiously. If the data shows a feature is failing to deliver the expected outcome, you have the courage to pivot or kill it\nThe Clear Communicator: You effortlessly translate complex technical logic or abstract product frameworks into digestible, high-impact value propositions for stakeholders, engineers, and your team\nWhat We Offer\nTrue Flexibility: Work from anywhere in the world with a flexible schedule that fits your lifestyle\nProfessional Development: Continuous opportunities for career growth, learning allowances, and direct impact on a fast growing company\nAssessment Requirement:\n As part of our hiring process, all applicants who pass the resume screening will be required to complete a \nTestDome assessment\n. Only candidates who successfully pass the assessment will be invited to proceed to the Culture Fit Interview.\nPowered by JazzHR\nd82fs54nK3", "id": "monetizemore_group_product_manager_remote_2026-06-28"}, {"metadata": {"title": "Senior Product Manager", "company": "Mount Talent Consulting Pvt Ltd.", "match_score": 68, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "senior product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}], "description_quality": "thin", "status": "Ready to Apply", "url": "https://in.linkedin.com/jobs/view/senior-product-manager-at-mount-talent-consulting-pvt-ltd-4424096229", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Kochi, Kerala, India", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: Kochi, Kerala ted teams\nExperience running product experiments and A/B testing\nTechnical background or previous software engineering experience\nExperience working with AI-enabled products or AI-driven workflows\nSoft Skills:\nExcellent communication skills\nStartup mentality\nHigh ownership and accountability\nComfortable with ambiguity and change\nStrong relationship builder\nStrategic thinker\nCustomer-focused mindset\nAbility to influence without authority\nStrong organizational skills\nAdaptability and a continuous learning mindset\nCome join us in breaking the mold and revolutionizing the tech landscape!\nYou can also apply here:\nWebsite: https://www.oowlish.com/work-with-us/\nLinkedIn: https://www.linkedin.com/company/oowlish/jobs/\nInstagram: https://www.instagram.com/oowlishtechnology/\nWe may use artificial intelligence (AI) tools to support parts of the hiring process, such as reviewing applications, analyzing resumes, or assessing responses and identifying potential inconsistencies or verification signals in application materials based on available information. These tools assist our recruitment team but do not replace human judgment. Final hiring decisions are ultimately made by humans. If you would like more information about how your data is processed, please contact us.", "id": "oowlish_senior_product_manager_2026-06-28"}, {"metadata": {"title": "Senior Product Manager", "company": "Optum India", "match_score": 68, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "senior product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight 8", "date_added": "2026-06-28", "source": "LinkedIn", "location": "Christchurch, Canterbury, New Zealand", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: Christchurch, Canterbury, New Zealand\n- Visit the link for full job details.\n\n### Full Job Description\nNote:\n Partly is headquartered in Austin, TX with offices in London, UK, Christchurch, NZ and Auckland, NZ. Wherever you're based, we'll connect you with your nearest office for onboarding, and fly you to join the full team for our quarterly \"Season Openers\" (we cover travel and accommodation). If you're relocating to join us, we can also assist with relocation costs. This position is based in our Christchurch office.\n\ud83d\ude80 Our story\nPartly's mission is to connect the world's parts and we're doing that by building the first global platform for replacement parts, starting with auto parts. Our big vision is to accelerate the world towards a sustainable future where anyone can fix anything.\nFounded by ex-Rocket Lab engineers, we utilize cutting-edge technology to solve challenging but exciting problems that make a huge impact in a $1.9 trillion industry. We've more than tripled our team over the last 12 months and expect to double in size again over the coming 12 months. We're a global team spanning both Europe and Australasia.\nWe provide a scalable digital infrastructure solution to some of the world's largest businesses and the most exciting startups. Partly's solutions are integrated across hundreds of companies globally, providing the backbone for cataloging and managing parts online.\nOur investors include Blackbird Ventures (Canva, CultureAmp etc.), Square Peg, Octopus Ventures, Icehouse, Peter Beck (Rocket Lab), Akshay Kothari (Notion Co-Founder) and Dylan Field (Figma Co-Founder).\nWe're continuing to build a world-class team and ensuring Partly is a place where people can do the best work of their lives. We're proud of the culture we've built at Partly, and our values are lived throughout every experience.\nWant to learn more about the problems we're solving and the culture we're building at Partly? Hear directly from our team here: https://shorturl.at/iAFUX\n\ud83d\udd8d\ufe0f This role\nThis is a full-ownership product leadership role. You will own one or more of Partly's core products end-to-end - acting as a mini-Founder for your product(s), with full accountability for vision, Product\u2013Market Fit, growth, and outcomes. Your focus is not just shipping features, but ensuring the product delivers durable customer and business value as Partly scales across markets and segments.\nYou'll be operating at an inflection point. AI-assisted development and agents are compressing product discovery and delivery cycles. The best PMs we know are no longer waiting for engineering capacity to test an idea - they're building rapid prototypes themselves, deploying them, reading the signal, and deciding within days. We're looking for someone already working that way, or actively building toward it.\n\ud83d\udcbb What You'll Do\nOwn your product, end-to-end\nDefine and evolve the product vision, strategy, and roadmap aligned with company direction.\nContinuously assess and improve Product\u2013Market Fit across relevant markets and segments, including multi-sided platform and marketplace dynamics where applicable.\nOwn key product and PLG metrics - activation, adoption, retention, expansion, NPS - and use them to steer all decisions.\nLead go-to-market alignment for your product, including packaging, positioning, and rollout sequencing.\nAct as the single accountable owner - for successes, failures, and everything in between.\nStay close to customers\nMaintain direct, regular contact with customers - calls, site visits, usage sessions. This is a core weekly activity, not an occasional input.\nTalk to buyers and users separately; understand where their needs align and where they conflict.\nCombine qualitative customer insight with quantitative usage and metric data. Read both and reconcile them.\nTranslate what you learn directly into prioritisation and PMF assessment - and share it with the teams that need it.\nBuild and ship, not just specify\nPrototype new product iterations yourself using AI-assisted development and LLM-assisted tooling - fast, disposable, real. We call this vibe coding; it is our default mode for product discovery.\nTreat the prototype as the hypothesis. Test with real customers before writing the spec.\nRun structured A/B tests and experiments where appropriate; use results to drive prioritisation.\nWork hands-on with data: define metrics, build dashboards, query logs, read the signals directly.\nLead in the human loop\nPartner closely with engineering leads to balance discovery, delivery, and technical sustainability.\nAlign GTM, marketing, operations, and support around product direction and trade-offs - including advance notice of what is shipping and what it means for customers.\nCommunicate priorities and reasoning clearly - especially when the answer is no.\nRepresent the customer's reality in every internal decision, not as a summary but as evidence.\nLead in the agent loop\nDesign and instrument feedback loops that let you learn from system behaviour alongside user behaviour.\nDefine what \"working\" means for agentic or AI-driven features - in terms of evals, edge case handling, and observable outcomes.\nThink in systems: how does a decision here affect behaviour across the whole product loop?\nRaise the bar\nContribute beyond your product boundary: cross-product coherence, shared principles, and the overall product craft at Partly.\nHelp define what excellent product ownership looks like here as the team grows.\n\ud83e\udd77 What you bring\nNon-negotiables\n5+ years owning complex B2B software products end-to-end, with clear accountability for outcomes (not just delivery).\nProven experience with product discovery, roadmapping, and outcome-oriented prioritisation in a fast-moving environment.\nYou build rapid prototypes yourself - with AI-assisted tools, LLM-assisted development, or code - as a first instinct for testing ideas.\nYou think in outcomes and can describe failures as clearly as wins.\nStrong analytical instinct: you define the metrics, build the view, read the data, and act on it - without waiting for a data team to hand it to you.\nSufficient technical depth to work credibly with engineers and understand architectural trade-offs.\nExcellent judgment under ambiguity. You commit, you course-correct, you own the outcome.\nYou make trade-offs explicitly and can articulate what you decided against and why.\nStrong signals we look for\nExperience in B2B SaaS, API products, marketplaces, or multi-sided platform businesses.\nExperience with AI-assisted product development or building AI-native product features.\nComfort thinking in feedback loops, evals, or system-level instrumentation - not just user stories.\nFounder background, or early employee at a startup that scaled materially.\nYou've killed or radically changed something you personally believed in, and can explain why.\nBonus\nExperience in automotive, logistics, or supply chain domains.\nExperience scaling products across multiple geographies or customer segments.\nExperience with product-led growth (PLG) motions in a B2B context.\nYou've built or operated products with meaningful agentic or automation components\n\ud83e\udded How you'll think and operate\nWe're not looking for framework experts or consensus-drivers. We're looking for someone who thinks like this:\n\"I don't need to wait for the sprint - I built a test version this afternoon and three customers have already tried it.\"\n\"The anomaly in the run log is more important than the feature request in the backlog right now.\"\n\"Here's what the data shows. Here's what I think it means. Here's what I'm doing about it. Here's when I'll be wrong.\"\n\"I own this. If it fails, that's on me. Let me tell you exactly how it failed and what I learned.\"\nSpeed, ownership, and judgment are the baseline. What differentiates the best candidates is the ability to operate fluidly across both human systems and technical ones - and to shrink the distance between intent and outcome.\nPlease note: \nif you don't have all the skills or experience listed above but believe you could be outstanding in this role, please still consider applying. Many people count themselves out. We'd love the chance to learn more about you and why you're exceptional.\n\ud83c\udfa1Our Benefits\nHealthy, Catered Lunches - Enjoy fresh, healthy lunches every workday in our Auckland, Christchurch, London and San Francisco offices. With no meal prep needed, you can eat, connect, and refuel with your team. (And yes, snacks and drinks are always on hand.)\nHealthy Body, Healthy Mind - We care about performing at our peak. Every team member gets a $1,500 annual wellness allowance (or local equivalent) on a Partly-branded card. Use it on things such gym memberships, rock climbing, physio, massage, GP visits, prescriptions; anything that you or your family, need!\nFamily Comes First - Primary caregivers receive 3 months of fully paid parental leave, plus a flexible return-to-work (four days on full pay for your first three months back).\nGetting Here Is On Us - If you commute to a Partly office or co-working space, choose from a paid 24/7 car park or commute allowance. One less thing to think about!\nWorkspaces That Inspire - Our brand new, architecturally designed offices are built for collaboration and creativity, with great coffee, social spaces, and some of the best cafes a few steps away.\nOffice-First with Flexibility - In cities where we have an office (Christchurch, Auckland, London, San Francisco), we default there every day. This let's us move faster, make better decisions and build strong relationships. We also operate with a very high trust environment, so you can manage your time around your life, and flex your schedule to get your best work done.\nWe Celebrate Together - From weekly happy hours and monthly lunches to quarterly season openers and an annual global offsite, we make time to connect, celebrate, and have fun as one team.", "id": "partly_product_manager_nz_2026-06-28"}, {"metadata": {"title": "Junior Product Manager", "company": "Paxel Indonesia", "match_score": 65, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Location Preference", "matched": 3, "total": 12, "weight": 1.5, "pct": 100, "keywords_hit": ["indonesia", "jakarta", "hybrid"]}], "description_quality": "thin", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/junior-product-manager-at-paxel-indonesia-4393467423", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Jakarta, Jakarta, Indonesia", "work_type": "Hybrid"}, "body": "### LinkedIn Job\n- **Location**: Jakarta, Jakarta, Indonesia\n- Visit the link for full job details.", "id": "paxel_indonesia_junior_product_manager_2026-06-22"}, {"metadata": {"title": "Sr Manager, Product Management", "company": "PayPal", "match_score": 33, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product management"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}], "d , "pct": 25, "keywords_hit": ["scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://news.ycombinator.com/item?id=22667987", "date_added": "2026-06-22", "source": "Hacker News", "location": "ONSITE", "work_type": "On-site"}, "body": "### HN Who is Hiring\n- The Presidential Innovation Fellows (PIF) program is looking for high-performing data scientists, designers, engineers, executives, innovators, product managers, and technology strategists that care deeply about solving our nation\u2019s most difficult challenges and want to deliver better products, services, and experiences to the American public.\n- The program is a highly selective, non-partisan, innovation fellowship that pairs talented mid-to-senior-level entrepreneurs and technologists with top government leaders to take on complex projects that have the potential for significant impact. It was launched in 2012 by former U.S. Chief Technology Officer Todd Park, and since then, more than 150 Fellows have worked within over 35 agencies. Over half of the Fellows have decided to stay in government after the program, and have gone on to lead new digital teams and serve as chief technology officers, chief information officers, chief data officers, and chief marketing officers at various agencies.\n- Fellows are building products and services at scale to serve all Americans. Select potential projects for the Fall 2020 cohort include:\n- \u2022 Assisting the Centers for Medicare and Medicaid modernize their technology stack so they can better share data with stakeholders across the healthcare ecosystem.\n- \u2022 Helping NASA speed up the discovery, analysis and development of aerospace systems using artificial intelligence to ultimately help combat climate change by reducing fuel burn for the aerospace industry.\n- \u2022 Working with the U.S. Department of Veterans Affairs to better support veterans transitioning from military to civilian life, adopt medical innovations to improve ate with global teams in a dynamic space. Browse our Sea Labs Indonesia team openings to see how you can make an impact with us.\nAt Shopee Search & Recommendation, we connect users to what they may want at scale. As a pillar of e-commerce discovery experience, every day, our products enable tens of millions of users to discover relevant and interesting things among hundreds of millions of products and contents available on Shopee. We\u2019re a passionate, young, and diverse team, committed to creating a convenient, delightful, and intelligent discovery experience for our users. We are looking for an (experienced) product manager to join us. You will be working closely with the product team to make significant impacts on Shopee's search & recommendation engine through both technical and operational processes.\nJob Description:\nHelp own promotion features for Livestream & Video: Contributing from problem definition through launch and post-launch measurement.\nDig into data to understand how promotions perform: Write SQL, explore dashboards, segment users, and turn numbers into clear insights.\nSupport the design and analysis of experiments (A/B tests, holdouts) to measure whether a promotion drove real and incremental impact.\nDiagnose problems systematically: decompose metrics, form hypotheses, and investigate root causes.\nHelp define the right success metrics for each initiative, considering both growth and healthy economics.\nCollaborate with marketing, design, and other teams to deliver promotions that are effective and trusted by users.\nCommunicate findings clearly: Turning data and analysis into recommendations stakeholders can act on.\nRequirements:\nBachelor's degree in a quantitative or technical field (Computer Science, Statistics, Engineering, Mathematics, Economics, or similar).\nHave 1-3 years of working experience as product management; preferably in e-commerce / content platforms with content moderation, risk, or fraud background.\nWorking knowledge of SQL or a willingness to learn it fast.\nFamiliarity with A/B testing, experimentation, or basic statistics.\nGood communication and proficiency in Bahasa Indonesia & English, both verbal and written. \nStrong ownership, able to proactively drive initiatives from ideation to execution.\nStrong stakeholder management skills, able to effectively align and manage expectations across diverse stakeholders.", "id": "sea_product_management_srac_-_promotion_-_sea_labs_2026-06-28"}, {"metadata": {"title": "Customer Related Product Manager", "company": "SeaBank Indonesia", "match_score": 60, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["indonesia", "jakarta"]}], "description_quality": "thin", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/customer-related-product-manager-at-seabank-indonesia-4430865733", "date_added": "2026-06-26", "source": "LinkedIn", "location": "Jakarta, Indonesia", "work_type": "See posting"}, "body": "### LinkedIn Job\n- **Location**: Jakarta, Indonesia\n- Visit the link for full job details.", "id": "seabank_indonesia_customer_related_product_manager_2026-06-26"}, {"metadata": {"title": "Data & Reporting Product Manager", "company": "SeaBank Indonesia", "match_score": 65, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"ca nCoordinate new product development, product improvement, and discontinuation strategy.\nEnsure products meet market demand, pricing strategy, and profitability targets.\nSupport product roadmap planning aligned with brand positioning and commercial goals.\n Costing & Margin Optimization\nAnalyze product costing, landed cost, margin structure, and profitability performance.\nWork closely with Finance and Commercial teams to improve pricing strategy and margin health.\nSupport negotiation strategy based on profitability targets and market competitiveness.\nImprove cost control without sacrificing product quality and customer value.\n Inventory & Demand Planning Support\nCollaborate with Supply Chain and Sales teams for demand forecasting and inventory optimization.\nPrevent overstock, slow-moving inventory, and stock shortages through proactive planning.\nSupport stock allocation strategies for retail, distributor, and project channels.\nImprove product availability and inventory efficiency.\n Market & Competitor Analysis\nMonitor market trends, competitor products, customer demand, and pricing movements.\nIdentify new product opportunities and sourcing strategies for market expansion.\nSupport innovation planning and product competitiveness improvement.\nEnsure product decisions are data-driven and commercially viable.\nMinimum Qualifications\nBachelor\u2019s degree in Supply Chain, Business, Management, Engineering, or related field.\nMinimum 5 years of experience in procurement, sourcing, product management, or supply chain.\nMinimum 2 years in a managerial role.\nStrong experience in supplier management, vendor negotiation, and procurement strategy.\nExperienced in product planning, SKU management, and product lifecycle.\nGood understanding of costing, pricing, margin optimization, and inventory planning.\nFamiliar with demand forecasting and stock management.\nStrong analytical, negotiation, leadership, and decision-making skills.\nProficient in Excel, ERP syste nities, launch new initiatives, and drive adoption across a global network of users and builders.\nThe ideal candidate combines exceptional product leadership with deep blockchain expertise and a genuine passion for the future of onchain finance.\nWhat You'll Be Doing\nDefine product strategy, vision, and roadmap for new onchain initiatives\nIdentify opportunities that accelerate adoption and usage across the ecosystem\nWork directly with developers, partners, and ecosystem participants to understand market needs\nTranslate technical innovation into products that deliver meaningful user and business impact\nAnalyse onchain activity, user behaviour, and market trends to inform product decisions\nLead products from concept through launch and ongoing optimisation\nPartner closely with engineering, legal, data, marketing, and commercial teams\nImprove the end-to-end experience for developers and users interacting with blockchain infrastructure\nRepresent the company within the wider crypto ecosystem and contribute to industry best practices\nWhat We're Looking For\n5+ years of product management experience with ownership of complex commercial products\nExperience operating at Senior, Lead, Group, Principal, or equivalent Product Manager level\nStrong technical understanding with the ability to work closely alongside engineering teams\nProven experience defining product strategy and driving execution in fast-moving environments\nHighly analytical mindset with a data-driven approach to decision making\nDemonstrated ability to influence senior stakeholders and lead cross-functional initiatives\nStrong communication skills and the ability to simplify complex technical concepts\nPreferred Experience\nExperience building within crypto, blockchain, or Web3 environments\nDeep understanding of stablecoins, wallets, DeFi, smart contracts, bridges, and digital asset infrastructure\nExperience launching and scaling blockchain-based products\nFounder, early-stage startup, or entrepreneurial experience\nBackground contributing to developer communities, open-source projects, or ecosystem initiatives\nFamiliarity with blockchain infrastructure and emerging onchain technologies\nWhy Apply?\nThis role offers the opportunity to shape products that are helping define the future of digital finance. You'll work alongside some of the industry's strongest product, engineering, and blockchain talent while building technology used by millions globally.\nIf you're passionate about crypto, thrive in highly technical environments, and enjoy turning ambitious ideas into widely adopted products, we'd love to hear from you.", "id": "surge_group_senior_product_manager_2026-06-28"}, {"metadata": {"title": "Product Manager", "company": "Swoon", "match_score": 58, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}], "description_quality": "thin", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/product-manager-at-swoon-4428757334", "date_added": "2026-06-22", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: United States\n- Visit the link for full job details.", "id": "swoon_product_manager_2026-06-22"}, {"metadata": {"title": "Brand & Product Manager", "company": "TACO Group", "match_score": 65, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "m r enterprise level.\nWe are seeking a Senior Product Manager to support a patient-facing digital product built on a conversational AI/chat platform. This role will lead product strategy and execution for an MVP launching in June, with a roadmap of expanding use cases through Q3/Q4. The ideal candidate will bring experience with large language models (LLMs) and conversational AI tools (e.g., Gemini, Vertex AI, RAG-based architectures) and possess a strong ability to translate business needs into scalable, patient-centered digital experiences.\nKey Responsibilities\nDefine and execute product strategy and roadmap for a conversational AI platform supporting patient-facing use cases.\nLead product delivery for an MVP launch and iterative quarterly enhancements.\nPartner cross-functionally with engineering, design, and clinical/business stakeholders.\nTranslate business objectives into clear product requirements, user stories, and acceptance criteria.\nDrive Agile product development processes, including backlog management and sprint planning.\nCollaborate with engineering teams leveraging Gemini (via Vertex AI) and RAG pipelines to power AI-driven experiences.\nEnsure alignment between patient experience, business value, and technical feasibility.\nDefine and track KPIs and product performance metrics to guide continuous improvement.\nAct as the primary liaison between technical teams and non-technical stakeholders.\nSupport scaling the platform across additional patient use cases and domains.\nRequired Qualifications\nBachelor's degree in Business, Computer Science, Engineering, or related field.\n5\u20138 years of experience in product management, including senior-level ownership.\nExperience delivering digital or platform-based products in an Agile environment.\nFamiliarity with conversational AI, chat platforms, or digital assistant products.\nStrong understanding of LLMs and AI-driven product value drivers.\nExperience collaborating closely with engineering teams o eeds of different layers of paid users.\n- Unearth hidden user value through data analysis of paid user and live creator's characteristics, build effective measures to guide payments.\n- Participate in mathematical design of features targeted at different group of paid users and creators, collaborate to achieve growth target of both paid user and creators-with-income.\n- Write PRDs, coordinate resources with cross-functional teams and drive the requirement's developing, testing and launching, etc.\nQualifications\nMinimum qualifications:\n- Bachelor Degree or above, at least 3 years of revenue product/UG strategy/data analysis related work experience in the mobile internet industry.\n- 4+ years of experience applying structured problem-solving and clear communication, with the ability to analyze data, generate actionable insights, and interpret user behavior and needs.\n- Proven ability to execute projects end-to-end, with strong communication and project management skills, collaborating with cross-functional teams to resolve issues and ensure timely delivery.\nPreferred qualifications:\n- Specialized in Gamification Mechanics and Incentive Strategy for international markets.\n- In-depth understanding of the live streaming business and familiar with its user and influencer communities.\nAbout TikTok\nTikTok is the leading destination for short-form mobile video. At TikTok, our mission is to inspire creativity and bring joy. TikTok's global headquarters are in Los Angeles and Singapore, and we also have offices in New York City, London, Dublin, Paris, Berlin, Dubai, Jakarta, Seoul, and Tokyo.\u200b\nWhy Join Us\nInspiring creativity is at the core of TikTok's mission. Our innovative product is built to help people authentically express themselves, discover and connect \u2013 and our global, diverse teams make that possible. Together, we create value for our communities, inspire creativity and bring joy - a mission we work towards every day.\u200b\nWe strive to do great things with great people. We lead with curiosity, humility, and a desire to make impact in a rapidly growing tech company. Every challenge is an opportunity to learn and innovate as one team. We're resilient and embrace challenges as they come. By constantly iterating and fostering an \"Always Day 1\" mindset, we achieve meaningful breakthroughs for ourselves, our company, and our users. When we create and grow together, the possibilities are limitless. Join us.\u200b\n\u200b\nDiversity & Inclusion\u200b\nTikTok is committed to creating an inclusive space where employees are valued for their skills, experiences, and unique perspectives. Our platform connects people from across the globe and so does our workplace. At TikTok, our mission is to inspire creativity and bring joy. To achieve that goal, we are committed to celebrating our diverse voices and to creating an environment that reflects the many communities we reach. We are passionate about this and hope you are too.\u200b", "id": "tiktok_product_manager_paid_user_growth_-_tiktok_live_2026-06-28"}, {"metadata": {"title": "Product Manager", "company": "TKO", "match_score": 58, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}], "description_quality": "thin", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/product-manager-at-tko-4429530876", "date_added": "2026-06-26", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### LinkedIn Job\n- s of recipients worldwide.\nOur customers (researchers, marketers, HR teams, nonprofits, and platform businesses) rave about how fast and easy Tremendous is to use. Check out our ratings on G2.\nTremendous is profitable and growing without outside investors. We\u2019re a fully remote, high-documentation, low-meeting culture, which means more time for what matters in both your professional and personal life. The team agrees\u2013 our employee NPS is in the high 80s.\nAbout The Role\nWe\u2019re looking for a Senior PM to join our Platform team. This team owns infrastructure, security, and internal tooling that keeps every other team shipping.\nToday, the product management org is six PMs, led by a co-founder who serves as Head of Product.\nYou will\nReport to our Co-founder / Head of Product, Kapil Kale. \nPM the Platform team end-to-end. This team is responsible for security issues, AI infrastructure, security improvements, data / compliance, and technical upgrades, and you\u2019ll be involved in all of it. \nWork across technical systems. This is a highly technical product area that requires close collaboration with engineers and comfort discussing architecture, tradeoffs, implementation details, and complex technical problems. \nManage the team\u2019s product roadmap. You\u2019ll be working with stakeholders to help figure out what to build and when. When things are unclear, you'll resolve the ambiguity for the team. \nFrame up problems. You\u2019ll be expected to explain what problems we are solving and why. This helps our engineers and designers understand how to solve those problems. \nConduct research and analysis. In order to frame those problems well, you\u2019ll need to collect supporting evidence\u2013from user interviews, market research, and competitive analysis. \nWork with designers and engineers to devise solutions. PMs set requirements and then work with designers and engineers to select appropriate solutions. \nCollaborate without meetings. Tremendous has an async, non-meeting culture. This can be tricky if you're used to doing PM work in meetings. \nPersuade with a light touch. Not everyone will agree on priorities. It's the PM's job to drive decisions while keeping people in the process. \nReport back on what\u2019s working. Once we ship, you\u2019ll be responsible for helping the team understand the impact of their work. \nYou have\n4+ years of PM experience on a platform team (infrastructure, platform, security, search, data, etc). \n5+ years of professional software engineering or engineering management experience. \nExceptional technical fluency and problem-solving ability. You're comfortable discussing and solving complex technical problems with engineers. \nStrong product intuition. You can look at a problem and see the right solution. \nThe ability to take a long-term strategy and a big feature backlog and translate that into roadmaps. \nOutstanding written and verbal communication skills. We\u2019re a documentation-first culture, and this role requires communicating effectively with senior stakeholders. \nComfortable making decisions without perfect information and moving work forward without being told to. \nGenuine empathy for users and teammates. You want to understand their problems. \nWhat's Cool About The Role\nCompetitive pay and equity. Base salary for this role: $250,000 to $325,000. \nReal benefits. 100% covered health (US), unlimited PTO, 12-16 weeks paid parental leave. \nFully remote. Work from anywhere in the Americas. \nGreat culture. Read more about how we work in our public handbook. \nCompensation Range: $250K - $325K", "id": "tremendous_senior_product_manager_-_platform_2026-06-28"}, {"metadata": {"title": "Product Manager", "company": "Trential", "match_score": 81, "score_breakdown": [{"category": "Role Match", "matched": 3, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "product owner", "product management"]}, {"category": "Domain Match", "matched": 5, " y": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 4, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "stakeholder", "leadership", "strategic"]}, {"category": "Location Preference", "matched": 4, "total": 12, "weight": 1.5, "pct": 100, "keywords_hit": ["indonesia", "jakarta", "southeast asia", "global"]}, {"category": "Business Impact", "matched": 4, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["growth", "retention", "engagement", "enterprise"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/product-manager-user-accounts-at-xendit-4412369271", "date_added": "2026-06-28", "source": "LinkedIn", "location": "Jakarta, Indonesia", "work_type": "See posting"}, "body": "### LinkedIn Job\n- **Location**: Jakarta, Indonesia\n- Visit the link for full job details.\n\n### Full Job Description\nXendit\n provides payment infrastructure across Southeast Asia, with a focus on Indonesia, the Philippines and Malaysia. We process payments, power marketplaces, disburse payroll and loans, provide KYC solutions, prevent fraud, and help businesses grow exponentially. We serve our customers by providing a suite of world-class APIs, eCommerce platform integrations, and easy to use applications for individual entrepreneurs, SMEs, and enterprises alike.\nOur main focus is building the most advanced payment rails for Southeast Asia, with a clear goal in mind \u2014 to make payments across and within SEA simple, secure and easy for everyone. We serve thousands of businesses ranging from SMEs to multinational enterprises, and process millions of transactions monthly. We\u2019ve been growing rapidly since our inception in 2015, onboarding hundreds of new customers every month, and \nbacked by global top-10 VCs\n. We\u2019re proud to be featured on among the fastest growing companies by \nY-Combinator\n.\nAbout the Job\nThe Product Manager, Accounts Lifecycle, will be the strategic owner of the entire merchant journey, from initial sign-up and onboarding (Activation) through ongoing engagement and retention. A core focus of this role is to skillfully balance the necessity for a world-class Merchant Experience (MX) with stringent Compliance and Risk requirements (e.g., KYC/AML). This individual must be highly adept at navigating complex trade-offs and driving alignment across multiple, interdependent product and risk teams.\nResponsibilities\nLifecycle Strategy & Roadmap Ownership:\nDefine the vision, strategic goals, and execution roadmap for optimizing the end-to-end Merchant Account Lifecycle, with a primary focus on maximizing Onboarding success, Activation rate, and Onboarding Throughput\nSynthesize market trends, competitive analysis, and business goals to prioritize high-impact lifecycle initiatives.\nRisk, Compliance, and Experience Balancing:\nCrucially balance the Merchant Experience needs (speed, clarity, ease-of-use) against strict requirements mandated by Risk, Fraud, and Compliance policies (e.g., KYC/AML checks, documentation needs).\nCollaborate closely with Risk and Compliance teams to design product processes that embed necessary controls with the lowest possible friction for the merchant.\nProactively anticipate and translate new regulatory and policy changes into clear product requirements and required experience updates.\nProduct Discovery & Execution:\nLead the product discovery process, generating deep insights through merchant feedback, data analysis, and user research.\nTranslate strategic goals into clear, actionable Product Requirements Documents (PRDs), user stories, and acceptance criteria for engineering and design teams.\nOwn the prioritization of features, fixes, and experiments, strategically managing a backlog that is often subject to frequently changing demands from business and regulatory forces.\nCross-Functional Leadership & Navigation:\nAct as a highly effective navigator and consensus builder across interdependent core product teams (e.g., Payments, Core Platform) to ensure a unified and consistent merchant experience.\nServe as the primary liaison between Engineering, Design, Customer Success, Marketing, Risk, and Compliance.\nClearly communicate product progress, outcomes, and the rationale behind complex trade-offs (especially those involving risk vs. experience) to senior stakeholders.\nMinimum Qualifications\n3-5 years of Product Management specifically focusing on customer/merchant lifecycle, growth, or product-led growth (PLG) initiatives, ideally within FinTech, Payments, or an equivalent high-compliance industry.\nTechnical expertise is a significant advantage: Ability to understand technical architecture and integration points to facilitate meaningful discussions with engineers.\nStrong organizational skills to strategically navigate and prioritize conflicting demands from multiple stakeholders (e.g., business goals vs. risk constraints).\nDemonstrated ability to build consensus and drive outcomes across large, interdependent organizational structures.\nPreferred Qualifications\nDomain Expertise (Critical): Direct product management experience within FinTech, Payments, or a similarly regulated industry that requires balancing user experience with strict Compliance, Risk, or Fraud requirements (e.g., KYC/AML).\nTechnical Expertise (Strong Plus): A background in engineering, computer science, or demonstrated ability to understand technical architecture, APIs, and data flows to facilitate deep, productive discussions with technical teams.\nAccount Lifecycle Specialization: Specific experience building or optimizing products related to core lifecycle stages like Onboarding, Activation, Offboarding\n**This role is open to candidates based in both Indonesia and Singapore **", "id": "xendit_product_manager_-_user_accounts_2026-06-28"}, {"metadata": {"title": "Product Manager", "company": "Zaya C
