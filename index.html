    <script type="application/json" id="jobs-data">[{"metadata": {"title": "Product Manager", "company": "10x Genomics", "match_score": 31, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "global"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://news.ycombinator.com/item?id=22669670", "date_added": "2026-06-22", "source": "Hacker News", "location": "Unknown", "work_type": "Unknown"}, "body": "### HN Who is Hiring\n- https:&#x2F;&#x2F;www.10xgenomics.com&#x2F;careers&#x2F;\n- | US Remote\n- Scientists are using our technology to make discoveries and guide COVID-19 therapeutic development. There have been a number of recently published pre-prints using single cell genomics to study infection, response, and potential drug targets. For example, Vanderbilt University\u2019s Vaccine Center is using our immune profiling technology to discover antibodies from survivors who have recovered from coronavirus infection in order to turn them into antibody therapies.\n- 10x Genomics is a rapidly-growing biotech company that develops software, hardware, and chemistry that enables researchers to study disease at an unprecedented resolution. Our products are used by researchers around the world, including 93 of the top 100 global research institutions. We went public last year as the largest healthcare IPO of 2019 (ticker: TXG).\n- Software is an integral part of the 10x Genomics product. We develop software to generate data that scientists can explore programmatically or visually. We utilize Go, React&#x2F;Redux, Typescript, and Electron to create easy-to-use visualization applications and are making increasing use of Rust to accelerate and harden our bioinformatics code.\n- There are open positions for front-end software engineers, product managers, full stack engineers, backend engineers, QA engineers, computational biologists, and firmware engineers. Please contact me directly at kevin.wu@10xgenomics.com with your resume. You can find all of our job listings at\n- https:&#x2F;&#x2F;www.10xgenomics.com&#x2F;careers&#x2F;\n- We hope you are safe and healthy, good luck on your search!", "id": "10x_genomics_product_manager_2026-06-22"}, {"metadata": {"title": "Senior Product Manager", "company": "AbhiBus", "match_score": 95, "score_breakdown": [{"category": "Role Match", "matched": 3, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "senior product manager", "product management"]}, {"category": "Domain Match", "matched": 9, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["logistics", "mobility", "b2b", "ai", "platform"]}, {"category": "Hard Skills", "matched": 7, "total": 24, "weight": 2, "pct": 100, "keywords_hit": ["agile", "roadmap", "prd", "product strategy", "sprint"]}, {"category": "Tools", "matched": 5, "total": 14, "weight": 1.5, "pct": 100, "keywords_hit": ["figma", "analytics", "mixpanel", "tableau", "google analytics"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "ai-powered"]}, {"category": "Soft Skills", "matched": 6, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "stakeholder", "leadership", "communication"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Business Impact", "matched": 2, "total": 16, "weight": 1.5, "pct": 50, "keywords_hit": ["arr", "enterprise"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://in.linkedin.com/jobs/view/senior-product-manager-at-abhibus-4433097426", "date_added": "2026-06-26", "source": "LinkedIn", "location": "Hyderabad, Telangana, India", "work_type": "Remote"}, "body": "### Full Job Description\nCompany Description\nAbhiBus is a leading online bus-ticketing platform that aggregates ticket inventory from over 4,000 bus operators - including major State Road Transport Corporations (SRTCs), covering more than 3.5 lakh (350,000+) routes across India. The AbhiBus website and apps allow users to check amenities provided by bus operators, compare booking fares, check bus timings in the searched route, live tracking of the bus before arrival, cancellation protection options and other facilities. It is the official ticketing partner for several state road transport corporation bus tickets and IRCTC bus bookings.\nAbhiBus is owned and operated by ixigo (Le Travenues Technology Limited), India\u2019s leading OTA for the Next Billion Users. With over 54 crore Annual Active Users in FY25, ixigo offers AI-powered train, flight, bus, and hotel bookings through its platforms - ixigo, ConfirmTkt, and AbhiBus.\nJob Description\nAbout the role\nBusGDS is AbhiBus\u2019s distribution and operations backbone for bus operators \u2014 the platform that powers inventory, scheduling, fare and yield management, channel distribution, and settlement across consumer apps, agent network, and external partners. It is the supply-side engine that thousands of operators and millions of travellers depend on every single day.\nAs Senior Product Manager for BusGDS, you will own both the strategy and the execution for this mission-critical B2B enterprise platform. This is a role for a PM who is equally comfortable setting multi-quarter direction and driving day-to-day delivery - someone who can size a market opportunity in the morning and go deep with engineering on a fare-calculation edge case the same afternoon.\nYou will operate in a complex, multi-stakeholder environment - working across engineering, design, operations, sales, and external operator and channel partners - and you will be expected to make sharp, well-reasoned prioritization calls that balance operator needs, traveller experience, and commercial impact.\nWhat you\u2019ll own\nStrategy & vision\n\u2022 Own the multi-quarter product vision and roadmap for BusGDS, grounded in a deep understanding of the bus distribution ecosystem, operator economics, and the competitive landscape.\n\u2022 Develop a first-principles understanding of the market \u2014 operator pain points, channel\ndynamics, pricing and inventory behaviour \u2014 and translate it into a defensible product strategy.\n\u2022 Build the business case for major bets: frame the opportunity, model the impact, and secure alignment from leadership and cross-functional partners.\n\u2022 Make deliberate build/buy/partner and prioritisation decisions, and clearly articulate the trade-offs behind them.\nExecution & delivery\n\u2022 Translate strategy into crisp, unambiguous PRDs, specs, and acceptance criteria that\nengineering and design can move on quickly.\n\u2022 Drive the full delivery lifecycle \u2014 discovery, scoping, sprint planning, release, and\niteration \u2014 in close partnership with engineering and architecture on a technically deep\nplatform.\n\u2022 Own the numbers: define success metrics, instrument the product, and use A/B\ntesting, usage data, and operator feedback to drive continuous improvement.\n\u2022 Maintain a high bar for quality and reliability, and unblock the team relentlessly to ship\non time.\nStakeholder & partner management\n\u2022 Be the voice of the operator inside the building - and the voice of BusGDS product to external operators and channel partners.\n\u2022 Partner with sales, operations, and customer success to onboard operators, drive adoption, and close the loop on feedback.\n\u2022 Communicate the product vision, roadmap, and trade-offs clearly to audiences ranging from engineers to senior leadership to external partners.\nQualifications\nWhat we\u2019re looking for\nMust-have:\n\u2022 6\u201310 years of product management experience, with a strong track record of\nshipping successful B2B, enterprise, or multi-stakeholder platform products.\n\u2022 Proven strength in both strategy and execution - you can set direction and own a roadmap, and you can also write the spec and grind through delivery details. We are explicitly looking for both.\n\u2022 Strong analytical and problem-solving skills; comfortable working directly with data to frame problems and validate decisions.\n\u2022 Hands-on with product analytics tools such as CleverTap, Google Analytics, Mixpanel, or Tableau for research, instrumentation, and measurement.\n\u2022 Hands-on with wireframing and prototyping tools such as Figma, Adobe XD, or similar \u2014 and a sharp eye for the difference between good and bad design.\n\u2022 Technical fluency: able to collaborate credibly with engineering and architecture on APIs, data models, and system trade-offs on a complex platform.\n\u2022 Excellent communication and stakeholder skills, with the ability to influence without authority across functions and partners.\nStrong plus\n\u2022 Travel, mobility, or transportation sector experience \u2014 bus, rail, air, hospitality, OTA, GDS, or logistics.\n\u2022 Experience with distribution systems, inventory or yield management, marketplaces, or other supply-side / two-sided platforms.\n\u2022 Experience building self-serve tooling, onboarding, or operations platforms for business customers.\n\u2022 Familiarity with agile development methodologies.\n\u2022 Prior experience in engineering or a strongly technical background.\nWhat success looks like in the first 6\u201312 months\n\u2022 You\u2019ve developed a deep, credible point of view on the BusGDS roadmap and where the biggest opportunities lie.\n\u2022 You\u2019ve shipped meaningful improvements to operator-facing inventory, pricing, or distribution workflows \u2014 with measurable impact.\n\u2022 Operators, internal teams, and leadership trust you as the owner of this platform and the person who makes the calls\nAdditional Information: \nCandidates are responsible for safeguarding sensitive company data against unauthorized access, use, or disclosure, and for reporting any suspected security incidents in line with the organization's ISMS (Information Security Management System) policies and procedures", "id": "abhibus_senior_product_manager_2026-06-26"}, {"metadata": {"title": "Product Manager", "company": "Ably", "match_score": 55, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "ai-powered"]}, {"category": "Soft Skills", "matched": 2, "total": 12, "weight": 1, "pct": 67, "keywords_hit": ["remote", "autonomous"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Business Impact", "matched": 1, "total": 16, "weight": 1.5, "pct": 25, "keywords_hit": ["scale"]}], "description_quality": "partial", "status": "Ready to Apply", "url": "https://news.ycombinator.com/item?id=22673744", "date_added": "2026-06-22", "source": "Hacker News", "location": "Onsite in London, UK (remote for now)", "work_type": "Remote"}, "body": "### HN Who is Hiring\n- https:&#x2F;&#x2F;ably.io\n- We provide APIs to simplify and overcome the complex aspects of the most demanding realtime engineering. This reduces the operational burden of engineering teams, allowing them to build and scale realtime apps faster and more efficiently.\n- we\u2019re laying the foundations for mass deployments of Autonomous Vehicles, IoT networks, and AI-powered experiences.\n- We have openings for:\n- - Site Reliability Engineer (contract)\n- - Lead Site Reliability Engineer (perm)\n- - Node.js Developer (perm)\n- - Technical Product Manager (perm)\n- Email: jodie@ably.io for more info.", "id": "ably_product_manager_2026-06-22"}, {"metadata": {"title": "Product Manager", "company": "Accion Labs", "match_score": 90, "score_breakdown": [{"category": "Role Match", "matched": 3, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "product owner", "product management"]}, {"category": "Domain Match", "matched": 6, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["fintech", "ai", "platform", "marketplace", "digital products"]}, {"category": "Hard Skills", "matched": 3, "total": 24, "weight": 2, "pct": 60, "keywords_hit": ["agile", "scrum", "data-driven"]}, {"category": "Tools", "matched": 2, "total": 14, "weight": 1.5, "pct": 67, "keywords_hit": ["figma", "analytics"]}, {"category": "AI & Tech Skills", "matched": 5, "total": 19, "weight": 2.5, "pct": 100, "keywords_hit": ["ai", "prompt engineering", "claude", "rag", "ai product"]}, {"category": "Soft Skills", "matched": 5, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "stakeholder", "collaboration", "communication"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/product-manager-at-accion-labs-4432276948", "date_added": "2026-06-26", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### Full Job Description\nExperience\n5\u20137+ years of experience in Product Ownership, Product Management, or related roles\nProven experience delivering consumer-facing digital products, ideally Marketplace, e-commerce, or Direct-to-Consumer (DTC) platforms\nExperience operating across multiple teams in complex, cross-functional environments\nExperience in healthcare, fintech, or other regulated industries preferred\nSkills\nStrong expertise in Agile and Lean product delivery methodologies\nProven ability to translate strategy into execution, including prioritization and trade-off decisions\nStrong data-driven mindset with experience in analytics, experimentation, and performance optimization\nExceptional stakeholder management, communication, and collaboration skills\nAbility to operate independently and drive alignment across diverse teams\nExperienced with AI product management tools, including standard prompt engineering and prototyping\nPreferred Qualifications\nExperience with HSA/FSA or healthcare financial products\nFamiliarity with tools such as Azure DevOps, Aha!, Figma, and product analytics platforms\nExperience with personalization, recommendation engines, or data-driven customer experiences\nExperience leveraging AI tools to support product workflows including Microsoft Copilot, Claude.ai, Claude Code etc\nCertified Scrum Product Owner (CSPO) or similar Agile certification", "id": "accion_labs_product_manager_2026-06-26"}, {"metadata": {"title": "Senior Product Manager", "company": "Acquia", "match_score": 85, "score_breakdown": [{"category": "Role Match", "matched": 3, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "senior product manager", "product management"]}, {"category": "Domain Match", "matched": 7, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["saas", "b2b", "ai", "infrastructure", "platform"]}, {"category": "Hard Skills", "matched": 2, "total": 24, "weight": 2, "pct": 40, "keywords_hit": ["roadmap", "product lifecycle"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "rag"]}, {"category": "Soft Skills", "matched": 7, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "collaboration", "leadership", "communication"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "global"]}, {"category": "Business Impact", "matched": 7, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["revenue", "growth", "conversion", "arr", "scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://ca.linkedin.com/jobs/view/senior-product-manager-at-acquia-4416962908", "date_added": "2026-06-26", "source": "LinkedIn", "location": "Canada", "work_type": "Remote"}, "body": "### Full Job Description\nAbout Acquia\nAcquia empowers the world\u2019s most ambitious brands to create digital customer experiences that matter. With open source Drupal at its core, the Acquia Digital Experience Platform (DXP) enables marketers, developers, and IT operations teams at thousands of global organizations to rapidly compose and deploy digital products and services that engage customers, enhance conversions, and help businesses stand out.\nHeadquartered in Boston, MA, Acquia is a Great Place to Work-CertifiedTM company, is listed as one of the world\u2019s top software companies by The Software Report, and is positioned as a market leader by the analyst community. We are Acquia. We are building for the future and we want you to be a part of it!\nCareer Exploration at Acquia\nOur recruitment process is designed to empower you in making the most informed decisions. Acquia is committed to providing an inclusive, transparent, efficient, and educational interview experience that cultivates exploration into career opportunities at Acquia\nYou will discover the opportunity to grow your career here and learn from a global team that empowers you to exceed boundaries and achieve the extraordinary.\nThe Mission\nAcquia's commercial backbone is its core PaaS platform \u2014 a $300M+ business representing the majority of Acquia's revenue and customer base. We are seeking a Senior Product Manager to lead the commercial execution and global rollout of our Unified AI-Native Cloud Platform, while serving as a senior voice and trusted partner across the platform team.\nThis is one of the most consequential roles on the team. The person we are looking for thrives on complexity \u2014 navigating high-stakes customer situations, partnering with sales on deals that matter, mentoring the PMs around them, and never letting the platform stop moving forward. You will be the commercial engine that turns platform capability into customer and market outcomes \u2014 equipping the field, driving transitions, and ensuring every platform investment lands with the customers and accounts that matter most.\nThis is not a role for someone who slows down when things get hard. It is a role for someone who raises the bar for everyone around them, earns trust quickly across the organization, and brings the seniority and judgment to operate independently on problems that matter.\nThe Profile\nThe Closer: You have a proven track record of commercial execution in B2B SaaS or cloud platforms \u2014 not just roadmap ownership, but equipping sales teams, driving renewals, and turning platform transitions into expansion opportunities. You understand what it takes to win in enterprise accounts and you bring that instinct into every product decision you make.\nThe Platform Strategist: You own the commercial and customer-facing execution of Acquia's PaaS platform strategy \u2014 ensuring that the path to a unified, AI-native cloud standard is grounded in what is actually happening in the field. You hold the commercial thread across a complex, multi-year program and you don't let it slip.\nThe Senior Voice: You are the PM the team turns to for the hard conversations \u2014 with customers, with sales, with engineering. You navigate those moments with the credibility, calm, and judgment that comes from having been in them before. You mentor the PMs around you not by directing them, but by raising the standard of what great PM work looks like.\nThe Customer Champion: You are unusually effective with enterprise customers, particularly in high-stakes or high-friction moments. You translate customer concerns into product signals and competitive pressure into platform priorities. When an account needs a senior PM in the room, you are the right person.\nThe Context Architect: You thrive in an Agentic PDLC environment. You provide high-fidelity commercial and strategic context that allows your team and agentic workflows to scale GTM planning, pricing documentation, and migration communications \u2014 without requiring your direct involvement in every step.\nKey Responsibilities\nLead Commercial Execution at the Customer Level. Own the customer and field-facing motion that turns platform investments into expansion and modernization wins \u2014 equipping sales and account teams with the narratives, tools, and product context they need to drive growth at every customer touchpoint. You bridge the gap between platform roadmap and commercial outcome, and you do it at pace.\nOwn Platform Transition Management. Manage high-stakes product lifecycle transitions for enterprise-grade solutions. You maintain customer trust and business continuity while moving a large global install base to a modern, high-performance platform standard. Customer friction is not a blocker \u2014 it is a problem you solve.\nDrive Renewal and Expansion Strategy. Partner with Account Management and Customer Success to ensure every renewal cycle is an opportunity for customer expansion into higher-value, AI-native services. You understand the commercial mechanics of NRR and you build the product and enablement frameworks that move it.\nMentor and Elevate the PM Team. Serve as a senior peer and informal mentor to the PMs around you. You raise the quality of thinking in the room, share what you know without being asked, and help the team operate at a higher level without needing formal authority to do it.\nNavigate Tough Customer and Sales Situations. Be the PM who shows up when the situation is difficult \u2014 customer escalations, competitive threats, deal-critical product questions. You bring the experience and composure to handle those moments well and turn them into trust-building opportunities.\nAccelerated Enablement. Leverage our agentic engine to drastically reduce the time it takes to produce market-facing collateral \u2014 turning roadmap milestones into commercial wins at an accelerated pace.\nLifecycle Value Alignment. Partner with Account Management and Success teams to ensure customers are consistently mapped to the platform capabilities that best support their growth. Serve as a strategic guide during key transition points, ensuring customers have a clear path to adopting the modern, AI-native services that drive superior experiences for their end-users.\nAgentic Collaboration. Build and maintain shared knowledge structures \u2014 platform context, migration playbooks, competitive intelligence, commercial frameworks \u2014 that allow the team's agentic workflows to scale documentation, analysis, and field enablement without manual overhead.\nQualifications\n7+ years of Product Management experience, with a heavy emphasis on PaaS, Cloud Infrastructure, or complex B2B Enterprise Software\nA proven track record of commercial execution \u2014 GTM, renewals, expansion strategy, and sales enablement \u2014 not just feature delivery\nThe seniority and EQ to navigate tough customer and sales conversations with credibility and composure \u2014 you have been in those rooms before and you know how to handle them\nDemonstrated ability to mentor peers and junior PMs and raise the bar of the team around you \u2014 without formal authority\nDeep comfort with platform migration or transition programs at enterprise scale \u2014 you understand what it takes to move customers through change without losing their trust\nStrong commercial instincts: comfortable partnering on margin analysis, pricing models, and business cases for a large, complex product portfolio\nAn AI-native working style \u2014 agentic workflows, not just AI as a tool \u2014 and the drive to be at the leading edge of how product management evolves\nExceptional upward and cross-functional communication: you keep leadership informed proactively and you represent the platform credibly in any room\nLocation: Must be based in Canada or Costa Rica, with availability during Eastern Standard Time business hours\nWe are an organization that embraces innovation and the potential of AI to enhance our processes and improve our work. We are always looking for individuals who are open to learning new technologies and collaborating with AI tools to achieve our goals.\nAcquia is proud to provide best-in-class benefits to help our employees and their families maintain a healthy body and mind. Core Benefits include: competitive healthcare coverage, wellness programs, take it when you need it time off, parental leave, recognition programs, and much more!\nAcquia is an equal opportunity (EEO) employer. Qualified applicants will receive consideration for employment without regard to race, color, religion, sex, national origin, disability, protected veterans status or any other protected status or characteristic under federal, state or local law unrelated to the ability to perform the job.\nWe are seeking an AI-Native candidate who treats AI not as an external tool, but as a fundamental extension of their cognitive workflow. The ideal candidate possesses an orchestration mindset\u2014the ability to skillfully prompt, manage, and direct AI to navigate complexity\u2014and maintains a high degree of AI fluency.\nYou should be characterized by radical adaptability and a \"builder\" mentality, showing a restless drive to transform traditional work processes into agentic workflows. Beyond technical proficiency, we value intellectual humility: the willingness to constantly unlearn old methods in favor of more efficient, AI-augmented processes. You don't just use AI to do your job; you use it to redefine what your job can achieve.", "id": "acquia_senior_product_manager_2026-06-26"}, {"metadata": {"title": "Principal Product Manager", "company": "ActiveCampaign", "match_score": 91, "score_breakdown": [{"category": "Role Match", "matched": 4, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "product lead", "product management", "principal product manager"]}, {"category": "Domain Match", "matched": 4, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["ai", "infrastructure", "platform", "startup"]}, {"category": "Hard Skills", "matched": 2, "total": 24, "weight": 2, "pct": 40, "keywords_hit": ["roadmap", "product vision"]}, {"category": "AI & Tech Skills", "matched": 5, "total": 19, "weight": 2.5, "pct": 100, "keywords_hit": ["ai", "artificial intelligence", "rag", "automation", "ai product"]}, {"category": "Soft Skills", "matched": 5, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "collaboration", "leadership", "autonomous"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "global"]}, {"category": "Business Impact", "matched": 3, "total": 16, "weight": 1.5, "pct": 75, "keywords_hit": ["growth", "engagement", "scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/principal-product-manager-at-activecampaign-4431862945", "date_added": "2026-06-26", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### Full Job Description\nActive Intelligence is already live \u2014 autonomous agents serving 180,000+ businesses, with real traction and a roadmap that gets more ambitious with every release. What we need now is the product leader who accelerates the layer that makes all of it smarter.\nThis is a principal-level IC role focused on two connected problem spaces: the context intelligence layer that gives Active Intelligence its depth, and the deep reasoning agent that turns that depth into marketing insight no other platform can deliver. You\u2019ll work alongside our Head of Applied AI, Head of Active Intelligence Engineering, and a team of product leaders who are each driving pieces of the autonomous marketing vision. Your piece is arguably the most leveraged \u2014 because everything else in the platform gets better when context and reasoning get better.\nWe ship fast, iterate in days not quarters, and expect product managers to own outcomes end-to-end \u2014 from prototype to production to in-market adoption. If you\u2019re looking for a role where scope is handed to you and success is defined for you, this isn\u2019t it. If you want to define both, keep reading.\nWhat You'll Do\nPartner with Applied AI Teams to Build the Context Layer. \nDefine and ship the structured intelligence layer that gives Active Intelligence deep understanding of each customer\u2019s business \u2014 their goals, brand, audience behavior, campaign history, and what\u2019s actually working. This is the signal architecture that turns 20+ years of marketing data into something every agent on the platform can reason over. You lead how context matures, what signals matter, and how it compounds across the product.\nBuild the Deep Reasoning Agent. \nLeverage frontier model capabilities \u2014 extended thinking, multi-step research, cross-source synthesis \u2014 to create a marketing intelligence agent that actually thinks about what\u2019s happening. Not dashboard summaries. Deep analysis: why engagement shifted, what top-performing segments share, where the next campaign should focus and why. You define what \u201cdeep\u201d means in a marketing context and ship something that makes static reporting feel obsolete.\nConnect the flywheel. \nThe reasoning agent without context is a wrapper. The context layer without a flagship consumer is infrastructure. You own the loop where deeper context produces more powerful reasoning, which drives more engagement, which generates richer context.\nOwn quality and evaluation. \nDesign the eval frameworks \u2014 golden sets, quality rubrics, output grading \u2014 that determine whether the reasoning agent is actually good, not just impressive in a demo. You set the bar for what \u201cmarketing-grade intelligence\u201d means and build the measurement systems to hold it.\nOperate as a technically credible builder. \nYou prototype with frontier models directly, test prompt architectures, and challenge engineering on system design \u2014 not because you want to do their job, but because the best product decisions at this layer require that depth. You\u2019re credible enough to pair with applied AI and ML engineers as a peer, and you have the product judgment to know when technical elegance is serving the customer and when it\u2019s not.\nWhat We're Looking For\nSomeone operating at the frontier of AI product thinking \u2014 not adjacent to it.\nExceptional product taste grounded in technical depth. You combine sharp instincts for what makes an experience genuinely useful with the technical credibility to engage deeply on system architecture, data models, and model behavior. Former engineering experience or an equivalent technical foundation is a strong signal.\nEval-driven quality mindset. You know that shipping AI features is easy and shipping reliable AI features is the actual job. You\u2019ve designed evaluation frameworks, defined quality bars, and built the feedback loops that separate demo-ware from production intelligence.\nCustomer value over technical elegance. You instinctively ask \u201cwhat does this unlock for the marketer?\u201d first. You\u2019ve seen infrastructure projects lose their way and you know how to keep shipping things that matter.\nOwnership mentality that doesn\u2019t wait for permission. You operate with founder-level drive \u2014 you see the gap, you build the prototype, you make the case, you ship it. Your growth here is defined by your own ambition and the impact you create, not by a ladder or a process. We\u2019re building something that hasn\u2019t existed before, and the people who thrive here are the ones who treat that as an invitation, not an obstacle.\nFirst-principles thinking in ambiguous domains. These problem spaces don\u2019t have playbooks to copy. You define categories, not follow them.\nCross-functional gravity. You move people without positional authority \u2014 because the thinking is sharp, the framing is right, and the judgment is trusted. You work at the intersection of data/ML, the agent platform, and the broader product org.\nThe Ideal Candidate Will Bring\nWe care more about what you\u2019ve done and how you think than how long you\u2019ve been doing it. That said, this role requires demonstrated depth:\nSignificant product management experience, with meaningful time building AI/ML-powered products in production at scale \u2014 not proofs of concept, production systems serving real users.\nDirect experience shaping data platforms, context systems, or structured intelligence layers \u2014 you\u2019ve made consequential decisions about what data to capture, how to structure it, and how to make it useful.\nTrack record of defining new product capabilities in fast-moving, ambiguous domains where you couldn\u2019t copy someone else\u2019s playbook.\nProduction experience with frontier AI models and agentic architectures \u2014 you\u2019ve learned the hard way what works in production versus in a demo.\nMarketing technology or customer engagement platform experience is a strong advantage \u2014 you understand the domain deeply enough to have real opinions about what marketers need.\nWhy This Role\nActive Intelligence is real, it\u2019s growing, and the roadmap ahead is the most ambitious product vision in marketing technology. You\u2019re joining at the moment where the foundation is proven and the next layer of intelligence is what separates us from everyone else.\nWhat this unlocks for you: \nYou get to define the context and reasoning architecture for an AI platform that 180,000+ businesses already rely on \u2014 not a startup pitch, a live product with real customers and real signal. You\u2019ll work with frontier models on problems where marketing domain expertise and AI product craft intersect in ways that don\u2019t exist at horizontal AI companies. And you\u2019ll have the autonomy and speed of a team that treats principal ICs as the primary unit of product leadership \u2014 not a layer of management with review gates above you.\nThis is the role that makes the autonomous marketing vision compound.\nAbout ActiveCampaign\nActiveCampaign is the autonomous marketing platform for people at the heart of the action. It empowers teams to automate their campaigns with AI agents that imagine, activate, and validate\u2013freeing them from step-by-step workflows and unlocking limitless ways to orchestrate their marketing.\nWith AI, goal-based automation, and 1,000+ app integrations, agencies, marketers, and owners can build cross-channel campaigns in minutes\u2013fine-tuned with billions of data points to drive real results for their unique business.\nActiveCampaign is the trusted choice to help businesses unlock a new world of boundless opportunities\u2013where ideas become impact and potential turns into real results.\nAs a global multicultural company, we are proud of our inclusive culture which embraces diverse voices, backgrounds, and perspectives. We don\u2019t just celebrate our differences, we believe our diversity is what empowers our innovation and success. You can find out more about our DEI initiatives here.\nPerks And Benefits\nAt ActiveCampaign, we prioritize employees\u2019 well-being and professional growth by cultivating a culture centered on collaboration and innovation. When you join our team, you\u2019ll not only have the opportunity to make a significant impact, but also enjoy a range of benefits tailored to support your personal and career development.\nHere Are Some Of The Benefits We Offer\nComprehensive Health & Wellness: Top-tier benefits package that includes a fully-covered High Deductible Health Plan (HDHP), complimentary access to telehealth services, and a free subscription to Calm.\nGrowth & Development: Access to LinkedIn Learning, professional development programs, and career growth opportunities in a fast-growing organization.\nGenerous Paid Time Off: Recharge and take the time you need to maintain work-life balance with open PTO.\nTotal Rewards: Generous 401(k) matching with immediate vesting, quarterly perks with commuter and lunch benefits for hub based employees or a stipend for remote workers, and a four-week paid sabbatical with bonus after five years.\nCollaborative Culture: Work alongside brilliant, passionate colleagues in an environment that values innovation, teamwork, and mutual support.\nActiveCampaign is an equal opportunity employer. We recruit, hire, pay, grow and promote no matter of gender, race, color, sexual orientation, religion, age, protected veteran status, physical and mental abilities, or any other identities protected by law.\nOur Employee Resource Groups (ERGs) strive to foster a diverse inclusive environment by supporting each other, building a strong sense of belonging, and creating opportunities for mentorship and professional growth for their members.\nWe may use artificial intelligence (AI) tools to support parts of the hiring process, such as reviewing applications, analyzing resumes, or assessing responses and identifying potential inconsistencies or verification signals in application materials based on available information. These tools assist our recruitment team but do not replace human judgment. Final hiring decisions are ultimately made by humans. If you would like more information about how your data is processed, please contact us.\nCompensation details listed in this posting reflect the base rate only and do not include bonus, equity, sales incentives or other role specific compensation that the role may be eligible for. ActiveCampaign believes in and is committed to equitable compensation practices. The salary range provided above is a good faith estimate of the pay range determined by the location associated with the job posting. The actual salary depends on a candidate\u2019s skills, experience, and work location.", "id": "activecampaign_principal_product_manager_2026-06-26"}, {"metadata": {"title": "Product Manager", "company": "adly", "match_score": 95, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product management"]}, {"category": "Domain Match", "matched": 5, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["saas", "ai", "platform", "marketplace", "startup"]}, {"category": "Hard Skills", "matched": 10, "total": 24, "weight": 2, "pct": 100, "keywords_hit": ["roadmap", "user research", "a/b testing", "kpi", "sprint"]}, {"category": "Tools", "matched": 1, "total": 14, "weight": 1.5, "pct": 33, "keywords_hit": ["asana"]}, {"category": "AI & Tech Skills", "matched": 7, "total": 19, "weight": 2.5, "pct": 100, "keywords_hit": ["ai", "llm", "claude", "rag", "nlp"]}, {"category": "Soft Skills", "matched": 3, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["remote", "stakeholder", "leadership"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Business Impact", "matched": 7, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["revenue", "growth", "retention", "acquisition", "conversion"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/product-manager-at-adly-4418851157", "date_added": "2026-06-22", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### Full Job Description\nAbout Adly:\nAdly is a technology, data, and performance-driven portfolio of SaaS subscription and content companies. Our founders have built, acquired, scaled, and sold SaaS, ecommerce, and marketing businesses - and continue adding companies to the Adly portfolio.\nWe scale our businesses through a combination of paid media, organic search/SEO, CRO, and product-led growth - and we are increasingly leveraging AI across product development, operations, and decision-making.\nA Product Manager at Adly owns product outcomes across multiple businesses in the portfolio. You will drive the full product lifecycle - from discovery and prioritization through engineering execution, launch, and performance analysis - for several products simultaneously. You are the connective tissue between engineering, growth, design, and operations, ensuring every sprint, feature, and release ladders up to business KPIs.\nThis is a high-autonomy, high-ownership role. You set the priorities, run the process, drive accountability, analyze the data, and present the results to leadership. You operate with a business owner mindset because, functionally, that is what you are - the person responsible for the trajectory of the products you manage.\nYou are a builder first. You prototype with AI coding tools (Cursor, Claude Code, Bolt), run evals on AI-powered features, and ship faster because you can go from idea to working proof-of-concept without waiting for engineering. You don't just manage products - you make things.\nResponsibilities:\nOwn the product roadmap and backlog across multiple Adly portfolio companies, prioritizing based on business impact, urgency, and resource constraints\nLead engineering teams through planning, execution, and delivery - keeping projects on track, removing blockers, and maintaining velocity\nCollaborate with Growth, Design, and Operations stakeholders to scope requirements, align on goals, and translate business needs into actionable engineering work\nDefine success metrics for every initiative and rigorously measure outcomes post-launch - revenue, retention, conversion, engagement, LTV\nPlan and execute A/B tests, new conversion funnels, landing pages, and growth experiments with measurable results\nQA product launches to ensure features ship bug-free and meet stakeholder requirements\nMonitor product performance closely, making fast decisions to iterate, scale, or revert based on data\nPresent performance, progress, insights, and recommendations to leadership with clarity and conviction\nEvaluate where AI/LLM features can create step-function improvements in user experience, conversion, or operational efficiency across portfolio products\nBuild and maintain AI-powered workflows for your own PM practice - competitive analysis, user research synthesis, data exploration, and spec generation\nStay current with AI model capabilities, agentic frameworks, and developer tools - and proactively share and potentially apply new capabilities to your products and processes\nSkills & Experience:\n2+ years of product management experience, ideally in a fast-paced or multi-product environment\nYou have managed engineering teams and shipped products end-to-end - from scoping through launch and iteration\nStrong analytical skills - you are comfortable pulling data, building reports, running experiments, and making decisions grounded in metrics\nProficiency with project management tools (Asana or similar) and a system for keeping complex, parallel workstreams organized\nExperience with marketing funnels, CRO, and A/B testing\nExcellent communicator - you translate between technical and non-technical stakeholders and keep everyone aligned\nDemonstrated AI power user - you can show specific examples of using AI tools (LLMs, coding assistants, automation platforms) to produce work that would have been impossible or 5x slower without them\nFluency with LLM concepts - you understand prompting, context windows, model tradeoffs, and can evaluate AI-powered features with judgment, not just enthusiasm\nExperience evaluating where AI can create leverage in product features or internal workflows\nSelf-sufficient and resourceful - you do not wait to be told what to do, and you ask for what you need\nYou thrive managing multiple products simultaneously and context-switching without dropping balls\nBonus:\nExperience in consumer products, marketplaces, or subscription businesses\nFamiliarity with SEO, paid acquisition, or growth marketing\nExperience shipping AI-powered product features (recommendations, automation, NLP, agents, etc)\nSide projects, demos, or prototypes that demonstrate hands-on AI building\nFamiliarity with eval frameworks, prompt iteration, or agentic workflows\nExposure to portfolio or multi-business environments\nWhat Adly Offers\nA leadership team that has founded, scaled, and exited multiple companies - with clear ambition to make Adly a dominant player in SaaS and content\nOwnership across multiple businesses - not one feature team, but real P&L-level impact\nSmall team with significant room for career advancement\nA work environment that is equal parts startup energy and results-driven meritocracy\nOpportunities to grow your technical, analytical, and leadership skills rapidly\nHealth benefits (medical, dental, vision) - U.S. only\nUnlimited PTO\n401(k) savings plan - U.S. only\nCompetitive bonus structure", "id": "adly_product_manager_2026-06-22"}, {"metadata": {"title": "Product Manager, HealthTech", "company": "Adoreal", "match_score": 100, "score_breakdown": [{"category": "Role Match", "matched": 3, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "product lead", "product management"]}, {"category": "Domain Match", "matched": 6, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["saas", "fintech", "ai", "infrastructure", "platform"]}, {"category": "Hard Skills", "matched": 4, "total": 24, "weight": 2, "pct": 80, "keywords_hit": ["roadmap", "data-driven", "kpi", "requirements"]}, {"category": "Tools", "matched": 4, "total": 14, "weight": 1.5, "pct": 100, "keywords_hit": ["jira", "confluence", "figma", "analytics"]}, {"category": "AI & Tech Skills", "matched": 3, "total": 19, "weight": 2.5, "pct": 75, "keywords_hit": ["ai", "rag", "automation"]}, {"category": "Soft Skills", "matched": 5, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["remote", "stakeholder", "collaboration", "leadership", "communication"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "global"]}, {"category": "Business Impact", "matched": 2, "total": 16, "weight": 1.5, "pct": 50, "keywords_hit": ["growth", "scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/product-manager-healthtech-at-adoreal-4424746475", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Colorado, United States", "work_type": "Remote"}, "body": "### Full Job Description\nWho We Are\nWe are a fast-growing vertical SaaS company that leverages innovation and disruptive technologies to improve consumer experiences, outcomes, and predictability in elective medicine. Our team thrives on challenges, embraces change, and is dedicated to transforming our industry.\nAdoreal is scaling rapidly, and the way we build is changing just as fast. We are moving from a world where product hands off specs and Figma files to engineering, to one where product and design build working software alongside engineering. This role is built for that future, but it starts, as great product work always has, with deep knowledge of the space and the customer.\nWhile we are a remote-first company, we are currently only able to hire candidates located in the following U.S. states: CA, CO, FL, GA, IL, OK, OR, PA, RI, TX, UT, and WA. We hope to expand to additional states in the future.\nWho We Are Looking For\nWe are looking for a Product Manager who knows their space cold and is excited to build, not just specify. The foundation of this role is what it has always been: understanding the customer deeply, knowing the problems worth solving, and having the judgment to know what good looks like. On top of that foundation, you will be hands-on with the tools that are compressing the distance between an idea and working software, building alongside engineering rather than handing off to them.\nThis is a high-growth opportunity. We need someone who can drive impactful product work today and grow into a product leadership role as we scale.\nResponsibilities\nYou will own the full arc of a product area: understanding the customer and the domain deeply, defining where we should go, and increasingly, helping build it.\nDevelop genuine, deep expertise in your space and your customers. The most valuable thing a PM brings is real understanding of the people who use our platform, the way they work, and the problems worth solving. We are automating the ceremony-heavy parts of the job specifically so you can spend more time here. \nTranslate that understanding into product direction: define, prioritize, and execute a roadmap that aligns with Adoreal's mission, and think big about what is now possible as build time compresses. \nBuild working software against our actual code base using AI development tools, alongside engineering. You will investigate feasibility yourself, understand what already exists in the platform, surface complexity early, and come to engineering with informed questions and functioning work rather than a spec to be interpreted. Depending on the work, that might be an early prototype, or it might be closer to production-ready. The point is that you are building, not just describing. \nPartner closely with design from the start. Product and design work side by side. This is a collaboration, not a sequential handoff. \nBuild and maintain the context that makes these tools effective: clear product requirements, deep customer and platform knowledge, and the documentation that lets AI tools produce work that looks and behaves like Adoreal. The quality of what we build depends entirely on the quality of the thinking and context behind it. \nGenerate user stories and engineering-ready tickets from your research and your work, and collaborate with engineering through refinement, where they review, improve, and extend what you bring rather than building from scratch. \nUse platform data and analytics to make informed decisions, identify friction in the experience, and make proactive, intelligent recommendations. \nDecide when to build and when to integrate, balancing speed, complexity, and long-term maintainability. \nSet a high standard for product excellence and help establish best practices across the team as our way of working evolves. \nRequirements\n5 to 10 years in software product management, ideally including complex, high-trust, or regulated environments such as healthcare or fintech. \nDeep domain expertise in whatever space you've worked in, the kind of knowledge that comes from really understanding an industry, its users, and its workflows rather than skimming the surface. You take pride in knowing your space better than anyone in the room. \nDemonstrated ability to understand intricate workflows and systems and translate them into product and technical requirements. \nGenuine technical fluency. You do not need to have shipped production code, but you should be comfortable reading it, reasoning about how systems connect, working in tools like a code editor and terminal, and understanding the tradeoffs engineers care about. \nHands-on experience with AI development tools, or a clear, demonstrated appetite to become expert with them quickly. You are the kind of person who reaches for the new tool, figures out where it breaks, and shares what you learned. \nA builder's instinct. You would rather show a working thing than describe a hypothetical one. \nStrong communication skills, with the ability to simplify complex requirements and foster collaboration across design, engineering, and the broader business. \nExperience building infrastructure and integrations related to financial or payment processing systems. \nAn analytical, data-driven mindset, with comfort using analytics, experimentation, and KPIs to guide decisions. \nProficiency with JIRA, Confluence, or similar tools. \nComfort with ambiguity and rapid change. Our tools, processes, and what is possible are all evolving quickly, and we are figuring a lot of it out as we go. \nPreferred Qualifications\nExperience with operational or back-office systems and the workflows that run a business behind the scenes, the kind of platforms where data integrity, process automation, and connected systems really matter. \nExperience in a fast-paced startup or high-growth environment. \nA track record of adopting emerging technology thoughtfully and bringing a team along with you. \nBackground in healthcare, wellness, aesthetics, or another vertical SaaS environment is a plus. \nExperience implementing an ERP or business central experience is a plus. \nBenefits\nWhat We Offer\nAt Adoreal, we believe in supporting our team's well-being and growth through comprehensive benefits and a collaborative, people-first culture. As a globally remote company, we prioritize flexibility, inclusivity, and teamwork rooted in the Adoreal principles.\nBenefits & Perks:\n Healthcare coverage for you and your family \n Paid time off (PTO) and paid holidays \n Performance-based bonuses and company equity opportunities \n Fully remote work environment with flexible schedules \n Collaborative and thriving team culture guided by Adoreal's core values\nWhy Adoreal?\nJoining Adoreal means becoming part of a high-performing, ambitious team that works hard, achieves extraordinary results, and enjoys the rewards that follow. Every employee receives equity, aligning us all in our shared success. Promotions and growth opportunities are limitless, driven only by your performance and dedication to our core principles:\nWe do what is best for the company, not what is best for individuals of the company\u2014we take pride in our work, but not in pride itself\u2014the success of Adoreal is more important than our egos\nWe always share relevant information and admit our mistakes freely and openly (even when it is worrisome or uncomfortable to do so). Candid communication and a solution-oriented mindset is rewarded\nWe innovate by finding the right problems, then solving them. We thrive on change that minimizes complexity and improves situations for our stakeholders\nWe incentivize efficient results & people over process and focus only on the work that creates the most value for our stakeholders\nWe are quietly confident and openly humble, being tenacious in our quest to perform and inspire others with our thirst for excellence\nWe do not bow up and knock down\u2014we care about our teammates and treat all of them with respect, regardless of their level within the company\nWe are steadfast in our pursuit to better our company, our colleagues, and ourselves. When we hire, we only hire people who bleed our principles and who will hopefully be our replacement one day\nAt this time, Adoreal is not offering visa sponsorship for this position. Candidates must have current and valid authorization to work in the country where they are applying. We comply with all applicable employment and immigration laws, including U.S. regulations, and encourage applicants to verify their work authorization status before applying.\u2028\u2028\nAdoreal is an equal opportunity employer committed to fostering a diverse, inclusive, and fair workplace. We do not discriminate based on race, color, religion, sex, sexual orientation, gender identity, national origin, age, disability, genetic information, marital status, veteran status, or any other protected characteristic under applicable U.S. law (EEOC) or local employment regulations where we operate. We encourage applications from candidates of all backgrounds.\nAccommodations for disabilities are available upon request throughout the recruitment process.\n*We are not working with search firms for this role, thank you*", "id": "adoreal_product_manager_healthtech_2026-06-22"}, {"metadata": {"title": "Technical Product Manager, Observability Domain", "company": "Agoda", "match_score": 81, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product management"]}, {"category": "Domain Match", "matched": 3, "total": 17, "weight": 2, "pct": 75, "keywords_hit": ["ai", "platform", "travel"]}, {"category": "Hard Skills", "matched": 3, "total": 24, "weight": 2, "pct": 60, "keywords_hit": ["roadmap", "data-driven", "product lifecycle"]}, {"category": "Tools", "matched": 3, "total": 14, "weight": 1.5, "pct": 100, "keywords_hit": ["jira", "confluence", "sql"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "rag"]}, {"category": "Soft Skills", "matched": 5, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "stakeholder", "collaboration", "leadership", "communication"]}, {"category": "Location Preference", "matched": 4, "total": 12, "weight": 1.5, "pct": 100, "keywords_hit": ["indonesia", "jakarta", "distributed", "worldwide"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/technical-product-manager-observability-domain-at-agoda-4404849432", "date_added": "2026-06-28", "source": "LinkedIn", "location": "Jakarta, Jakarta, Indonesia", "work_type": "See posting"}, "body": "### Full Job Description\nAbout Agoda\nAt Agoda, we bridge the world through travel. Our story began in 2005, when two lifelong friends and entrepreneurs, driven by their passion for travel, launched Agoda to make it easier for everyone to explore the world.\nToday, we are part of Booking Holdings [NASDAQ: BKNG], with a diverse team of over 7,000 people from 90 countries, working together in offices around the globe. Every day, we connect people to destinations and experiences, with our great deals across our millions of hotels and holiday properties, flights, and experiences worldwide.\nNo two days are the same at Agoda. Data and technology are at the heart of our culture, fueling our curiosity and innovation. If you\u2019re ready to begin your best journey and help build travel for the world, join us.\nGet to Know our Team\nAgoda\u2019s Technical Product Management (TPM) organization drives internal platforms and tools that enable thousands of engineers to build and operate world-class products efficiently and reliably. Our TPMs play a key role in bridging business, data, and technology\u2014translating complex needs into scalable solutions that empower teams across the company.\nThe Observability domain ensures Agoda\u2019s systems are visible, traceable, and resilient\u2014helping us maximize uptime and minimize recovery time from incidents so customers always enjoy the best experience possible. This includes building and evolving our platforms for telemetry, distributed tracing, anomaly detection, alerting, and incident management. The work is both highly technical and highly impactful, sitting at the core of Agoda\u2019s Production Excellence.\nThe Opportunity\nAs a Technical Product Manager for Observability, you will lead the vision, roadmap, and delivery of Agoda\u2019s observability platforms. You\u2019ll collaborate with engineers, SREs, and data scientists to strengthen our ability to detect, prevent, and resolve production issues faster\u2014leveraging data and AI to drive smarter, more proactive monitoring.\nThis is a high-impact role that shapes how Agoda builds reliable, scalable systems powering millions of traveler experiences every day.\nIn This Role, You\u2019ll Get To:\nOwn the full product lifecycle for observability platforms\u2014from concept to delivery and continuous improvement.\nDefine the vision for anomaly detection, tracing, and visibility systems that accelerate detection and recovery.\nPartner with engineers, SREs, and product teams to identify reliability pain points and prioritize impactful solutions.\nBalance product velocity with technical debt and operational risk, working closely with senior engineers.\nDefine and track key metrics to measure platform impact.\nCollaborate with data scientists to apply ML/AI techniques.\nCommunicate effectively across all levels\u2014especially during complex or time-sensitive situations.\nDemonstrate strong leadership, organization, and execution skills to drive initiatives from concept to launch.\nStay current with industry trends in observability, SRE, and ML-driven monitoring, and apply them at Agoda. \nWhat You\u2019ll Need to Succeed:\n3+ years of technical product or program management experience in a fast-paced environment.\n5+ years of technical experience/familiarity with observability, reliability, or production excellence domains (e.g., monitoring, tracing, incident management).\nStrong product management and communication skills, with the ability to influence without authority across technical and business teams.\nProven ability to define vision and strategy, set clear priorities, and deliver measurable impact.\nExperience managing complex, cross-functional technical initiatives end-to-end.\nExcellent stakeholder management and presentation skills; able to simplify complex technical concepts.\nFamiliarity with observability, reliability, or production excellence domains (e.g., monitoring, tracing, incident management).\nAnalytical and data-driven mindset; comfortable using metrics, dashboards, or SQL to support decision-making.\nHighly organized and adaptable, able to manage multiple priorities and navigate ambiguity.\nHands-on experience with product management tools (e.g., JIRA, Confluence).\nEnergetic, curious, and proactive\u2014the drive to \u201cfigure things out\u201d and make meaningful improvements. \nThis position requires a successful candidate to relocate fully to Bangkok, Thailand, where relocation support is provided.***\n#bangkok #sanjose #losangeles #sydney #melbourne #perth #vancouver #shanghai #beijing #shenzhen #copenhagen #paris #hongkong #budapest #jakarta #dublin #telaviv #milan #rome #tokyo #kualalumpur #amsterdam #oslo #jerusalem #moscow #barcelona #madrid #stockholm #zurich #taipei #london #wroclaw #warsaw #chennai #pune #toronto #austin #sydney #chichago #noida #delhi #seattle #hyderabad #gurgaon #newyork #bangalore #boston #bengaluru #berlin #mumbai #IT #4 #5 \nPlease review our Hiring Process Guidelines before your interview \u2014 click here to learn how interviewing at Agoda works.\nDiscover More About Working At Agoda\nAgoda Careers https://careersatagoda.com\nFacebook https://www.facebook.com/agodacareers/\nLinkedIn https://www.linkedin.com/company/agoda\nYouTube https://www.youtube.com/agodalife\nEqual Opportunity Employer \nAt Agoda, we pride ourselves on being a company represented by people of all different backgrounds and orientations. We prioritize attracting diverse talent and cultivating an inclusive environment that encourages collaboration and innovation. Employment at Agoda is based solely on a person\u2019s merit and qualifications. We are committed to providing equal employment opportunity regardless of sex, age, race, color, national origin, religion, marital status, pregnancy, sexual orientation, gender identity, disability, citizenship, veteran or military status, and other legally protected characteristics.\nWe will keep your application on file so that we can consider you for future vacancies and you can always ask to have your details removed from the file. For more details please read our privacy policy.\nDisclaimer\nWe do not accept any terms or conditions, nor do we recognize any agency\u2019s representation of a candidate, from unsolicited third-party or agency submissions. If we receive unsolicited or speculative CVs, we reserve the right to contact and hire the candidate directly without any obligation to pay a recruitment fee.", "id": "agoda_technical_product_manager_observability_domain_2026-06-28"}, {"metadata": {"title": "Product Manager", "company": "Aha! (", "match_score": 44, "score_breakdown": [{"category": "Role Match", "matched": 1, "total": 11, "weight": 3, "pct": 33, "keywords_hit": ["product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Hard Skills", "matched": 1, "total": 24, "weight": 2, "pct": 20, "keywords_hit": ["roadmap"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 3, "total": 12, "weight": 1.5, "pct": 100, "keywords_hit": ["remote", "anywhere", "worldwide"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://news.ycombinator.com/item?id=22669584", "date_added": "2026-06-22", "source": "Hacker News", "location": "Unknown", "work_type": "Unknown"}, "body": "### HN Who is Hiring\n- https:&#x2F;&#x2F;www.aha.io\n- ) | Rails &#x2F; React &#x2F; Security | REMOTE\n- Aha! is the #1 tool for product managers to plan strategy and roadmaps. We serve more than 300,000 users worldwide.\n- We are looking for:\n- * Experienced full-stack engineers to work on the Aha! product. Our application is built in Ruby on Rails, with some React on the frontend for rich client-side experiences.\n- * Security engineers, with hands-on Rails development experience plus experience with compliance projects, security policy development, or other security initiatives.\n- Aha! is profitable, you can work from anywhere in North America, and we offer excellent benefits. We use our own product to manage our work (which is especially rewarding) and we deploy continuously.\n- Our entire team is
