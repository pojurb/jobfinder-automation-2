y day, hosts offer unique stays and experiences that make it possible for guests to connect with communities in a more authentic way.\nThe Community You Will Join\nOur Product Marketing team imagines the ideal experience for our community and works backwards, creating innovative products that delight our guests and hosts. They deeply understand the needs of our users and translate these into a product strategy that combines strong product thinking and deep research. They partner with talented cross-functional team members across engineering, design, operations, data science, and more, leading teams to execute a shared vision. They are incredibly detail-oriented, hands on and excellent communicators, capable of crafting compelling stories for both internal and external audiences.\nThe Difference You Will Make\nThe International Product Marketing team is part of the worldwide Product Marketing team and we are looking for entrepreneurial product experts who are ready to jump in, roll their sleeves up and integrate with local teams, while maintaining close alignment with the global organization. This role will help build out the new functional area outside of the US and will be instrumental in shaping the organization as it evolves. The cross functional model we use at Airbnb requires close partnerships across multiple teams \u2013 this role requires a highly collaborative, flexible individual who can influence and collaborate with teams across the world.\nAs the Product Manager based in our EMEA region, you will report to the Product Marketing Director for International Markets. You will play a pivotal role in understanding the needs, pain points, and wants of users and translate those insights into innovative product features, capabilities and marketing strategies. The ideal candidate will possess a deep understanding of the travel industry at a market and broader regional level, and have a proven track record of driving product innovation. You will collaborate with the global business and country teams to develop partnerships that accelerate existing and new businesses. You will drive features in major releases and for test and learn pilots, after having successfully championed for customization and features for your target country/region. You will also determine how they are communicated to the public and the media in your region in partnership with the communications and marketing teams. You are responsible for the success of Airbnb products throughout their life cycle \u2014 from concept to release. You will be the voice of our products for the market in your region and love the journey from taking a product from idea to reality.\nThis role is based in London (or within easy commuting distance).\nA Typical Day\nBuild deep expertise on Airbnb in your market/region through user research, marketplace data, and an understanding of the competitive landscape and be capable of synthesizing in a cohort product story input from multiple stakeholders and sources.\nWork with other functional leaders in your market/region to articulate the product vision, strategy, and roadmap for Airbnb products and new businesses.\nImplement best-in-class product development and management practices.\nMaintain and articulate a product feature and roadmap prioritization plan in collaboration with local teams.\nAdvocate for and execute new products that deliver impact for our business and users.\nCommunicate concisely and influence outcomes across all levels of the company, including country and regional executive teams\nDrive alignment across product teams (Technology, Design) and key cross-functional partners (Business, Supply, FP&A, Marketing, Global Operations, Customer Support, Trust, etc.) to ensure initiatives are prioritized for wider roll-out or piloted to test and learn\nDefine goals and success with clearly measurable objectives and key results for your area.\nBuild and seamlessly integrate partnerships in your country/region that expand existing businesses and build new ones.\nNavigate regulatory and government requirements in partnership with Policy/Comms and regions/markets.\nCraft the product narrative and marketing strategies that communicate the benefits and features of our products both internally and externally in collaboration with comms and other cross functional partners.\nDevelop and deliver engaging product demos to press, showcasing key features and functionalities.\nYour Expertise\n8-12 years of product management experience.\nFluency in English and at least one other European language (strong preference for Spanish, French, or German) due to market needs.\nDemonstrated track record of product leadership. \nComfortable with doing individual contributor product management work.\nSuccess in building and scaling global consumer products and ecosystems that people love.\nExperience creating product messaging and delivering to customers and the media.\nEntrepreneurial track record of taking an idea to reality \u2013 start up experience a plus while capable of operating in a larger organization.\nAbility to effectively use data and perform business analysis to support product strategy/decisions.\nCapable of driving execution across teams in a fast-paced environment.\nHighly collaborative and results oriented.\nAbility to travel at least 25% of the time\nOur Commitment To Inclusion & Belonging\nAirbnb is committed to working with the broadest talent pool possible. We believe diverse ideas foster innovation and engagement, and allow us to attract creatively-led people, and to develop the best products, services and solutions. All qualified individuals are encouraged to apply.\nHow We'll Take Care Of You\nOur job titles may span more than one career level. The actual base pay is dependent upon many factors, such as: training, transferable skills, work experience, business needs and market demands. The base pay range shown below is annualized, is subject to change and may be modified in the future. This role may also be eligible for bonus, equity, benefits, and Employee Travel Credits.\nUnited Kingdom Annual Pay Range\n\u00a3112,000\u2014\u00a3140,000 GBP", "id": "airbnb_product_manager_emea_2026-06-22"}, {"metadata": {"title": "Product Manager, Guest Discovery & Homepage", "company": "Airbnb", "match_score": 87, "score_breakdown": [{"category": "Role Match", "matched": 3, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "product lead", "product management"]}, {"category": "Domain Match", "matched": 3, "total": 17, "weight": 2, "pct": 75, "keywords_hit": ["ai", "marketplace", "travel"]}, {"category": "Hard Skills", "matched": 4, "total": 24, "weight": 2, "pct": 80, "keywords_hit": ["roadmap", "product strategy", "user research", "product vision"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "rag"]}, {"category": "Soft Skills", "matched": 3, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "leadership"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "global"]}, {"category": "Business Impact", "matched": 4, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["growth", "arr", "engagement", "scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/product-manager-guest-discovery-homepage-at-airbnb-4421279635", "date_added": "2026-06-22", "source": "LinkedIn", "location": "New York, United States", "work_type": "Remote"}, "body": "### Full Job Description\nAirbnb was born in 2007 when two hosts welcomed three guests to their San Francisco home, and has since grown to over 5 million hosts who have welcomed over 2 billion guest arrivals in almost every country across the globe. Every day, hosts offer unique stays and experiences that make it possible for guests to connect with communities in a more authentic way.\nThe Community You Will Join\nOur Product Managers imagine the ideal experience for our community and work backwards, creating innovative products that delight our guests and hosts. They deeply understand the needs of our users and translate these into a strategy that combines strong product thinking and deep research. They partner with talented cross-functional team members across engineering, design, operations, data science, and more, leading teams to execute a shared vision. They are incredibly detail-oriented and hands on.\nThe Difference You Will Make\nWe are looking for a product leader to drive the transformation of Airbnb's homepage and discovery for our guest experience. In this key role, you\u2019ll be responsible for Airbnb\u2019s Hompeage\u2014making it effortless for every guest to discover the most relevant Homes, Services, Experiences, and offerings yet to come, as soon as they open the Airbnb app.\nYou\u2019ll partner closely with design, engineering, and data teams to invent new browsing tools with the latest AI technologies and intuitive UI formats that delight our users. You will partner closely with our marketing team to ensure Airbnb\u2019s voice and discovery journey expands into our lifecycle campaigns and new marketing programs.\nA Typical Day\nLead the product vision, strategy, and roadmap for the discovery needs of all key business verticals (e.g. Homes, Services, Experiences, International) and new bets (e.g. Hotels, Luxe, Partnerships)\nLead the development of new discovery features and content formats that drive core guest and bookings growth.\nIncorporate the latest AI technologies and relevance models to uplevel Airbnb\u2019s browsing experience\nCollaborate with marketing teams to extend Airbnb\u2019s discovery strategy to our lifecycle and growth marketing campaigns.\nCraft the product narrative and marketing strategies that communicate the benefits and features of these products both internally and externally.\nDevelop product roadmaps and build alignment across product teams (Tech, Design), cross-functional partners (FP&A, Marketing, Global Operations, Customer Experience, Trust, etc.) and Leadership/Executive team.\nInspire teams, leadership, and the company to support the success of your products and business outcomes.\nBuild deep expertise on the subject matter both through user research, marketplace data, and an understanding of the competitive landscape.\nDefine goals and success with clearly measurable objectives and key results. \nEfficiently execute to ship products and deliver impact for our business and users.\nYour Expertise\n8+ years of product management experience.\nExperience creating product messaging and delivering to customers and the media.\nDemonstrated track record of building cross-functional and executive leadership alignment. \nExperience working on consumer products with marketplace dynamic on a global scale.\nEntrepreneurial track record of taking an idea to reality.\nA strong ability to effectively use data and perform business analysis to support product strategy/decisions.\nExcited to drive execution across teams in a fast-paced environment.\nDesire to do individual contributor product management work.\nYour Location:\nDue to the nature of this position, the successful applicant will need to be based in San Francisco, CA, Los Angeles, CA, Seattle, WA or New York, NY to be able to conduct their work.\nOur Commitment To Inclusion & Belonging\nAirbnb is committed to working with the broadest talent pool possible. We believe diverse ideas foster innovation and engagement, and allow us to attract creatively-led people, and to develop the best products, services and solutions. All qualified individuals are encouraged to apply.\nWe strive to also provide a disability inclusive application and interview process. If you are a candidate with a disability and require reasonable accommodation in order to submit an application, please contact us at: reasonableaccommodations@airbnb.com. Please include your full name, the role you\u2019re applying for and the accommodation necessary to assist you with the recruiting process.\nWe ask that you only reach out to us if you are a candidate whose disability prevents you from being able to complete our online application.\nHow We'll Take Care Of You\nOur job titles may span more than one career level. The actual base pay is dependent upon many factors, such as: training, transferable skills, work experience, business needs and market demands. The base pay range is subject to change and may be modified in the future. This role may also be eligible for bonus, equity, benefits, and Employee Travel Credits.\nPay Range\n$200,000\u2014$240,000 USD", "id": "airbnb_product_manager_guest_discovery_homepage_2026-06-22"}, {"metadata": {"title": "Product Manager, Relevance and Personalization", "company": "Airbnb", "match_score": 87, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product management"]}, {"category": "Domain Match", "matched": 4, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["ai", "platform", "marketplace", "travel"]}, {"category": "Hard Skills", "matched": 2, "total": 24, "weight": 2, "pct": 40, "keywords_hit": ["roadmap", "user research"]}, {"category": "AI & Tech Skills", "matched": 5, "total": 19, "weight": 2.5, "pct": 100, "keywords_hit": ["ai", "llm", "rag", "generative ai", "ai-powered"]}, {"category": "Soft Skills", "matched": 4, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "leadership", "strategic"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "global"]}, {"category": "Business Impact", "matched": 4, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["revenue", "arr", "engagement", "scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/product-manager-relevance-and-personalization-at-airbnb-4411849551", "date_added": "2026-06-22", "source": "LinkedIn", "location": "San Francisco, CA", "work_type": "Remote"}, "body": "### Full Job Description\nAirbnb was born in 2007 when two hosts welcomed three guests to their San Francisco home, and has since grown to over 5 million hosts who have welcomed over 2 billion guest arrivals in almost every country across the globe. Every day, hosts offer unique stays and experiences that make it possible for guests to connect with communities in a more authentic way.\nThe Community You Will Join\nThe Relevance & Personalization (R&P) team is Airbnb's matching intelligence engine \u2014 a talented team of ML engineers, applied researchers, and technical program managers who connect guests to the right listings across every surface and help hosts compete and thrive in our marketplace. We work at the intersection of search ranking, recommendations, personalization, and generative AI, and we're building toward a future where Airbnb feels less like a search engine and more like a knowledgeable travel companion that understands your needs across your entire trip journey.\nThe Difference You Will Make\nAs Product Manager for Relevance & Personalization, you will help set the strategy and drive execution for some of Airbnb's highest-leverage AI systems. You'll own the roadmap and shape how personalization works across the guest journey, and help define how we close the feedback loop for hosts. You'll partner with engineers, researchers, designers, and cross-functional teams to ship systems that directly drive bookings, guest satisfaction, and host success \u2014 at global scale.\nA Typical Day\nDefine and drive the roadmap for Airbnb's relevance and personalization platform \u2014 from natural language query understanding to multi-turn, context-aware discovery experiences\nMake prioritization calls that balance multiple competing objectives: guest experience, host success, revenue, fairness, and marketplace health\nPartner with ML engineers and applied researchers to shape model strategy, evaluation frameworks, and experimentation design\nAlign cross-functional partners \u2014 Guest, Host, MarTech, Trust & Safety, Customer Support \u2014 on shared goals and sequencing\nDrive the Tripcycle vision: ensuring R&P's intelligence layer connects across the full trip lifecycle, from inspiration through post-trip\nDesign and oversee A/B experiments with rigorous metric design and long-term effect measurement\nTranslate complex technical tradeoffs into clear decisions for engineering teams and concise narratives for leadership\nFoster an environment where engineers and product managers collaborate on building the future\nStay close to guests and hosts: synthesize user research, marketplace data, and competitive signals to sharpen your intuition and refine strategy\nYour Expertise\n10+ years of product management experience, with at least 3 years on ML, search, recommendations, or AI-powered products at scale\nTrack record of owning strategy and roadmap for technically complex systems \u2014 not just managing features, but setting direction and making hard prioritization calls\nStrong experimentation fluency: comfortable designing A/B tests, interpreting counterfactual results, and reasoning about proxy metrics vs. long-term outcomes\nExperience working on two-sided marketplaces or platforms where you balanced supply-side and demand-side tradeoffs\nAbility to earn the respect of Staff and Principal-level engineers and researchers \u2014 you don't need to write code, but you need to engage at a level that builds credibility\nClear, structured communicator who can distill complex technical tradeoffs for executives and translate strategic intent into actionable guidance for engineers\nExperience with LLM-based products in production \u2014 ideally involving evaluation challenges, latency constraints, or safety and guardrail work (preferred)\nFamiliarity with reinforcement learning, contextual bandits, or explore/exploit frameworks in a product context (preferred)\nBackground working alongside applied researchers or with teams that publish externally (preferred)\nYour Location:\nDue to the nature of this position, the successful applicant will need to be based in San Francisco, CA to be able to conduct their work. Currently, employees can not be located in: Alaska, Indiana, Nebraska, North Dakota, Ohio, South Dakota, Wisconsin, Alabama, Mississippi, Oklahoma, Delaware And Rhode Island. This list is continuously being updated, please check back with us if the state you live in is on the exclusion list. If your position is employed by another Airbnb entity, your recruiter will inform you what states you are eligible to work from.\nOur Commitment To Inclusion & Belonging\nAirbnb is committed to working with the broadest talent pool possible. We believe diverse ideas foster innovation and engagement, and allow us to attract creatively-led people, and to develop the best products, services and solutions. All qualified individuals are encouraged to apply.\nWe strive to also provide a disability inclusive application and interview process. If you are a candidate with a disability and require reasonable accommodation in order to submit an application, please contact us at: reasonableaccommodations@airbnb.com. Please include your full name, the role you\u2019re applying for and the accommodation necessary to assist you with the recruiting process.\nWe ask that you only reach out to us if you are a candidate whose disability prevents you from being able to complete our online application.\nHow We'll Take Care Of You\nOur job titles may span more than one career level. The actual base pay is dependent upon many factors, such as: training, transferable skills, work experience, business needs and market demands. The base pay range is subject to change and may be modified in the future. This role may also be eligible for bonus, equity, benefits, and Employee Travel Credits.\nPay Range\n$232,000\u2014$282,000 USD", "id": "airbnb_product_manager_relevance_and_personalization_2026-06-22"}, {"metadata": {"title": "Senior Product Manager - Investment & Crypto", "company": "Ajaib", "match_score": 64, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "senior product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Hard Skills", "matched": 3, "total": 24, "weight": 2, "pct": 60, "keywords_hit": ["roadmap", "data-driven", "requirements"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "rag"]}, {"category": "Soft Skills", "matched": 3, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["stakeholder", "collaboration", "communication"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["indonesia", "jakarta"]}, {"category": "Business Impact", "matched": 1, "total": 16, "weight": 1.5, "pct": 25, "keywords_hit": ["growth"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/senior-product-manager-investment-crypto-at-ajaib-4410993441", "date_added": "2026-06-28", "source": "LinkedIn", "location": "Jakarta, Jakarta, Indonesia", "work_type": "See posting"}, "body": "### Full Job Description\nLife at Ajaib\nHere at Ajaib, we address ourselves as Magicians because making magic happen is our specialty! Ajaib is committed to creating an inclusive environment where all Magicians are valued for their contributions, opinions, and skills. Through our 3DNAs, we implement Everyone is an Owner to strengthen our core value in developing as a team, Growth Mindset to never stop learning, and A Will to Win to have courage in being excellent in everything we do!\nJob Description\nLead new investment and crypto product launch in collaboration with compliance, regulators and external partners. Clarify regulatory requirements, build proof-of-concept products, obtain new product approval for regulators\nParticipate in annual audit exercises. Being able to explain to regulators on of the company's investment product end-to-end technical design and operation procedures\nManaging the entire lifecycle of product development, from conceptualization to launch and ongoing optimization. This part includes a collaboration with various teams such as compliance, engineering, design, marketing, and business team to ensure the timely and successful delivery of products\nCollaborate across teams and contribute insights, ideas, and features into crafting a cohesive product roadmap strategy\nAssessing and mitigating risks associated with investment products, such as liquidity risk, operational risk and regulatory compliance\nAnalyze data to create recommendations and execute product experiments to improve key metrics\nRequirements\nMin 5 years of experience in product development and having a deep understanding of financial markets, investment products and cash management. Proven track record of successfully launching and managing products from concept to commercialization\nMin 2 years experience working with regulators and auditors in the financial industry. Preferably having direct working experience with IDX, OJK, KSEI, KPEI\nSuperb communication and interpersonal skills. Able to engage external stakeholders diplomatically. Build trust while discerning and tactfully addressing underlying agendas from partners\nStrong analytical skills with the ability to interpret data, draw insights, and make data-driven decisions\nBachelor's degree in Computer Science, IT, Electrical Engineering, Industrial Engineering, similar technical field of study or equivalent practical experience\nProficient in Bahasa Indonesia\nBenefits\nJoin us as we make magic happen to increase Indonesia's financial inclusion!", "id": "ajaib_senior_product_manager_-_investment_crypto_2026-06-28"}, {"metadata": {"title": "Senior Product Manager", "company": "Alation", "match_score": 85, "score_breakdown": [{"category": "Role Match", "matched": 3, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "senior product manager", "product lead"]}, {"category": "Domain Match", "matched": 4, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["ai", "infrastructure", "platform", "enterprise"]}, {"category": "Hard Skills", "matched": 1, "total": 24, "weight": 2, "pct": 20, "keywords_hit": ["data-driven"]}, {"category": "Tools", "matched": 1, "total": 14, "weight": 1.5, "pct": 33, "keywords_hit": ["analytics"]}, {"category": "AI & Tech Skills", "matched": 3, "total": 19, "weight": 2.5, "pct": 75, "keywords_hit": ["ai", "automation", "ai-powered"]}, {"category": "Soft Skills", "matched": 3, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["remote", "leadership", "communication"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "distributed"]}, {"category": "Business Impact", "matched": 2, "total": 16, "weight": 1.5, "pct": 50, "keywords_hit": ["scale", "enterprise"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://in.linkedin.com/jobs/view/senior-product-manager-at-alation-4314087548", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Greater Chennai Area", "work_type": "Remote"}, "body": "### Full Job Description\nAlation is pioneering the next era of \ndata intelligence \u2014 powered by AI agents and trusted data\n. Organizations around the world rely on \nAlation\n to drive self-service analytics, cloud transformation, data governance, and AI innovation. Our technology helps enterprises connect people and data to make faster, smarter, and more confident decisions. With more than $340M in funding \u2013 valued at over $1.7 billion and more than 650 customers, including 40% of the Fortune 100.\nAs data becomes the foundation of every business, Alation is leading the way in helping organizations unlock their full potential. By bringing intelligence, automation, and trust to every interaction, we empower customers to scale data-driven innovation with confidence and speed.\nJoining Alation means being part of a \nwinning team shaping the future of AI-powered data intelligence\n. We move fast, think big, and deliver results together.\nJob Description\nAlation\u2019s vision is to deliver the most trusted and actionable data intelligence platform. The lineage graph is one of the most critical assets in pursuit of that vision. It must be accurate, performant, stable, and deeply interoperable\u2014powering both customer-facing lineage experiences and an entire ecosystem of metadata-driven applications, including impact analysis, root cause diagnosis, curation propagation, and automation workflows.\nThe lineage graph is a foundational capability within Alation\u2019s Data Intelligence Platform. It underpins trust, enables governance at scale, and powers a growing set of customer-facing and internal applications\u2014from impact analysis to curation automation.\nWe are looking for a Senior Product Manager to own this lineage platform end to end. This role is for a product leader who is comfortable operating at the intersection of platform infrastructure, customer outcomes, and long-term technical strategy\u2014and who wants to raise the standard for product thinking and execution across the organization.\nWhat You'll Be Doing\nOwn the vision, strategy, and delivery of Alation\u2019s lineage graph as a core platform capability. \nEnsure the lineage graph is stable, trustworthy, and consumable across UI, APIs, and external systems. \nPartner with customers and other squads to directly or indirectly enable lineage-powered experiences and applications across agentic governance and analytics workflows. \nPartner deeply with engineering to evolve scalable graph infrastructure and set quality standards. \nRaise the bar for product clarity, execution quality, and cross-team alignment.\nYou Should Have\n5\u201310+ years of product experience, ideally building platform, infrastructure, or deeply technical data systems. \nDemonstrated ability to own complex graphs, metadata systems, data pipelines, or large-scale distributed systems. \nStrength in systems thinking and architecture-level problem solving. \nAbility to navigate ambiguity, create alignment, and distill complex technical domains into crisp decision frameworks. \nExceptional communication skills; ability to influence across engineering, leadership, and customers. \nExperience working with enterprise data ecosystems (data lakes, warehouses, ETL/ELT, BI, orchestration tools) is strongly preferred. \nA high standard for execution, quality, and craft\u2014both in the product and in how the org operates.\nAlation, Inc. is an Equal Employment Opportunity employer. All qualified applicants will receive consideration for employment without regards to that individual\u2019s race, color, religion or creed, national origin or ancestry, sex (including pregnancy), sexual orientation, gender identity, age, physical or mental disability, veteran status, genetic information, ethnicity, citizenship, or any other characteristic protected by law. \nThe Company will strive to provide reasonable accommodations to permit qualified applicants who have a need for an accommodation to participate in the hiring process (e.g., accommodations for a job interview) if so requested. \nThis company participates in E-Verify. Click on any of the links below to view or print the full poster. \n \nE-Verify and Right to Work.", "id": "alation_senior_product_manager_2026-06-22"}, {"metadata": {"title": "Associate Product Manager", "company": "Alquiler Argentina", "match_score": 59, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "associate product manager"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Hard Skills", "matched": 5, "total": 24, "weight": 2, "pct": 100, "keywords_hit": ["roadmap", "prd", "data-driven", "a/b testing", "backlog"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "claude"]}, {"category": "Soft Skills", "matched": 1, "total": 12, "weight": 1, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://ar.linkedin.com/jobs/view/associate-product-manager-at-alquiler-argentina-4426849006", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Argentina", "work_type": "Remote"}, "body": "### Full Job Description\n\u00a1Estamos buscando nuestro pr\u00f3ximo Associate Product Manager (APM)!\n\u2728\nEn Alquiler Argentina, estamos en la b\u00fasqueda de un APM para unirse a nuestro equipo de producto. Teniendo en cuenta que el equipo est\u00e1 en un momento de transici\u00f3n de: operativo a foco 100% estrat\u00e9gico.\nEstamos construyendo workflows donde la AI maneje el trabajo operativo (documentaci\u00f3n, an\u00e1lisis, prototipado) y nosotros nos enfoquemos en decisiones de alto impacto: qu\u00e9 construir, por qu\u00e9, y c\u00f3mo medimos \u00e9xito.\nNecesitamos a alguien que co-construya este sistema con nosotros.\nEste rol es para vos si:\nTen\u00e9s mentalidad experimental: Te sent\u00eds c\u00f3modo con ambig\u00fcedad, prob\u00e1s herramientas, documentos aprendizajes, iter\u00e1s r\u00e1pido\nUs\u00e1s AI con criterio: No es magia, es una herramienta. Sab\u00e9s cu\u00e1ndo acelera y cu\u00e1ndo estorba. Has usado AI para resolver problemas reales de trabajo\nPens\u00e1s en producto y en procesos: Te interesa tanto qu\u00e9 construimos como c\u00f3mo trabajamos para construirlo m\u00e1s eficientemente\nTen\u00e9s ownership: Te damos un problema, vos investigas, propon\u00e9s, ejecut\u00e1s. No esper\u00e1s que te digamos cada paso\nTrabaj\u00e1s colaborativo: Compart\u00eds aprendizajes abiertamente, incluso cuando algo no funciona.\nSos data-driven y los an\u00e1lisis de datos te parecen tan divertidos que los har\u00edas todos los d\u00edas. \nQu\u00e9 vas a hacer:\nCo-crear y optimizar workflows potenciados con AI\u00a0de documentaci\u00f3n, an\u00e1lisis y prototipado que ayuden al equipo a trabajar con mayor velocidad y calidad.\nRedactar PRDs, user stories y documentaci\u00f3n usando AI como copiloto, asegurando siempre criterio y calidad final.\nCrear prototipos low-fi con herramientas como Claude Code, Make u otras para validar hip\u00f3tesis antes de avanzar a etapas de dise\u00f1o.\nEvaluar performance y experimentos (incluyendo A/B testing cuando aplique), identificando insights accionables y evitando conclusiones apresuradas.\nTrabajar sobre backlog y roadmap priorizando por impacto, esfuerzo y alineaci\u00f3n estrat\u00e9gica.\nHablar con usuarios y hosts para entender problemas reales, validar hip\u00f3tesis y acercar evidencia al proceso de decisi\u00f3n.\nSer radar de mejora continua, detectar nuevas herramientas, pr\u00e1cticas o formas de trabajo que puedan mejorar c\u00f3mo opera el equipo.\nDar visibilidad y seguimiento al trabajo del equipo t\u00e9cnico para ayudar a que releases y prioridades avancen en tiempo y forma.\nQu\u00e9 te ofrecemos: \nEntorno de agilidad y co-creaci\u00f3n\n100% remoto desde cualquier parte de Argentin\nContrato de locaci\u00f3n de servicios", "id": "alquiler_argentina_associate_product_manager_2026-06-22"}, {"metadata": {"title": "Senior Product Manager-Growth", "company": "Alt", "match_score": 97, "score_breakdown": [{"category": "Role Match", "matched": 4, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "senior product manager", "product lead", "product management"]}, {"category": "Domain Match", "matched": 4, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["ai", "infrastructure", "platform", "marketplace"]}, {"category": "Hard Skills", "matched": 4, "total": 24, "weight": 2, "pct": 80, "keywords_hit": ["roadmap", "kpi", "onboarding", "retention"]}, {"category": "Tools", "matched": 3, "total": 14, "weight": 1.5, "pct": 100, "keywords_hit": ["sql", "amplitude", "mixpanel"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "rag"]}, {"category": "Soft Skills", "matched": 3, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["remote", "leadership", "strategic"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Business Impact", "matched": 5, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["growth", "retention", "conversion", "gmv", "scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/senior-product-manager-growth-at-alt-4378657397", "date_added": "2026-06-26", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### Full Job Description\nAlt is unlocking the value of alternative assets, starting with the $5 B trading-card market. We let collectors buy, sell, vault, and finance their cards in one place and we are backed by leaders at Stripe, Coinbase, Seven Seven Six, and pro athletes like Tom Brady and Giannis Antetokounmpo. Our next frontier is real-time pricing at scale\u2014the Alt Value that powers every trade, loan, and product on the platform.\nMission:\n Own the systems that turn Alt into the default platform for buying and selling high-value collectibles \u2014 more submissions, more active buyers, faster liquidity.\nNorthstar Metrics:\n Submission Volume + Search-to-Bid Conversion\nOverview\nWe're hiring a Product Lead to own Alt's growth engine. That means the full seller submission funnel, buyer search and discovery, and the experimentation infrastructure that compounds both over time.You will ship product changes, define experiments, partner with Engineering and Data daily, and hold yourself accountable to outcomes \u2014 not outputs. You'll report directly to the CEO and work alongside a small, highly capable team that moves fast and expects the same.Alt is at an inflection point. We've built real pricing infrastructure \u2014 Alt Value \u2014 that no competitor can match. We have strong seller awareness and a compelling value proposition. What we need now is a PM who can turn that foundation into a compounding growth engine: closing funnel gaps, activating and reactivating our highest-value sellers, and building the discovery and search experiences that bring buyers back every week.If you want to own a growth surface at a high-velocity marketplace with a clear business model, a real data moat, and the autonomy to build from scratch \u2014 this is the role.\nWhy This Role Exists\nSubmissions are the lifeblood of Alt's business. Every graded card that comes through the platform starts with a seller decision. We've built strong top-of-funnel awareness and an increasingly compelling value proposition \u2014 Snap to Sell, upfront cash advances, world-class auction outcomes. But the product systems that activate, retain, and reactivate our highest-value sellers are still early.\nOn the buyer side, Alt processes thousands of search queries every day. The quality of search, discovery, and recommendation directly determines whether buyers find what they want and bid with confidence. We have the pricing data to power a world-class discovery experience. We need a PM to build it.\nToday, too much of this system runs on manual outreach and intuition. We need a dedicated product leader to own growth as a discipline \u2014 running experiments, closing funnel gaps, and building systems that scale without linear headcount growth.\nWhat You'll Own\n Submission Funnel \u2014 Seller Activation & Retention\nOwn the end-to-end seller journey from first submission to high-frequency, high-value seller\nIdentify and close drop-off points across onboarding, Snap to Sell, quote acceptance, vault intake, and resubmission\nBuild product-led experiences that activate dormant sellers and increase submission frequency among our dealer segment \u2014 without requiring manual outreach\nPartner with Data and Lifecycle to deploy behavioral triggers and personalized experiences that drive submissions at scale\n Search, Discovery & Buyer Conversion\nOwn search quality, card discovery, and browse experiences across the platform\nDrive search-to-bid conversion through better ranking, filtering, recommendations, and real-time Alt Value pricing context\nSurface the right cards to the right buyers at the right moment\nDefine and run a disciplined experimentation roadmap across all buyer-facing discovery surfaces\n Experimentation & Growth Infrastructure\nOwn the experimentation framework across the platform \u2014 hypothesis definition, test design, metric selection, and decision rules\nRun high-velocity A/B tests across onboarding, activation, search, and submission flows\nBuild a compounding library of experiment learnings the full product team can leverage\nPartner tightly with the data team on infrastructure to ensure fast, reliable experimentation\n Marketplace Liquidity & Supply-Demand Balance\nMonitor and improve marketplace health \u2014 submission volume, listing rates, bid depth, and sell-through\nIdentify supply and demand imbalances by card category, price tier, and seller segment and build product solutions to address them\nUse Alt Value pricing data as a growth lever \u2014 surfacing market signals to sellers and buyers that drive action\n Roadmap, Prioritization & Business Impact\nBuild and own the quarterly Growth roadmap tied directly to submission volume, buyer conversion, and time-to-liquidity\nPartner with Engineering, Design, Data, Lifecycle, and Ops to ship continuously\nOperate at both the tactical level (funnel details, experiment results, edge cases) and the strategic level (what bets we're making and why)\nCommunicate tradeoffs and progress clearly to the CEO and leadership team\nNorthstar\nMetrics You'll Own:\nSubmission volume (weekly, by seller segment)\nSearch-to-bid conversion rate\nKPIs\nSnap to Sell activation rate (first submission)\nSeller reactivation rate (submissions from dormant sellers)\nDaily active search query volume\nListing rate (vaulted inventory \u2192 live on marketplace)\nExperiment velocity (tests launched and decided per quarter)\nDealer segment submission frequency and GMV\nWhat Great Looks Like (6 Months)\nMeasurable increase in weekly submission volume driven by product changes, not headcount\nA live experimentation program running 3-5 concurrent tests across growth surfaces\nSnap to Sell activation rate meaningfully improved through onboarding and product flow changes\nSearch-to-bid conversion up through better discovery and Alt Value pricing context\nA dealer reactivation product that runs without manual outreach\nA growth roadmap that Engineering, Data, and leadership actively use to prioritize\nWhat We're Looking For\n5-8+ years of Product Management experience with clear ownership of a growth surface, marketplace funnel, or PLG motion\nDemonstrated track record of driving measurable business outcomes through product experimentation and iteration\nStrong data fluency \u2014 Amplitude, Mixpanel, or similar, plus SQL or Python\nExperience partnering directly with Engineering and Data to build growth infrastructure, not just features\nDeep understanding of two-sided marketplace dynamics\nScrappy, high-ownership operator who communicates with precision and moves without hand-holding\nBonus\nExperience in collectibles, luxury goods, financial assets, or other high-value trust-sensitive marketplaces\nFamiliarity with lifecycle tooling and how product and lifecycle intersect\nExperience with AI-assisted personalization, recommendation systems, or search ranking\nBackground in operationally complex environments where physical and digital systems connect\nWhat You\u2019ll Get From Us\nA seat at the table to help shape the future of Alt and the alternative asset space\nAutonomy and ownership on projects that matter\n$100/month work-from-home stipend\n$200/month wellness stipend\nWeWork office stipend\n401(k) retirement benefits\nFlexible vacation policy\nGenerous paid parental leave\nCompetitive healthcare benefits, including HSA, for you and your dependent(s)\nBase salary range: \n$180,000 - $230,000, plus equity. Offers may vary based on experience, location, and other factors.", "id": "alt_senior_product_manager-growth_2026-06-26"}, {"metadata": {"title": "Growth Product Manager", "company": "AltaML", "match_score": 74, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product management"]}, {"category": "Domain Match", "matched": 4, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["saas", "b2b", "ai", "platform"]}, {"category": "Hard Skills", "matched": 3, "total": 24, "weight": 2, "pct": 60, "keywords_hit": ["roadmap", "onboarding", "retention"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 4, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "leadership", "communication"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["remote"]}, {"category": "Business Impact", "matched": 4, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["growth", "retention", "scale", "b2b saas"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://remoteok.com/remote-jobs/remote-growth-product-manager-altaml-1133729", "date_added": "2026-06-20", "source": "RemoteOK", "location": "Canada", "work_type": "Remote"}, "body": "### Job Description\nAbout the Role Most product managers learn about customers secondhand, through tickets, surveys, and sales calls. This role is different. At Brilliant Harvest, our customers are heavy equipment dealerships. Their customers are farmers and construction equipment operators. Growth Product Manager owns the product surface that turns a newly signed dealer into an active, self-sufficient one and then into a reference customer. That means building the features, flows, and feedback loops that drive activation and retention, informed by being in the field with the people actually using the product. This is a growth role, but customer success is in its DNA. You'll work closely with our CS team but your job is to take what that world surfaces and turn it into product decisions that scale. \\n Key Responsibilities Own the Growth Loop Define and own product growth metrics: activation rates, feature adoption, time-to-value, and retention across the dealer base. Identify where dealers stall in the product journey and build solutions, whether that's a better onboarding flow, an in-app prompt, or a new feature that removes a blocker. Design and run experiments to improve adoption. Prioritize ruthlessly based on what moves the metrics. Work with Engineering, Design, and Technical Product Managers to ship growth features fast and learn from them. Customer Understanding &amp; Feedback Loop You genuinely understand customer success not as a concept, but as something you've lived. You've been in the field. You've sat with customers through the messy middle, after the deal is signed and before they're actually running on their own. Understand the dealership business model, including key metrics, operational pressures, and day-to-day workflows. Additionally, maintain a deep understanding of the end user\u00e2\u0080\u0094such as farmers and operators\u00e2\u0080\u0094to ensure the platform effectively addresses their needs. Translate what you hear in the field into structured product insight. Not a running list of complaints, real signal that drives roadmap decisions. Be the connective tissue between what CS experiences with customers and what the engineering team builds. Close that loop. Product-Led Customer Enablement&nbsp; Design onboarding, education, and activation experiences as core product features to accelerate time-to-value, reduce user friction, and minimize support dependency. Collaborate cross-functionally with CS to identify and resolve process bottlenecks, decreasing implementation risk and shortening iteration cycles. Capture customer victories and transform them into actionable product insights, ensuring that users continuously inform the roadmap to prioritize high-value impact. Product Communication Write product updates and dealer-facing communications that actually land,&nbsp; the kind a service writer would read and understand. Make sure customer feedback has a home in the product process, not just a running channel somewhere. Qualifications &amp; Skills 3\u00e2\u0080\u00935 years in product management, with experience owning growth, activation, or retention metrics \u00e2\u0080\u0094 ideally in a B2B SaaS environment. Background in customer success, account management, or field enablement, you've been in front of customers through the hard parts, not just analyzed them from a distance. B2B2C experience: you understand what it means to drive value at two layers of a customer relationship simultaneously. Familiarity with how equipment dealerships operate is a strong plus, service departments, parts counters, the way things actually work on the floor. Proven ability to influence without authority, cross-functionally, and with customers who didn't ask for change. Comfortable with ambiguity. You define the problem, find the signal, and decide what to build \u00e2\u0080\u0094 without waiting to be told. Strong communicator, written and verbal. You can present to a shop floor crew or a leadership team and adjust accordingly. Data-literate. You know how to set up a metric, interpret results, and change course b", "id": "altaml_growth_product_manager_2026-06-20"}, {"metadata": {"title": "Product Tunaiku Circle Lead", "company": "Amar Bank", "match_score": 62, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product lead"]}, {"category": "Domain Match", "matched": 1, "total": 17, "weight": 2, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Hard Skills", "matched": 3, "total": 24, "weight": 2, "pct": 60, "keywords_hit": ["product strategy", "okr", "requirements"]}, {"category": "Tools", "matched": 4, "total": 14, "weight": 1.5, "pct": 100, "keywords_hit": ["jira", "analytics", "mixpanel", "looker"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "artificial intelligence"]}, {"category": "Soft Skills", "matched": 5, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "stakeholder", "collaboration", "leadership", "strategic"]}, {"category": "Location Preference", "matched": 3, "total": 12, "weight": 1.5, "pct": 100, "keywords_hit": ["indonesia", "jakarta", "hybrid"]}, {"category": "Business Impact", "matched": 1, "total": 16, "weight": 1.5, "pct": 25, "keywords_hit": ["growth"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/product-tunaiku-circle-lead-at-amar-bank-4318126487", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Jakarta, Jakarta, Indonesia", "work_type": "Hybrid"}, "body": "### Full Job Description\nThis role is accountable not only for building great products (strategy & innovation), b oduct organization structure, manpower planning, and overseeing budget allocation are effective\nBuild incredible teams and processes to deliver products that satisfy the needs of customers & meet company objectives\nRequirement\n8+ years of experience in product leadership roles \n4+ years of experience managing B2C digital loan application (BNPL/Cash Loan)\nOwnership mindset, Drive to Learn, Grit & Resilience\nProven ability to engage and influence C-level stakeholders across product, technology, and business functions. operate with a high degree of autonomy \u2014 translating goals into actionable strategy, setting governance standards, and driving execution without close oversight. \nMastery of product analytics, operations, discovery, delivery, experimentation, and governance\nProven experience setting up or operating within robust product governance frameworks & toward world-class product culture (Discovery/Experimentation/Analytics)\nFluent in English, both written and verbal\nBonus Point If:\nA Master\u2019s degree or MBA is highly desirable\nProven experience managing B2C loan products in international or multi-market environments\nExperience managing product manager, product designer & product researcher directly\nStrong understanding of the financial services system and compliance responsibilities at the product level\nFamiliar with Product Analytics Tools (Looker, Mixpanel), AB Testing tools (Statsig, AB Tasty), screen-recording tools, JIRA, \nDeep understanding of digital loan, digital banking, SME Banking, and Embedded Banking\nStrong grasp of Indonesia\u2019s financial ecosystem and regulatory landscape, including dealings with OJK, Bank Indonesia, and industry associations\nStrong understanding of the Indonesian market & customer behavior\nFluent in Bahasa Indonesia, both written and verbal\nWe may use artificial intelligence (AI) tools to support parts of the hiring process, such as reviewing applications, analyzing resumes, or assessing responses and identifying potential inconsistencies or verification signals in application materials based on available information. These tools assist our recruitment team but do not replace human judgment. Final hiring decisions are ultimately made by humans. If you would like more information about how your data is processed, please contact us.", "id": "amar_bank_product_tunaiku_circle_lead_2026-06-22"}, {"metadata": {"title": "Product Manager - Amartha Empower", "company": "Amartha Financial", "match_score": 77, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product management"]}, {"category": "Domain Match", "matched": 5, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["fintech", "ai", "platform", "marketplace", "enterprise"]}, {"category": "Hard Skills", "matched": 9, "total": 24, "weight": 2, "pct": 100, "keywords_hit": ["roadmap", "prd", "product strategy", "data-driven", "a/b testing"]}, {"category": "AI & Tech Skills", "matched": 1, "total": 19, "weight": 2.5, "pct": 25, "keywords_hit": ["ai"]}, {"category": "Soft Skills", "matched": 2, "total": 12, "weight": 1, "pct": 67, "keywords_hit": ["cross-functional", "collaboration"]}, {"category": "Location Preference", "matched": 1, "total": 12, "weight": 1.5, "pct": 33, "keywords_hit": ["jakarta"]}, {"category": "Business Impact", "matched": 5, "total": 16, "weight": 1.5, "pct": 100, "keywords_hit": ["growth", "retention", "conversion", "scale", "enterprise"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/product-manager-amartha-empower-at-amartha-financial-4402246721", "date_added": "2026-06-28", "source": "LinkedIn", "location": "Jakarta Metropolitan Area", "work_type": "See posting"}, "body": "### Full Job Description\nAbout Amartha\nAmartha is a technology company focused on creating shared prosperity by developing digital financial solutions for the grassroots economy. Founded in 2010 as a microfinance institution, Amartha connects rural, women-led micro-enterprises with affordable capital. Amartha is expanding as a tech company, building a microfinance ecosystem that connects to the growing digital economy through capital, investment, and payment services. By boosting the competitiveness of micro and small entrepreneurs, Amartha empowers women-led MSMEs, creates jobs, and fosters inclusive economic growth.\nAmartha Empower is evolving into an integrated impact platform within the Amartha ecosystem, with ambitions to scale donation, zakat, and wakaf through digital channels.\nAbout The Role\nThe Product Manager will be responsible for owning the end-to-end development of Amartha Empower's digital platform, ensuring a seamless, intuitive, and high-converting user experience.\nThis role bridges:\nBusiness (Zakat Lead, Partnerships, Campaigns)\nEngineering (Web, Mobile, QA)\nGrowth & Marketing\nResponsibilities\n Product Strategy & Roadmap\nDefine and own product vision aligned with Empower & Amartha goals\nDevelop and prioritize product roadmap based on business impact\n User Experience & Conversion Optimization\nImprove end-to-end donor journey:\nOptimize conversion rate and reduce drop-offs\n Feature Development & Execution\nLead development of key features:\nTranslate business requirements into clear product specs (PRD)\nWork closely with Engineering for delivery\n Data-Driven Product Iteration\nDefine and track key product metrics:\n Conversion rate\n Funnel drop-off\n Retention & repeat donation\nRun experiments (A/B testing, feature iteration)\nUse insights to continuously improve product performance\n Cross-functional Collaboration\nAct as translator between business and tech\nRequirements\n 3-6+ Years Product Management Experience\nExperience in consumer product / fintech / marketplace / platform\nProven track record of shipping impactful features\n Strong Product Thinking\nAbility to break down problems into clear product solutions\nStrong sense of UX, user behavior, and funnel optimization\n Data-Driven Mindset\nComfortable working with metrics, dashboards, and experiments\nAble to translate data into product decisions\n Technical Understanding\nAble to work effectively with engineers\nUnderstand basic system design\n Mission Alignment (Strong Plus)\nInterest in social impact / donation / financial inclusion\nUnderstanding of zakat ecosystem is a bonus\nAt Amartha, we are dedicated to creating a workplace that celebrates diversity, ensures equity, and fosters inclusion. We believe that diverse perspectives\u2014shaped by factors such as gender, age, race, ethnicity, education, culture, and life experiences\u2014drive innovation and growth.\nWe actively welcome individuals from all backgrounds to join us in building an environment where everyone feels respected, valued, and empowered. Our commitment is to provide equal opportunities and foster a sense of belonging that enables our employees to thrive and make meaningful contributions.", "id": "amartha_financial_product_manager_-_amartha_empower_2026-06-28"}, {"metadata": {"title": "Senior AI Product Manager - Customer Operations & Automation", "company": "Amartha Financial", "match_score": 91, "score_breakdown": [{"category": "Role Match", "matched": 4, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "senior product manager", "product lead", "product management"]}, {"category": "Domain Match", "matched": 6, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["fintech", "ai", "infrastructure", "platform", "digital products"]}, {"category": "Hard Skills", "matched": 3, "total": 24, "weight": 2, "pct": 60, "keywords_hit": ["roadmap", "product strategy", "requirements"]}, {"category": "AI & Tech Skills", "matched": 6, "total": 19, "weight": 2.5, "pct": 100, "keywords_hit": ["ai", "llm", "automation", "generative ai", "ai-powered"]}, {"category": "Soft Skills", "matched": 3, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "stakeholder", "strategic"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["indonesia", "jakarta"]}, {"category": "Business Impact", "matched": 2, "total": 16, "weight": 1.5, "pct": 50, "keywords_hit": ["growth", "scale"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/senior-ai-product-manager-customer-operations-automation-at-amartha-financial-4432205267", "date_added": "2026-06-26", "source": "LinkedIn", "location": "Jakarta Metropolitan Area", "work_type": "See posting"}, "body": "### Full Job Description\nAbout Amartha\nAmartha is building the financial infrastructure for underserved communities across Indonesia. Since 2010, we have enabled more than 2.7 million micro-entrepreneurs - primarily women - to access capital, grow their businesses, and improve their families' economic well-being. Today, we are expanding our platform across lending, payments, funding and other digital financial services with a vision of becoming the primary financial partner for Indonesia's grassroots economy.\nJoining Amartha means working on some of Indonesia's most meaningful and complex challenges at the intersection of fintech, technology, operations and social impact - while helping shape the future of financial access for underserved communities.\nWhy This Role Matters\nAmartha serves millions of underserved customers across Indonesia through a unique combination of digital products and field operations. As we scale, we see a significant opportunity to reimagine customer and operational experiences through AI-native products and automation. We believe AI can transform how we serve our customers, increase field productivity and reduce operational costs.\nWe are looking for a Senior AI Product Manager who will own the product strategy and execution for AI-powered customer support, service automation and operational digitization initiatives across the organization. The goal is not experimentation - it is delivering measurable improvements in customer satisfaction, resolution speed, operational efficiency and scalability.\nKey Responsibilities\nOwn the Customer Support product domain - including AI-powered self-service experiences, agent copilots, service operations platforms and workflow automation tools\nDrive AI-powered customer and operational transformation - Identify, prioritize and deliver AI and automated solutions that improve customer experience, field productivity and operational efficiency\nOwn product strategy and execution - Define product strategy, roadmap, prioritization, success metrics and drive delivery from concept to measurable business impact\nTranslate emerging AI capabilities into scalable business solutions - Assess new technologies and identify high-impact applications across customer and operational workflows\nThis role is likely a strong fit if you:\nHave successfully launched AI-powered products, not just explored AI use cases\nEnjoy solving customer and operational problems through technology and automation\nBalance strategic thinking with hands-on execution\nThrive in ambiguity and rapidly evolving environments\nRequirements\n4-7+ years of Product Management experience\nHands-on experience building and scaling AI-powered products, agents or automation platforms\nStrong understanding of Generative AI, LLMs, AI agents, and workflow automation\nStrong product execution, stakeholder management and prioritization skills\nExperience working cross-functionally with engineering, data, operations and business teams\nStartup, technology or fintech experience preferred\nTypical backgrounds include\nSenior Product Manager leading AI initiatives\nProduct leaders driving automation or customer experience transformation\nBuilders who have launched AI-native products or platforms\nAt Amartha, we are dedicated to creating a workplace that celebrates diversity, ensures equity, and fosters inclusion. We believe that diverse perspectives - shaped by factors such as gender, age, race, ethnicity, education, culture, and life experiences - drive innovation and growth.\nWe actively welcome individuals from all backgrounds to join us in building an environment where everyone feels respected, valued, and empowered. Our commitment is to provide equal opportunities and foster a sense of belonging that enables our employees to thrive and make meaningful contributions.", "id": "amartha_financial_senior_ai_product_manager_-_customer_operations_automation_2026-06-26"}, {"metadata": {"title": "Product Manager", "company": "Anaplan", "match_score": 82, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product management"]}, {"category": "Domain Match", "matched": 5, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["saas", "b2b", "ai", "platform", "enterprise"]}, {"category": "Hard Skills", "matched": 5, "total": 24, "weight": 2, "pct": 100, "keywords_hit": ["agile", "roadmap", "requirements", "specifications", "user experience"]}, {"category": "AI & Tech Skills", "matched": 2, "total": 19, "weight": 2.5, "pct": 50, "keywords_hit": ["ai", "automation"]}, {"category": "Soft Skills", "matched": 5, "total": 12, "weight": 1, "pct": 100, "keywords_hit": ["cross-functional", "remote", "stakeholder", "communication", "strategic"]}, {"category": "Location Preference", "matched": 2, "total": 12, "weight": 1.5, "pct": 67, "keywords_hit": ["remote", "global"]}, {"category": "Business Impact", "matched": 2, "total": 16, "weight": 1.5, "pct": 50, "keywords_hit": ["enterprise", "b2b saas"]}], "description_quality": "full", "status": "Ready to Apply", "url": "https://uk.linkedin.com/jobs/view/product-manager-at-anaplan-4422345842", "date_added": "2026-06-28", "source": "LinkedIn", "location": "York, England, United Kingdom", "work_type": "Remote"}, "body": "### Full Job Description\nAt Anaplan, we are a team of innovators focused on optimizing business decision-making through our leading AI-infused scenario planning and analysis platform so our customers can outpace their competition and the market.\nWhat unites Anaplanners across teams and geographies is our collective commitment to our customers\u2019 success and to our Winning Culture.\nOur customers rank among the who\u2019s who in the Fortune 50. Coca-Cola, LinkedIn, Adobe, LVMH and Bayer are just a few of the 2,400+ global companies who rely on our best-in-class platform.\nOur Winning Culture is the engine that drives our teams of innovators. We champion diversity of thought and ideas, we behave like leaders regardless of title, we are committed to achieving ambitious goals, and we love celebrating\n \nour wins \u2013 big and small.\nSupported by operating principles of being strategy-led, values-based and disciplined in execution, you\u2019ll be inspired, connected, developed and rewarded here. Everything that makes you unique is welcome; join us and let\u2019s build what\u2019s next - together!\n \nProduct Manager - Enterprise Experience\nTeam Description\nThe Enterprise Experience team is responsible for all aspects of the end-user interface at Anaplan. This includes planning templates, analytical grids, pixel-perfect reporting, planning process orchestration and automation, and interactive dashboards. The product areas we deliver are foundational, enriched with AI, and are touched by every customer, and used in every Application and implementation. Reporting to the Director, Product Management for Enterprise Experience and will be instrumental in the execution of our product and company strategy.\nYour Impact:\nHelp define and evolve the direction for Anaplan\u2019s Enterprise Experience specifically around Anaplan\u2019s Workflow offering.\nDrive the product roadmap in partnership with engineering, ensuring delivery of high-impact capabilities for our customers.\nDevelop specifications, standards, and design principles for a consistent user experience.\nEngage with customers and Anaplan CoEs to foster relationships and assimilate feedback and improvement opportunities into roadmap.\nSupport cross-functional alignment across engineering, product, and strategy teams.\nDrive end-to-end experiences: writing user stories with clear acceptance criteria, working with UX to create prototypes for usability testing and research, working with engineering, documentation, support, and marketing to deliver quality experiences.\u00a0\nYour Qualifications:\nExperience as a Product Manager in a B2B SaaS or enterprise software environment.\nAbility to define and manage complex product roadmaps and technical requirements.\nExperience collaborating closely with engineering teams in an Agile environment.\nExcellent communication, documentation, and stakeholder management skills.\nStrategic thinker with the ability to translate vision into execution.\nExperience in Workflow business process tools such as Temporal or Workato would be highly desirable.\nAny Anaplan or multi-dimensional modelling experience would also be highly desirable.\nThis is a high-impact opportunity for the right candidate to shape the future of Anaplan\u2019s Workflow capabilities for new and existing customers.\n \nOur Commitment to Diversity, Equity, Inclusion\u202fand Belonging (DEIB) \nWe believe attracting and retaining the best talent and fostering an inclusive culture strengthens our business. DEIB improves our workforce, enhances trust with our partners and customers, and drives business success. Build your career in a place where diversity, equity, inclusion and belonging aren\u2019t just words on paper \u2013 this is what drives our innovation, it\u2019s how we connect, and it contributes to what makes us a market leader. We believe in a hiring and working environment where all people are respected and valued, regardless of gender identity or expression, sexual orientation, religion, ethnicity, age, neurodiversity, disability status, citizenship, or any other aspect which makes people unique. We hire you for who you are, and we want you to bring your authentic self to work every day!\u202f\nWe will ensure that individuals with disabilities are provided reasonable accommodation to participate in the job application or interview process, perform essential job functions, and receive equitable benefits and all privileges of employment. Please contact us to request accommodation.\u202f\u00a0\nFraud Recruitment Disclaimer\n\u202f\u00a0\nIt has come to our attention that fraudulent and fictitious job opportunities are being circulated on the Internet. Prospective candidates are being contacted by certain individuals, mainly through telephone calls, emails and correspondence, claiming they are representatives of Anaplan. The main purpose of these correspondences and announcements is to obtain privileged information from individuals.\u202f\u202f\nAnaplan does not:\u202f\u00a0\nExtend offers to candidates without an extensive interview process with a member of our recruitment team and a hiring manager via video or in person.\u202f\u202f\u00a0\nSend job offers via email. All offers are first extended verbally by a member of our internal recruitment team whenever possible and then followed up via written communication.\u202f\u00a0\nAll emails from Anaplan would come from an @anaplan.com email address. Should you have any doubts about the authenticity of an email, letter or telephone communication purportedly from, for, or on behalf of Anaplan, please send an email to people@anaplan.com before taking any further action in relation to the correspondence.", "id": "anaplan_product_manager_2026-06-28"}, {"metadata": {"title": "Product Manager / GTM Eufy", "company": "ANKER INDONESIA", "match_score": 55, "score_breakdown": [{"category": "Role Match", "matched": 2, "total": 11, "weight": 3, "pct": 67, "keywords_hit": ["product manager", "product management"] n expertise, strong cross\u2011functional leadership, and the ability to influence decisions at the highest levels of the organization. You will define the product vision for complex, multi\u2011team capabilities and guide PMs and engineering leaders to deliver scalable, innovative payment solutions.\nThis position is ideal for someone who operates as a thought leader, a strategic problem solver, and a connector across organizational boundaries. T\nKey Responsibilities\nStrategic Product Leadership\nOwn the long-term strategy for a major platform capability, cross-product domain, or enterprise-level initiative.\nBuild and champion a clear vision that aligns to our clients multi-year business goals.\nIdentify market shifts, emerging technologies, and regulatory trends to shape proactive product evolution.\nDevelop high-impact business cases to secure executive alignment and investment.\nCross-Functional Alignment & Influence\nAct as a senior partner to Engineering, Architecture, Compliance, Risk, Operations, and Commercial Leadership.\nDrive alignment across multiple product lines, ensuring cohesive prioritization and technical direction.\nPresent strategy, progress, and recommendations to senior leadership and executive teams.\nComplex Program Leadership\nBreak down large, ambiguous problem spaces into clear, actionable initiatives for multiple teams.\nGuide PMs and POs in defining epics, features, goals, and dependencies.\nAnticipate organizational, technical, regulatory, and operational challenges early and create mitigation strategies.\nEnsure cross-team delivery success for mission-critical initiatives.\nCustomer, Market & Industry Expertise\nDeeply understand customer needs, competitive dynamics, partner ecosystems, and payment industry trends.\nEstablish the problem definition and strategic framing for entire product domains.\nRepresent our client externally with partners, clients, and industry groups as a domain expert.\nTechnical & Architectural Leadership\nPartner with engineering and architecture to define and evolve platform capabilities, integration strategies, and technical roadmaps.\nEnsure long-term scalability, reliability, and compliance considerations are embedded in product direction.\nChallenge technical and business assumptions to guide sustainable solutions.\nThought Leadership & Mentorship\nMentor and coach PMs, Senior PMs, and POs across the organization.\nElevate product management standards, tools, and processes.\nContribute to product culture, organizational development, and strategic planning.\nEligibility Requirements\nMust be willing to submit to a background investigation and drug test as part of the selection process.\nThis position is not eligible for visa sponsorship. Applicants must have authorization to work in the country without the need for sponsorship.\nJob Type \nFull-Time\nSchedule \nMonday to Friday\nLocation \nJacksonville, FL; Remote\nBenefits \nHealth insurance \nHealth savings account\nDental insurance\nVision insurance\n401(k) matching\nLife insurance\nPaid time off\nParental leave\nDisability insurance\nChildcare assistance\nEducation reimbursement\nFitness membership\nVolunteer time off\nThis job description is not intended to be all-inclusive. An employee may also perform other reasonable related business duties as assigned by their immediate supervisor or management. Principals only. \nRecruiters please don't contact this job poster. DO NOT contact us with unsolicited services or offers.", "id": "aperia_product_manager_2026-06-22"}, {"metadata": {"title": "Senior Product Manager- Retention", "company": "Apollo Hospitals Enterprises Limited", "match_score": 71, "score_breakdown": [{"category": "Role Match", "matched": 4, "total": 11, "weight": 3, "pct": 100, "keywords_hit": ["product manager", "senior product manager", "product lead", "product management"]}, {"category": "Domain Match", "matched": 5, "total": 17, "weight": 2, "pct": 100, "keywords_hit": ["fintech", "ai", "plat
