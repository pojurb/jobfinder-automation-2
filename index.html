                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }

    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }

        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .card-shine { position: relative; overflow: hidden; }
        .card-shine::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: left 0.6s ease;
        }
        .card-shine:hover::before { left: 100%; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card { animation: fadeInUp 0.4s ease forwards; opacity: 0; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .new-pulse { animation: pulse-dot 2s ease-in-out infinite; }

iew/associate-product-manager-at-alquiler-argentina-4426849006", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Argentina", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: Argentina\n- Visit the link for full job details."}, {"metadata": {"title": "Growth Product Manager", "company": "AltaML", "match_score": 59, "status": "Ready to Apply", "url": "https://remoteok.com/remote-jobs/remote-growth-product-manager-altaml-1133729", "date_added": "2026-06-20", "source": "RemoteOK", "location": "Canada", "work_type": "Remote"}, "body": "### Job Description\nAbout the Role Most product managers learn about customers secondhand, through tickets, surveys, and sales calls. This role is different. At Brilliant Harvest, our customers are heavy equipment dealerships. Their customers are farmers and construction equipment operators. Growth Product Manager owns the product surface that turns a newly signed dealer into an active, self-sufficient one and then into a reference customer. That means building the features, flows, and feedback loops that drive activation and retention, informed by being in the field with the people actually using the product. This is a growth role, but customer success is in its DNA. You'll work closely with our CS team but your job is to take what that world surfaces and turn it into product decisions that scale. \\n Key Responsibilities Own the Growth Loop Define and own product growth metrics: activation rates, feature adoption, time-to-value, and retention across the dealer base. Identify where dealers stall in the product journey and build solutions, whether that's a better onboarding flow, an in-app prompt, or a new feature that removes a blocker. Design and run experiments to improve adoption. Prioritize ruthlessly based on what moves the metrics. Work with Engineering, Design, and Technical Product Managers to ship growth features fast and learn from them. Customer Understanding &amp; Feedback Loop You genuinely understand customer success not as a concept, but as something you've lived. You've been in the field. You've sat with customers through the messy middle, after the deal is signed and before they're actually running on their own. Understand the dealership business model, including key metrics, operational pressures, and day-to-day workflows. Additionally, maintain a deep understanding of the end userâsuch as farmers and operatorsâto ensure the platform effectively addresses their needs. Translate what you hear in the field into structured product insight. Not a running list of complaints, real signal that drives roadmap decisions. Be the connective tissue between what CS experiences with customers and what the engineering team builds. Close that loop. Product-Led Customer Enablement&nbsp; Design onboarding, education, and activation experiences as core product features to accelerate time-to-value, reduce user friction, and minimize support dependency. Collaborate cross-functionally with CS to identify and resolve process bottlenecks, decreasing implementation risk and shortening iteration cycles. Capture customer victories and transform them into actionable product insights, ensuring that users continuously inform the roadmap to prioritize high-value impact. Product Communication Write product updates and dealer-facing communications that actually land,&nbsp; the kind a service writer would read and understand. Make sure customer feedback has a home in the product process, not just a running channel somewhere. Qualifications &amp; Skills 3â5 years in product management, with experience owning growth, activation, or retention metrics â ideally in a B2B SaaS environment. Background in customer success, account management, or field enablement, you've been in front of customers through the hard parts, not just analyzed them from a distance. B2B2C experience: you understand what it means to drive value at two layers of a customer relationship simultaneously. Familiarity with how equipment dealerships operate is a strong plus, service departments, parts counters, the way things actually work on the floor. Proven ability to influence without authority, cross-functionally, and with customers who didn't ask for change. Comfortable with ambiguity. You define the problem, find the signal, and decide what to build â without waiting to be told. Strong communicator, written and verbal. You can present to a shop floor crew or a leadership team and adjust accordingly. Data-literate. You know how to set up a metric, interpret results, and change course b"}, {"metadata": {"title": "Product Tunaiku Circle Lead", "company": "Amar Bank", "match_score": 18, "status": "Ready to Apply", "url": "https://id.linkedin.com/jobs/view/product-tunaiku-circle-lead-at-amar-bank-4318126487", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Jakarta, Jakarta, Indonesia", "work_type": "Hybrid"}, "body": "### LinkedIn Job\n- **Location**: Jakarta, Jakarta, Indonesia\n- Visit the link for full job details."}, {"metadata": {"title": "Product Manager", "company": "Aperia", "match_score": 20, "status": "Ready to Apply", "url": "https://www.linkedin.com/jobs/view/product-manager-at-aperia-4405252821", "date_added": "2026-06-22", "source": "LinkedIn", "location": "United States", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: United States\n- Visit the link for full job details."}, {"metadata": {"title": "Senior Product Manager- Retention", "company": "Apollo Hospitals Enterprises Limited", "match_score": 37, "status": "Ready to Apply", "url": "https://in.linkedin.com/jobs/view/senior-product-manager-retention-at-apollo-hospitals-enterprises-limited-4426029548", "date_added": "2026-06-22", "source": "LinkedIn", "location": "Hyderabad, Telangana, India", "work_type": "Remote"}, "body": "### LinkedIn Job\n- **Location**: Hyderabad, Telangana, India\n- Visit the link for full job details."}, {"metadata": {"title": "Senior Product M ion users in 196 countries. Change.org empowers anyone, anywhere, to create the change they want to see. We are a certified B-corporation and enable people to start campaigns, mobilize supporters, and work with decision makers to drive solutions through our platform.\n- To learn more about who we are, our engineering culture, and whether this is the right place for you, read our Key Values profile:\n- https:&#x2F;&#x2F;www.keyvalues.com&#x2F;change-org\n- Here are our open roles:\n- - Senior&#x2F;Staff Data Engineer (San Francisco, VISAs):\n- https:&#x2F;&#x2F;jobs.lever.co&#x2F;change&#x2F;3077cc19-73b6-4b13-9721-4b6db98...\n- - Lead Product Manager (Paris):\n- https:&#x2F;&#x2F;jobs.lever.co&#x2F;change&#x2F;88701030-0389-4eab-9d2b-ca5939e...\n- Tech Stack: Ruby on Rails, Elixir, React.js, GraphQL, Node.js, AWS, Redis, Spark   Scala (Data team)"}, {"metadata": {"title": "Product Manager", "company": "Channable -", "match_score": 19, "status": "Ready to Apply", "url": "https://news.ycombinator.com/item?id=22683272", "date_added": "2026-06-22", "source": "Hacker News", "location": "Unknown", "work_type": "Unknown"}, "body": "### HN Who is Hiring\n- https:&#x2F;&#x2F;www.channable.com\n- | Utrecht, The Netherlands | ONSITE\n- Join one of the fastest growing scale-ups in the Netherlands. We currently have several open engineering positions to join our team in Utrecht.\n- We are a young company with a strong engineering culture and some unique data problems, that we are solving for our customers. You can read more about the kind of work we do on our blog:\n- https:&#x2F;&#x2F;tech.channable.com&#x2F;\n- Our Stack includes: Haskell, Python, JavaScript, TypeScript, Ember.js, PostgreSQL, Redis, Ansible, Terraform, Nix\n- We currently process billions of products per day and offer technically interesting and challenging work. We are looking for highly motivated and skilled engineers to join our team in our office in the center of Utrecht.\n- Open positions:\n- - Product Owner:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;product-owner\n- - Python Software Engineer:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;python-software-engineer-utrech...\n- - Senior Frontend Developer:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;senior-frontend-developer\n- - DevOps Engineer:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;devops-engineer\n- - Haskell Software Engineer:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;haskell-software-engineer-utrec...\n- We also welcome open applications:\n- https:&#x2F;&#x2F;jobs.channable.com&#x2F;o&#x2F;open-application"}, {"metadata": {"title": "Product Manager", "company": "Chronosphere", "match_score": 50, "status": "Ready to Apply", "url": "https://news.ycombinator.com/item?id=22668255", "date_added": "2026-06-22", "source": "Hacker News", "location": "Full-time Onsite (Remote for now)", "work_type": "Remote"}, "body": "### HN Who is Hiring\n- Chronosphere is a Series A startup delivering the most highly scalable and reliable open source metric data platform to the world. That platform is M3, which was created by the founders of Chronosphere while at Uber. It is the only open source metric data platform proven at petabyte scale in production, stores over tens of billions of metric time series and ingests and serves billions of data points per second. Chronosphere is a modern and highly scalable monitoring monitoring and observability tool built on M3 for companies faced with scaling challenges. We deliver products and APIs that run in the cloud as a single hosted platform.\n- Senior Frontend Engineer:\n- Are you driven by how users digest, explore and build proficiency using a product? As a front-end product engineer you will build interfaces that engineers, data scientists, business analysts and operations staff will use every day to build, analyze and operate products at scale for the companies they work at. Your natural design instincts will be paired with great Javascript fundamentals and how to best design and consume APIs, either using GraphQL or other APIs. For our customers, our tools are leveraged by thousands of engineers on a daily basis to measure and monitor their products and systems. Your work will continue to drive fundamental change to how software is created, delivered and operates all over the world. You will work alongside the engineering team, the head of product and product team, the CEO and the CTO.\n- Technologies: Javascript (ES6), React, GraphQL on the front end. Go, GRPC, Kubernetes, MySQL and M3DB (distributed time series database) on the back end.\n- Senior UX Designer:\n- We&#x27;re looking for a UX designer to help build Chronosphere. You will drive and complete the design process for our cloud web application from beginning to end. You will work with multiple teams to design a clean, usable console focusing on metrics, data visualization, altering, dashboards, infrastructure, and more. We are open to this role being in either New York or our Bellevue, Washington office. You will work alongside the head of product, the engineering team, the CEO and the CTO.\n- What we offer: Excellent benefits, competitive pay and equity at Series A, flexible working environment, challenging problems at scale and pragmatically harnessing millions of instrumentation being collected per second.\n- Senior Frontend Engineer:\n- https:&#x2F;&#x2F;boards.greenhouse.io&#x2F;chronosphere&#x2F;jobs&#x2F;4012681003\n- Senior UX Designer:\n- https:&#x2F;&#x2F;boards.greenhouse.io&#x2F;chronosphere&#x2F;jobs&#x2F;4012682003\n- Email me with questions at rob at chronosphere.io\n- Regarding remote for now: If you are applying to work in the NYC or Seattle office you are not expected to interview in person (it will be remote), or work in person until the CV-19 crisis is resolved (work will be remote). The roles are not remote, but no one is in the office currently."}, {"metadata": {"title": "Senior Product Manager", "company": "Clari", port. Behind those numbers are real people building independence, expanding opportunity and creating measurable impact. Weâre proud to be a part of that. Role Summary As the Staff Product Manager for Product Information Management, you will own the end-to-end vision, strategy, and execution of HighLevelâs PIM â the foundational catalog layer that powers all commerce activity across the platform. Your mission is to lead a structural overhaul of our existing catalog infrastructure and build a world-class PIM that handles physical products, digital goods, and services at scale. This is not just the backbone of our Commerce charter; it is shared infrastructure consumed by multiple adjacent product teams, and the decisions you make here will have platform- wide impact. What You'll Do â Own the PIM Vision: Define and drive the end-to-end roadmap for HighLevelâs Product Information Management system â from Items, Variants, and Catalog Items to Price Lists, Units of Measure, and multi-channel price resolution logic â Lead the Catalog Overhaul: Architect the migration from our existing catalog foundation to a robust, extensible PIM that supports the full breadth of HighLevelâs commerce use cases across product types and selling channels â Design for Multi-Team Consumption: Define clear API contracts and data models that serve not just the Commerce team, but adjacent teams building service-based and subscription-based product experiences â ensuring every consumer can reliably depend on PIM as a platform â Drive Cross-Functional Alignment: Lead structured collaboration with engineering, design, and partner product teams to ensure PIM capabilities meet requirements across all consuming surfaces, resolving conflicting priorities with clarity and conviction â Shape Pricing Infrastructure: Own the strategy for multi-currency, rule-based, and channel- aware pricing â ensuring the right price resolves correctly at every point of sale across all storefronts ation fellowship that pairs talented mid-to-senior-level entrepreneurs and technologists with top government leaders to take on complex projects that have the potential for significant impact. It was launched in 2012 by former U.S. Chief Technology Officer Todd Park, and since then, more than 150 Fellows have worked within over 35 agencies. Over half of the Fellows have decided to stay in government after the program, and have gone on to lead new digital teams and serve as chief technology officers, chief information officers, chief data officers, and chief marketing officers at various agencies.\n- Fellows are building products and services at scale to serve all Americans. Select potential projects for the Fall 2020 cohort include:\n- • Assisting the Centers for Medicare and Medicaid modernize their technology stack so they can better share data with stakeholders across the healthcare ecosystem.\n- • Helping NASA speed up the discovery, analysis and development of aerospace systems using artificial intelligence to ultimately help combat climate change by reducing fuel burn for the aerospace industry.\n- • Working with the U.S. Department of Veterans Affairs to better support veterans transitioning from military to civilian life, adopt medical innovations to improve mental health services and health outcomes, and reduce the processing time for benefits claims.\n- • Collaborating with multiple federal agencies to drive the adoption of AI technologies across government.\n- • Ensuring that the Millennium Challenge Corporation, a U.S. foreign aid agency, and their partner countries have the data, technology, and innovations skills needed to maximize the impact of U.S. investments.\n- • Guiding the Department of Transportation as they adapt to the challenges and opportunities that autonomous vehicles and aerial systems offer.\n- • Helping the U.S. Marine Corps conduct a digital and data transformation to keep Marines safe.\n- Apply today:\n- https:&#x2F;&#x2F;apply.pif.g         function scoreColor(s) {
            if (s >= 90) return ['bg-emerald-500/10','text-emerald-400','border-emerald-500/20'];
            if (s >= 70) return ['bg-blue-500/10','text-blue-400','border-blue-500/20'];
            if (s >= 50) return ['bg-amber-500/10','text-amber-400','border-amber-500/20'];
            return ['bg-slate-700/30','text-slate-400','border-slate-600/30'];
        }

        function sourceIcon(src) {
            const icons = {
                'RemoteOK':'🌐','Hacker News':'🟧','LinkedIn':'🔗',
                'Indeed':'🔵','Glassdoor':'🟢','JobStreet':'🟣'
            };
            return icons[src] || '📋';
        }

        function isNew(dateStr) {
            return dateStr === TODAY;
        }

        function mdToHtml(text) {
            if (!text) return '<p class="text-slate-500 italic">No notes available.</p>';
            let h = text
                .replace(/^### (.*)$/gm, '<h3 class="text-base font-bold text-white mt-5 mb-2">$1</h3>')
                .replace(/^## (.*)$/gm, '<h2 class="text-lg font-bold text-white mt-6 mb-3">$1</h2>')
                .replace(/^# (.*)$/gm, '<h1 class="text-xl font-bold text-white mt-7 mb-4">$1</h1>')
                .replace(/\*\*(.+?)\*\*/g, '<strong class="text-white">$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-blue-400 hover:underline">$1</a>')
                .replace(/^- (.*)$/gm, '<li class="ml-4 list-disc mb-1 marker:text-blue-500/60">$1</li>');
            // Wrap consecutive <li> in <ul>
            h = h.replace(/(<li[^>]*>.*?<\/li>\n?)+/g, function(m) {
                return '<ul class="mb-4 space-y-1">' + m + '</ul>';
            });
            // Wrap remaining plain text in <p>
            h = h.split('\n\n').map(function(p) {
                p = p.trim();
                if (!p || p.startsWith('<h') || p.startsWith('<ul') || p.startsWith('<li')) return p;
                return '<p class="mb-3">' + p.replace(/\n/g, '<br>') + '</p>';
            }).join('');
            return h;
        }

        // ─── Metrics ────────────────────────────────────
        function updateMetrics() {
            document.getElementById('m-total').textContent = DATA.length;
            document.getElementById('m-high').textContent = DATA.filter(j => (j.metadata.match_score || 0) >= 90).length;
            document.getElementById('m-applied').textContent = DATA.filter(j => j.metadata.status === 'Applied').length;
            document.getElementById('m-new').textContent = DATA.filter(j => isNew(j.metadata.date_added)).length;

            visible = DATA.filter(function(j) {
                const m = j.metadata;
                const q = searchQuery.toLowerCase();

                const matchStatus = filterStatus === 'All' || m.status === filterStatus;
                const matchSource = filterSource === 'All' || m.source === filterSource;
                
                const scoreValue = m.match_score || 0;
                const matchScore = filterScore === 'All' || 
                                   (filterScore === 'High' && scoreValue >= 90) || 
                                   (filterScore === 'Good' && scoreValue >= 50 && scoreValue < 90) || 
                                   (filterScore === 'Low' && scoreValue < 50);

                const matchWorkType = filterWorkType === 'All' || 
                                      (m.work_type && m.work_type.toLowerCase().includes(filterWorkType.toLowerCase()));

                return matchText && matchStatus && matchSource && matchScore && matchWorkType;
            });

            visible.sort(function(a, b) {
                if (sortBy === 'score') return (b.metadata.match_score||0) - (a.metadata.match_score||0);

            });

            resultCount.textContent = visible.length + ' job' + (visible.length !== 1 ? 's' : '') + ' found';

                return;

                    + '<h3 class="text-sm font-bold text-white mb-1.5 line-clamp-2 leading-snug hover:text-blue-400 transition-colors">' + (m.title || 'Untitled') + '</h3>'
                    + '<p class="text-xs text-slate-400 font-medium mb-3">' + (m.company || 'Unknown') + '</p>'
                    + (loc || wt ? '<div class="flex flex-wrap gap-1.5 mb-3">' + (loc ? '<span class="text-[10px] text-slate-500 bg-slate-800/40 px-2 py-0.5 rounded-md">📍 ' + loc + '</span>' : '') + (wt ? '<span class="text-[10px] text-slate-500 bg-slate-800/40 px-2 py-0.5 rounded-md">' + wt + '</span>' : '') + '</div>' : '')
                    + '<div class="mt-auto pt-3 border-t border-slate-800/60 flex justify-between items-center text-[10px] text-slate-600 font-medium">'
                    +   '<span>' + (m.date_added || '') + '</span>'
                    +   '<span>' + sourceIcon(m.source) + ' ' + (m.source || '') + '</span>'
                    + '</div>'
                    + '</div>';
            }).join('');
        }

        // ─── Modal ──────────────────────────────────────
        window._openModal = function(idx) {
            const job = visible[idx];
            if (!job) return;
            const m = job.metadata;
            const score = m.match_score || 0;
            const sc = scoreColor(score);

            document.getElementById('md-title').textContent = m.title || 'Untitled';
            document.getElementById('md-company').querySelector('span').textContent = m.company || 'Unknown';

            const scoreEl = document.getElementById('md-score');
            scoreEl.textContent = score;
            scoreEl.className = 'font-bold text-xl ' + sc[1];

            document.getElementById('md-status').textContent = m.status || 'N/A';
            document.getElementById('md-location').textContent = m.location || 'N/A';
            document.getElementById('md-worktype').textContent = m.work_type || 'N/A';
            document.getElementById('md-date').textContent = m.date_added || 'N/A';
            document.getElementById('md-source').textContent = (m.source ? sourceIcon(m.source) + ' ' + m.source : 'N/A');

            const srcBadge = document.getElementById('md-source-badge');
            srcBadge.textContent = m.source || 'Manual';

            const newBadge = document.getElementById('md-new-badge');
            newBadge.classList.toggle('hidden', !isNew(m.date_added));

            const urlEl = document.getElementById('md-url');
            if (m.url) { urlEl.href = m.url; urlEl.style.display = 'flex'; }
            else { urlEl.style.display = 'none'; }

            document.getElementById('md-body').innerHTML = mdToHtml(job.body);

            overlay.classList.remove('hidden');
            void overlay.offsetWidth;
            overlay.classList.remove('opacity-0');
            modalBox.classList.remove('scale-95');
        };

        function closeModal() {
            overlay.classList.add('opacity-0');
            modalBox.classList.add('scale-95');
            setTimeout(function() { overlay.classList.add('hidden'); }, 300);
        }

        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

        // ─── Event Bindings ─────────────────────────────
        searchEl.addEventListener('input', function(e) { searchQuery = e.target.value; render(); });
        statusEl.addEventListener('change', function(e) { filterStatus = e.target.value; render(); });
        sourceEl.addEventListener('change', function(e) { filterSource = e.target.value; render(); });
        scoreEl.addEventListener('change', function(e) { filterScore = e.target.value; render(); });
        workTypeEl.addEventListener('change', function(e) { filterWorkType = e.target.value; render(); });

        sortScoreEl.addEventListener('click', function() {
            sortBy = 'score';
            sortScoreEl.className = 'px-4 py-2 text-xs font-semibold rounded-lg bg-blue-600/20 text-blue-400 transition-all';
            sortDateEl.className = 'px-4 py-2 text-xs font-semibold rounded-lg text-slate-400 hover:text-white transition-all';
            render();
        });
        sortDateEl.addEventListener('click', function() {
            sortBy = 'date';
            sortDateEl.className = 'px-4 py-2 text-xs font-semibold rounded-lg bg-blue-600/20 text-blue-400 transition-all';
            sortScoreEl.className = 'px-4 py-2 text-xs font-semibold rounded-lg text-slate-400 hover:text-white transition-all';
            render();
        });

        // ─── Init ───────────────────────────────────────
        updateMetrics();
        render();
    })();
    </script>
</body>
</html>
